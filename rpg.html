// ===== AUDIO =====
let AC; try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
function beep(freq,dur,type='sine',vol=0.15,freqEnd=null,startDelay=0){
  if(!AC)return; try{
    if(AC.state==='suspended')AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.connect(g);g.connect(AC.destination);
    const t=AC.currentTime+startDelay;
    o.frequency.setValueAtTime(freq,t);
    if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }catch(e){}
}
function snd(type){
  switch(type){
    case'cursor':  beep(440,0.05,'sine',0.06); break;
    case'confirm': beep(660,0.08,'sine',0.1); break;
    case'cancel':  beep(220,0.1,'sine',0.1); break;
    case'step':    beep(180,0.04,'sine',0.02); break;
    case'attack':  beep(200,0.18,'sawtooth',0.15,50); break;
    case'magic':   beep(400,0.3,'sine',0.18,900); break;
    case'heal':    beep(550,0.08,'sine',0.12);beep(700,0.12,'sine',0.12,null,0.1);beep(880,0.2,'sine',0.12,null,0.2); break;
    case'encounter':[200,150,250,300].forEach((f,i)=>beep(f,0.12,'square',0.12,null,i*0.1)); break;
    case'levelup': [523,659,784,1047].forEach((f,i)=>beep(f,0.18,'sine',0.2,null,i*0.12)); break;
    case'gameover':beep(300,1.5,'sawtooth',0.18,40); break;
    case'victory': [523,523,523,523,415,466,523,466,523].forEach((f,i)=>beep(f,0.15,'sine',0.2,null,i*0.14)); break;
  }
}

// ===== INPUT =====
const keys={}, keyJust={};
document.addEventListener('keydown',e=>{
  if(!keys[e.key]){keyJust[e.key]=true;keys[e.key]=true;}
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

let mouseX=0, mouseY=0;
function getCanvasPos(e){
  const r=C.getBoundingClientRect();
  return{x:(e.clientX-r.left)*640/r.width, y:(e.clientY-r.top)*480/r.height};
}

// =====================================================================
// ===== ASYNC INPUT BRIDGE ============================================
// =====================================================================
// ゲームロジックの「次のキー入力を待つ」を Promise で実現する仕組み。
// waitKey() を呼ぶと Promise が返り、次のキー/クリックで resolve される。
// ゲームループが毎フレーム flushInput() を呼ぶことで橋渡しをする。

let _inputResolve = null;   // 現在待機中の resolve 関数

function waitKey() {
  return new Promise(r => { _inputResolve = r; });
}

async function waitConfirm() {
  while(true) {
    const k = await waitKey();
    if(k==='z'||k==='Z'||k==='Enter') return;
    if(k?.type==='click') return;
  }
}

// ゲームループから毎フレーム呼ばれる
function flushInput() {
  if(!_inputResolve) return;
  const order=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
               'z','Z','x','X','Enter','Escape','Backspace'];
  for(const k of order) {
    if(keyJust[k]){ const r=_inputResolve; _inputResolve=null; r(k); return; }
  }
}

// マウス/タッチ
C.addEventListener('mousemove',e=>{
  const{x,y}=getCanvasPos(e); mouseX=x; mouseY=y;
  handleHover(x,y);
});
C.addEventListener('mousedown',e=>{
  if(AC&&AC.state==='suspended')AC.resume();
  const{x,y}=getCanvasPos(e);
  handleClick(x,y);
});
C.addEventListener('mouseup',e=>{ for(const k in dpadHeld) delete dpadHeld[k]; });
C.addEventListener('mouseleave',e=>{ for(const k in dpadHeld) delete dpadHeld[k]; });
C.addEventListener('touchstart',e=>{
  e.preventDefault(); if(AC&&AC.state==='suspended')AC.resume();
  const t=e.touches[0],r=C.getBoundingClientRect();
  handleClick((t.clientX-r.left)*640/r.width,(t.clientY-r.top)*480/r.height);
},{passive:false});
C.addEventListener('touchend',e=>{ e.preventDefault(); for(const k in dpadHeld) delete dpadHeld[k]; },{passive:false});

const dpadHeld={};
let dpadMoveTimer=0;
const DPAD={size:52,get x(){return 640-this.size*3-20;},get y(){return 480-this.size*3-20;}};
function dpadBtn(dir){
  const s=DPAD.size,bx=DPAD.x,by=DPAD.y;
  return [{x:bx+s,y:by,w:s,h:s},{x:bx+s*2,y:by+s,w:s,h:s},{x:bx+s,y:by+s*2,w:s,h:s},
          {x:bx,y:by+s,w:s,h:s},{x:bx+s,y:by+s,w:s,h:s},{x:bx,y:by,w:s,h:s}][dir];
}
function inRect(px,py,r){return px>=r.x&&px<r.x+r.w&&py>=r.y&&py<r.y+r.h;}

function handleClick(x,y) {
  // Dパッド（オーバーワールド時）
  if(gState==='overworld'&&!fieldMenu){
    ['ArrowUp','ArrowRight','ArrowDown','ArrowLeft'].forEach((d,i)=>{
      if(inRect(x,y,dpadBtn(i))){dpadHeld[d]=true;keyJust[d]=true;}
    });
    if(inRect(x,y,dpadBtn(4))){keyJust['z']=true;}
    if(inRect(x,y,dpadBtn(5))){keyJust['Enter']=true;}
    return;
  }
  // それ以外は汎用クリックとしてinput resolveに流す
  if(_inputResolve){
    const r=_inputResolve; _inputResolve=null; r({type:'click',x,y});
  }
}

// メニューホバー → hover イベントを input stream に注入
function handleHover(x,y) {
  if(!_inputResolve||!ui.menu) return;
  const {items,mx=510,my=315,ih=38}=ui.menu;
  for(let i=0;i<items.length;i++){
    if(x>=mx&&x<=mx+125&&y>=my+i*ih&&y<my+(i+1)*ih){
      if(i!==ui.menu.cursor){
        const r=_inputResolve; _inputResolve=null;
        r({type:'hover',index:i});
      }
      break;
    }
  }
}

function win(x,y,w,h,alpha=1){
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#000b44'; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#ffffff';ctx.lineWidth=3;ctx.strokeRect(x+2,y+2,w-4,h-4);
  ctx.strokeStyle='#2244aa';ctx.lineWidth=1;ctx.strokeRect(x+4,y+4,w-8,h-8);
  ctx.globalAlpha=1;
}
function txt(s,x,y,size=16,color='#ffffff',align='left'){
  ctx.font=`bold ${size}px "Courier New",monospace`;
  ctx.fillStyle=color;ctx.textAlign=align;ctx.fillText(s,x,y);ctx.textAlign='left';
}
function hpBar(label,x,y,w,cur,max){
  txt(label,x,y+11,13,'#ffffff');
  const bx=x+32,bw=w-32,bh=11;
  ctx.fillStyle='#222';ctx.fillRect(bx,y,bw,bh);
  const r=Math.max(0,cur/max);
  ctx.fillStyle=r>0.5?'#00cc44':r>0.25?'#ffcc00':'#ff3300';
  ctx.fillRect(bx,y,Math.floor(bw*r),bh);
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,y,bw,bh);
  txt(`${cur}/${max}`,bx+bw+4,y+10,11,'#ffff88');
}
function wrapText(text,maxW){
  if(!text)return[];
  const lines=[],parts=text.split('\n');
  parts.forEach(p=>{for(let i=0;i<p.length;i+=maxW)lines.push(p.slice(i,i+maxW));});
  return lines.slice(0,4);
}

// ===== TILE DRAWING =====
function drawTile(type,px,py){
  const colors={[G]:'#448833',[W]:'#1133bb',[M]:'#776655',[T]:'#ccbb77',[D]:'#330022',[F]:'#224422',[X]:'#443322'};
  ctx.fillStyle=colors[type]||'#333';ctx.fillRect(px,py,TW,TH);
  if(type===G){ctx.fillStyle='#55aa44';[[2,6,4,2],[12,2,3,2],[20,14,4,2],[8,20,5,2],[25,8,3,2]].forEach(([rx,ry,rw,rh])=>ctx.fillRect(px+rx,py+ry,rw,rh));}
  else if(type===W){ctx.fillStyle='#2244dd';ctx.fillRect(px+3,py+7,10,3);ctx.fillRect(px+16,py+18,12,3);ctx.fillStyle='#4466ff';ctx.fillRect(px+8,py+3,6,2);}
  else if(type===F){ctx.fillStyle='#336633';ctx.beginPath();ctx.arc(px+16,py+15,11,0,Math.PI*2);ctx.fill();ctx.fillStyle='#44aa44';ctx.beginPath();ctx.arc(px+16,py+11,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#553322';ctx.fillRect(px+13,py+24,6,7);}
  else if(type===T){ctx.fillStyle='#ddcc88';ctx.fillRect(px,py,TW,TH);ctx.fillStyle='#cc7733';ctx.fillRect(px+6,py+13,20,16);ctx.fillStyle='#cc3322';ctx.beginPath();ctx.moveTo(px+4,py+14);ctx.lineTo(px+16,py+3);ctx.lineTo(px+28,py+14);ctx.fill();ctx.fillStyle='#7799cc';ctx.fillRect(px+12,py+20,7,8);ctx.fillStyle='#cc9922';ctx.fillRect(px+12,py+20,7,2);}
  else if(type===D){ctx.fillStyle='#220011';ctx.fillRect(px,py,TW,TH);ctx.fillStyle='#440033';ctx.fillRect(px+9,py+7,14,18);ctx.fillStyle='#110011';ctx.beginPath();ctx.arc(px+16,py+18,6,Math.PI,0);ctx.fill();ctx.fillStyle='#ff0000';ctx.fillRect(px+13,py+13,2,2);ctx.fillRect(px+17,py+13,2,2);}
  else if(type===X){ctx.fillStyle='#554433';ctx.fillRect(px,py,TW,TH);ctx.fillStyle='#443322';for(let i=0;i<4;i++)for(let j=0;j<4;j++)if((i+j)%2===0)ctx.fillRect(px+i*8,py+j*8,8,8);}
}

// ===== SPRITES =====
function drawHero(px,py,wf){
  const b=wf?2:0;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(px+16,py+31,8,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cc3322';ctx.fillRect(px+7,py+15,18,13);
  ctx.fillStyle='#3366cc';ctx.fillRect(px+9,py+16,14,12);
  ctx.fillStyle='#ffcc88';ctx.beginPath();ctx.arc(px+16,py+11,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#bb9933';ctx.fillRect(px+8,py+5,16,7);ctx.fillStyle='#ddbb55';ctx.fillRect(px+9,py+4,14,4);
  ctx.fillStyle='#ff4444';ctx.fillRect(px+13,py+1,6,5);
  ctx.fillStyle='#332200';ctx.fillRect(px+12,py+11,2,2);ctx.fillRect(px+18,py+11,2,2);
  ctx.fillStyle='#ccddee';ctx.fillRect(px+24,py+13,3,15);ctx.fillStyle='#ddaa33';ctx.fillRect(px+21,py+17,9,3);
  ctx.fillStyle='#cc4422';ctx.beginPath();ctx.arc(px+7,py+19,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcc44';ctx.beginPath();ctx.arc(px+7,py+19,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#224488';ctx.fillRect(px+9,py+27,6,5+b);ctx.fillRect(px+17,py+27,6,5-b);
  ctx.fillStyle='#442211';ctx.fillRect(px+8,py+30+b,7,3);ctx.fillRect(px+17,py+30-b,7,3);
}
function drawSlime(x,y,col,fl,t){const bob=Math.sin(t*0.06)*4,c=fl?'#ffffff':col;ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y+5+bob,36,30,0,0,Math.PI*2);ctx.fill();if(!fl){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.ellipse(x-11,y-8+bob,10,8,-0.3,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#ffffff';ctx.beginPath();ctx.ellipse(x-13,y-4+bob,6,7,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+13,y-4+bob,6,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#001144';ctx.beginPath();ctx.ellipse(x-12,y-4+bob,3,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+14,y-4+bob,3,4,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#001144';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y+10+bob,9,0,Math.PI);ctx.stroke();}
function drawBat(x,y,fl,t){const c=fl?'#ffffff':'#553366',wf=Math.sin(t*0.18)*18;ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x-10,y);ctx.quadraticCurveTo(x-50,y-20+wf,x-65,y+5+wf);ctx.quadraticCurveTo(x-40,y+18,x-10,y+10);ctx.fill();ctx.beginPath();ctx.moveTo(x+10,y);ctx.quadraticCurveTo(x+50,y-20+wf,x+65,y+5+wf);ctx.quadraticCurveTo(x+40,y+18,x+10,y+10);ctx.fill();ctx.fillStyle=fl?'#ffffff':'#331144';ctx.beginPath();ctx.ellipse(x,y+5,17,22,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x-8,y-10);ctx.lineTo(x-16,y-32);ctx.lineTo(x-2,y-10);ctx.fill();ctx.beginPath();ctx.moveTo(x+8,y-10);ctx.lineTo(x+16,y-32);ctx.lineTo(x+2,y-10);ctx.fill();ctx.fillStyle='#ff6600';ctx.beginPath();ctx.ellipse(x-7,y+1,5,5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+7,y+1,5,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x-7,y+1,2,2,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+7,y+1,2,2,0,0,Math.PI*2);ctx.fill();}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// テキストをタイプライター表示して、確定入力まで待つ
async function typeMsg(text) {
  const lines = text.split('\n');
  ui.msgLines = [];
  ui.msgDone = false;

  for(const line of lines){
    ui.msgLines.push('');
    for(const ch of line){
      ui.msgLines[ui.msgLines.length-1] += ch;
      await sleep(28);
    }
  }
  ui.msgDone = true;
  await waitConfirm();
  ui.msgLines = [];
  ui.msgDone = false;
}

// カーソル付きメニューを表示して選択結果(index)を返す。キャンセルは -1
// opts: { title, mx, my, ih }
async function selectMenu(items, opts={}) {
  const {title='',mx=510,my=315,ih=38} = opts;
  let cursor = 0;
  ui.menu = {items, cursor, title, mx, my, ih};

  while(true){
    const input = await waitKey();

    if(input==='ArrowUp'){
      cursor=(cursor-1+items.length)%items.length;
      ui.menu.cursor=cursor; snd('cursor');
    } else if(input==='ArrowDown'){
      cursor=(cursor+1)%items.length;
      ui.menu.cursor=cursor; snd('cursor');
    } else if(input==='z'||input==='Z'||input==='Enter'){
      ui.menu=null; snd('confirm'); return cursor;
    } else if(input==='x'||input==='X'||input==='Escape'){
      ui.menu=null; snd('cancel'); return -1;
    } else if(input?.type==='hover'){
      cursor=input.index; ui.menu.cursor=cursor; snd('cursor');
    } else if(input?.type==='click'){
      // クリックされた行を判定
      for(let i=0;i<items.length;i++){
        if(input.x>=mx&&input.x<=mx+125&&input.y>=my+i*ih&&input.y<my+(i+1)*ih){
          if(i===cursor){ ui.menu=null; snd('confirm'); return i; }
          else{ cursor=i; ui.menu.cursor=i; snd('cursor'); }
          break;
        }
      }
    }
  }
}

function calcDmg(atk,def){ return Math.max(1,Math.floor((atk-def)*(0.8+Math.random()*0.4))); }

// ---------- バトル ----------
async function runBattle(enemyDef) {
  const enemy = {...enemyDef, flashTimer:0};
  ui.battleEnemy = enemy;
  ui.battleResult = null;
  gState = 'battle';
  snd('encounter');

  await typeMsg(`${enemy.name}が\nあらわれた！`);

  // ===== メインループ =====
  while(true){

    // ----- プレイヤーターン -----
    const cmd = await selectMenu(['たたかう','まほう','どうぐ','にげる'],
                                 {mx:510, my:315, ih:38});

    if(cmd === 0) {                        // ── たたかう
      const d = calcDmg(player.atk, enemy.def);
      enemy.hp = Math.max(0, enemy.hp-d);
      enemy.flashTimer=20; snd('attack');
      await typeMsg(`${player.name}の\nこうげき！\n${enemy.name}に ${d}の\nダメージ！`);
    }
    else if(cmd === 1) {                   // ── まほう
      const spIdx = await selectMenu(
        player.spells.map(s=>`${s.name}(${s.mp}MP)`),
        {title:'まほう', mx:510, my:330, ih:38}
      );
      if(spIdx >= 0){
        const sp = player.spells[spIdx];
        if(player.mp < sp.mp){
          await typeMsg('MPが　たりない！');
        } else {
          player.mp -= sp.mp;
          if(sp.type==='heal'){
            const h = Math.floor(sp.power*(0.8+Math.random()*0.4));
            player.hp = Math.min(player.maxHp, player.hp+h);
            snd('heal');
            await typeMsg(`${player.name}は ${sp.name}を\nとなえた！\nHPが ${h} かいふく！`);
          } else {
            const d = Math.floor(sp.power*(0.8+Math.random()*0.4));
            enemy.hp = Math.max(0, enemy.hp-d);
            enemy.flashTimer=25; snd('magic');
            await typeMsg(`${player.name}は ${sp.name}を\nとなえた！\n${enemy.name}に ${d}の\nほのおダメージ！`);
          }
        }
      }
    }
    else if(cmd === 2) {                   // ── どうぐ
      const usable = player.items.filter(i=>i.count>0);
      if(!usable.length){
        await typeMsg('どうぐが\nない！');
      } else {
        const itIdx = await selectMenu(
          usable.map(i=>`${i.name} x${i.count}`),
          {title:'どうぐ', mx:510, my:330, ih:38}
        );
        if(itIdx >= 0){
          const item = usable[itIdx];
          const h = 28+Math.random()*12|0;
          player.hp = Math.min(player.maxHp, player.hp+h);
          item.count--; snd('heal');
          await typeMsg(`${player.name}は ${item.name}を\nつかった！\nHPが ${h} かいふく！`);
        }
      }
    }
    else if(cmd === 3 || cmd === -1) {     // ── にげる
      if(enemy.isBoss){
        await typeMsg('にげられない！');
      } else if(Math.random() < 0.65){
        ui.battleEnemy=null; gState='overworld'; return 'fled';
      } else {
        await typeMsg('にげられなかった！');
      }
    }

    // ----- 敵撃破チェック -----
    if(enemy.hp <= 0){
      const expGain = enemy.exp, goldGain = enemy.gold;
      player.exp   += expGain;
      player.gold  += goldGain;

      let levelUp=false, newLevel=player.level;
      while(player.exp >= player.expNext){
        player.level++;
        player.maxHp  += 8+Math.random()*5|0;
        player.maxMp  += 2;
        player.hp      = player.maxHp;
        player.mp      = player.maxMp;
        player.atk    += 3+Math.random()*2|0;
        player.def    += 1+Math.random()*2|0;
        player.expNext = Math.floor(player.expNext*1.75);
        levelUp=true; newLevel=player.level; snd('levelup');
      }
      ui.battleResult = {expGain, goldGain, levelUp, newLevel};
      snd('victory');
      await typeMsg(`${enemy.name}を　たおした！\n${expGain} EXP  ${goldGain} G\nかくとく！`);
      if(levelUp) await typeMsg(`レベルが　${newLevel}に\nあがった！`);
      ui.battleEnemy=null; ui.battleResult=null;
      gState='overworld'; return 'won';
    }

    // ----- 敵ターン -----
    let d, msg;
    if(enemy.isBoss && Math.random()<0.3){
      d = 15+Math.random()*18|0;
      msg = `${enemy.name}は\nまじゅつを　となえた！\nゆうしゃに ${d}の\nダメージ！`;
    } else {
      d = calcDmg(enemy.atk, player.def);
      msg = `${enemy.name}の\nこうげき！\nゆうしゃに ${d}の\nダメージ！`;
    }
    player.hp = Math.max(0, player.hp-d);
    ui.playerFlash=18; snd('attack');
    await typeMsg(msg);

    // ----- 全滅チェック -----
    if(player.hp <= 0){
      snd('gameover');
      await typeMsg('ゆうしゃは\nたおれた...');
      player.hp  = player.maxHp;
      player.mp  = player.maxMp;
      player.x=2; player.y=1;
      ui.battleEnemy=null; gState='overworld'; return 'lost';
    }
  }
}

async function runOverworld(){
  gState='overworld';

    switch(ev.type){
      case'encounter': await runBattle(ev.enemy); gState='overworld'; break;

// ===== PASSWORD SYSTEM (旧来の実装をそのまま流用) ====================
// =====================================================================
const SPELL_CHARS='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンガギグゲゴザジズゼゾダヂヅデドバビ';
function bitsWrite(arr,pos,val,bits){for(let i=bits-1;i>=0;i--){arr[pos+bits-1-i]=(val>>i)&1;}return pos+bits;}
function bitsRead(arr,pos,bits){let v=0;for(let i=0;i<bits;i++)v=(v<<1)|arr[pos+i];return[v,pos+bits];}
function encodePassword(){
  const bits=new Array(120).fill(0);
  const yaku=(player.items.find(i=>i.name==='やくそう')||{count:0}).count;
  let p=0;
  p=bitsWrite(bits,p,Math.min(player.level,127),7);p=bitsWrite(bits,p,Math.min(player.hp,1023),10);
  p=bitsWrite(bits,p,Math.min(player.maxHp,1023),10);p=bitsWrite(bits,p,Math.min(player.mp,127),7);
  p=bitsWrite(bits,p,Math.min(player.maxMp,127),7);p=bitsWrite(bits,p,Math.min(player.atk,127),7);
  p=bitsWrite(bits,p,Math.min(player.def,127),7);p=bitsWrite(bits,p,Math.min(player.exp,16383),14);
  p=bitsWrite(bits,p,Math.min(player.expNext,16383),14);p=bitsWrite(bits,p,Math.min(player.gold,16383),14);
  p=bitsWrite(bits,p,Math.min(yaku,127),7);p=bitsWrite(bits,p,Math.min(player.x,31),5);
  p=bitsWrite(bits,p,Math.min(player.y,15),4);
  let chk=0;for(let i=0;i<113;i++)chk=(chk+bits[i])%128;bitsWrite(bits,p,chk,7);
  let result='';for(let i=0;i<20;i++){let idx=0;for(let b=0;b<6;b++)idx=(idx<<1)|bits[i*6+b];result+=SPELL_CHARS[idx];}
  return result;
}
function decodePassword(str){
  if(str.length!==20)return{ok:false,msg:'呪文は　２０文字　ひつようです'};
  const bits=[];
  for(const ch of str){const idx=SPELL_CHARS.indexOf(ch);if(idx<0)return{ok:false,msg:`「${ch}」は　ただしくない文字です`};for(let b=5;b>=0;b--)bits.push((idx>>b)&1);}
  let p=0,v;
  [v,p]=bitsRead(bits,p,7);const level=v;[v,p]=bitsRead(bits,p,10);const hp=v;[v,p]=bitsRead(bits,p,10);const maxHp=v;
  [v,p]=bitsRead(bits,p,7);const mp=v;[v,p]=bitsRead(bits,p,7);const maxMp=v;[v,p]=bitsRead(bits,p,7);const atk=v;
  [v,p]=bitsRead(bits,p,7);const def=v;[v,p]=bitsRead(bits,p,14);const exp=v;[v,p]=bitsRead(bits,p,14);const expNext=v;
  [v,p]=bitsRead(bits,p,14);const gold=v;[v,p]=bitsRead(bits,p,7);const yaku=v;[v,p]=bitsRead(bits,p,5);const px=v;
  [v,p]=bitsRead(bits,p,4);const py=v;[v,  ]=bitsRead(bits,p,7);const chkGot=v;
  let chkCalc=0;for(let i=0;i<113;i++)chkCalc=(chkCalc+bits[i])%128;
  if(chkCalc!==chkGot)return{ok:false,msg:'呪文が　まちがっています！'};
  return{ok:true,level,hp:Math.min(hp,maxHp),maxHp,mp:Math.min(mp,maxMp),maxMp,atk,def,exp,expNext,gold,yaku,px:Math.min(px,MW-1),py:Math.min(py,MH-1)};
}
function applyPassword(d){
  player.level=d.level;player.hp=d.hp;player.maxHp=d.maxHp;player.mp=d.mp;player.maxMp=d.maxMp;
  player.atk=d.atk;player.def=d.def;player.exp=d.exp;player.expNext=d.expNext;player.gold=d.gold;
  player.x=d.px;player.y=d.py;
  const y=player.items.find(i=>i.name==='やくそう');
  if(y)y.count=d.yaku;else if(d.yaku>0)player.items.push({name:'やくそう',count:d.yaku});
}

// 呪文画面は async で wrap（入力完了まで待つ）
const KB_COLS=8,KB_ROWS=8;
let pwState=null; // null or {mode,arr,pos,kbRow,kbCol,msg,result}

async function runPassword(mode){
  gState='password';
  pwState={mode,arr:new Array(20).fill(''),pos:0,kbRow:0,kbCol:0,msg:'',result:null};

  if(mode==='show'){
    await waitConfirm();
    pwState=null; return;
  }

  // 入力モード
  while(true){
    const input = await waitKey();

    if(input==='Escape'||input==='Backspace'){ pwState=null; return; }

    if(input==='ArrowUp'){pwState.kbRow=(pwState.kbRow-1+KB_ROWS)%KB_ROWS;snd('cursor');}
    else if(input==='ArrowDown'){pwState.kbRow=(pwState.kbRow+1)%KB_ROWS;snd('cursor');}
    else if(input==='ArrowLeft'){pwState.kbCol=(pwState.kbCol-1+KB_COLS)%KB_COLS;snd('cursor');}
    else if(input==='ArrowRight'){pwState.kbCol=(pwState.kbCol+1)%KB_COLS;snd('cursor');}
    else if(input==='z'||input==='Z'){
      if(pwState.pos<20){const idx=pwState.kbRow*KB_COLS+pwState.kbCol;if(idx<64){pwState.arr[pwState.pos]=SPELL_CHARS[idx];pwState.pos++;snd('confirm');}}
    }
    else if(input==='x'||input==='X'){
      if(pwState.pos>0){pwState.pos--;pwState.arr[pwState.pos]='';snd('cancel');}
      else{pwState=null;return;}
    }
    else if(input==='Enter'){
      if(pwState.pos===20){
        const res=decodePassword(pwState.arr.join(''));
        if(res.ok){applyPassword(res);pwState.msg='ぼうけんを　さいかい！';pwState.result=true;snd('levelup');await sleep(1500);pwState=null;return;}
        else{pwState.msg=res.msg;pwState.result=false;snd('cancel');}
      } else{pwState.msg=`あと${20-pwState.pos}文字　たりません`;pwState.result=false;snd('cancel');}
    }
    else if(input?.type==='click'){
      const{x,y}=input;
      // もどるボタン
      if(x>=36&&x<=126&&y>=414&&y<=450){pwState=null;return;}
      // キーボードグリッド
      const KBX=30,KBY=130,KW=74,KH=34;
      if(x>=KBX&&x<=KBX+KW*KB_COLS&&y>=KBY+8&&y<=KBY+KB_ROWS*KH+8){
        const c=Math.floor((x-KBX)/KW),r=Math.floor((y-KBY-8)/KH);
        if(r>=0&&r<KB_ROWS&&c>=0&&c<KB_COLS&&pwState.pos<20){
          const idx=r*KB_COLS+c;if(idx<64){pwState.arr[pwState.pos]=SPELL_CHARS[idx];pwState.pos++;snd('confirm');}
        }
      }
      // スロットクリックで削除
      for(let i=0;i<20;i++){if(x>=42+i*29&&x<=42+i*29+26&&y>=82&&y<=112&&i<pwState.pos){while(pwState.pos>i){pwState.pos--;pwState.arr[pwState.pos]='';}snd('cancel');break;}}
      // 決定
      if(y>=408&&y<=448&&x>130) { /* Enter 相当 - 上のEnterブランチを再実行のため再注入は省略、Enterキーで操作してもらう */ }
    }
  }
}

// =====================================================================
// ===== OVERWORLD MOVEMENT (ゲームループから呼ばれる) =================
// =====================================================================
let moveDelay=0;
const FIELD_MENU_OPTS=['ふっかつの　じゅもんを　みる','じゅもんを　にゅうりょくする','とじる'];

function processOverworld(){
  if(gState!=='overworld') return;
  if(_owResolve===null) return; // async 側が待ってない

  // Dパッド連続移動
  dpadMoveTimer++;
  if(dpadMoveTimer>=12){dpadMoveTimer=0;['ArrowUp','ArrowRight','ArrowDown','ArrowLeft'].forEach(d=>{if(dpadHeld[d])keyJust[d]=true;});}

  // メニュー開く
  if(keyJust['Enter']){ fireOverworldEvent({type:'menu'}); return; }

  // 移動
  if(moveDelay>0){moveDelay--;return;}
  let dx=0,dy=0;
  if(keys['ArrowUp']   ||keyJust['ArrowUp'])   {dy=-1;player.dir=0;}
  else if(keys['ArrowRight']||keyJust['ArrowRight']){dx=1; player.dir=1;}
  else if(keys['ArrowDown'] ||keyJust['ArrowDown']) {dy=1; player.dir=2;}
  else if(keys['ArrowLeft'] ||keyJust['ArrowLeft']) {dx=-1;player.dir=3;}

  if(dx||dy){
    const nx=player.x+dx, ny=player.y+dy;
    if(nx>=0&&nx<MW&&ny>=0&&ny<MH&&WALKABLE.includes(MAP[ny][nx])){
      player.x=nx; player.y=ny; player.walkFrame^=1; moveDelay=10; snd('step');
      const tile=MAP[ny][nx];
      if(tile===T||tile===D) return;
      const chance=tile===F?0.2:0.1;
      if(Math.random()<chance){
        let pool;
        if(player.level<=2)pool=[EDEFS[0]];
        else if(player.level<=4)pool=[EDEFS[0],EDEFS[1],EDEFS[3]];
        else if(player.level<=6)pool=[EDEFS[1],EDEFS[2],EDEFS[3]];
        else pool=[EDEFS[2],EDEFS[3]];
        fireOverworldEvent({type:'encounter',enemy:{...pool[pool.length*Math.random()|0]}});
        return;
      }
    }
  }

  // Zキーでタイル操作
  if(keyJust['z']||keyJust['Z']){
    const tile=MAP[player.y][player.x];
    if(tile===T){ fireOverworldEvent({type:'enterTown'}); return; }
    if(tile===D){ fireOverworldEvent({type:'enterDungeon'}); return; }
  }
}

// =====================================================================
// ===== MAIN GAME LOOP ================================================
// =====================================================================
function gameLoop(){
  ctx.clearRect(0,0,640,480);

  // 描画
  switch(gState){
    case'title':    drawTitle();    break;
    case'overworld':drawOverworld();break;
    case'battle':   drawBattle();   break;
    case'town':     drawTown();     break;
    case'password': if(pwState)drawPassword(); break;
    case'ending':   drawEnding();   break;
  }

  // オーバーワールド移動処理
  processOverworld();

  // 非同期入力の橋渡し
  flushInput();

  for(const k in keyJust) delete keyJust[k];
  requestAnimationFrame(gameLoop);
}

// ===== START =====
gameLoop();
runGame();
