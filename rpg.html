  {name:'гғүгғ©гӮӯгғј',  hp:16, atk:9,  def:3,  exp:7,  gold:6,  type:'bat',       color:'#553366'},
  {name:'гҒҠгҒҠгҒӘгӮҒгҒҸгҒҳ',hp:22,atk:13,def:5,  exp:10, gold:9,  type:'slug',      color:'#44aa33'},

// ===== AUDIO =====
let AC;
try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}

function beep(freq,dur,type='sine',vol=0.15,freqEnd=null,startDelay=0){
  if(!AC)return;
  try{
    if(AC.state==='suspended')AC.resume();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.connect(g); g.connect(AC.destination);
    const t=AC.currentTime+startDelay;
    o.frequency.setValueAtTime(freq,t);
    if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.01);
  }catch(e){}
}

function snd(type){
  switch(type){
    case'cursor': beep(440,0.05,'sine',0.06); break;
    case'confirm': beep(660,0.08,'sine',0.1); break;
    case'cancel': beep(220,0.1,'sine',0.1); break;
    case'step': beep(180,0.04,'sine',0.02); break;
    case'attack': beep(200,0.18,'sawtooth',0.15,50); break;
    case'magic': beep(400,0.3,'sine',0.18,900); break;
    case'heal': beep(550,0.08,'sine',0.12); beep(700,0.12,'sine',0.12,null,0.1); beep(880,0.2,'sine',0.12,null,0.2); break;
    case'encounter': [200,150,250,300].forEach((f,i)=>beep(f,0.12,'square',0.12,null,i*0.1)); break;
    case'levelup': [523,659,784,1047].forEach((f,i)=>beep(f,0.18,'sine',0.2,null,i*0.12)); break;
    case'gameover': beep(300,1.5,'sawtooth',0.18,40); break;
    case'victory': [523,523,523,523,415,466,523,466,523].forEach((f,i)=>beep(f,0.15,'sine',0.2,null,i*0.14)); break;
  }
}

// ===== INPUT =====
const keys={}, keyJust={};
document.addEventListener('keydown',e=>{
  if(!keys[e.key]){ keyJust[e.key]=true; keys[e.key]=true; }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

// ===== MOUSE INPUT =====
// CanvasгҒ®е®ҹйҡӣгҒ®иЎЁзӨәгӮөгӮӨгӮәгҒЁгӮІгғјгғ еә§жЁҷгҒ®гӮ№гӮұгғјгғ«еӨүжҸӣ
function getCanvasPos(e){
  const r=C.getBoundingClientRect();
  const scaleX=640/r.width, scaleY=480/r.height;
  const cx=(e.clientX-r.left)*scaleX;
  const cy=(e.clientY-r.top)*scaleY;
  return{x:cx,y:cy};
}

// д»®жғіDгғ‘гғғгғүгҒ®е®ҡзҫ©пјҲгӮӘгғјгғҗгғјгғҜгғјгғ«гғүз”Ёпјү
const DPAD={
  size:52, margin:10,
  get x(){return 640-this.size*3-this.margin*2;},
  get y(){return 480-this.size*3-this.margin*2;},
};
function dpadBtn(dir){ // 0=up,1=right,2=down,3=left,4=center(Z),5=menu(Enter)
  const s=DPAD.size, m=DPAD.margin, bx=DPAD.x, by=DPAD.y;
  switch(dir){
    case 0: return{x:bx+s,y:by,    w:s,h:s};
    case 1: return{x:bx+s*2,y:by+s,w:s,h:s};
    case 2: return{x:bx+s,y:by+s*2,w:s,h:s};
    case 3: return{x:bx,   y:by+s, w:s,h:s};
    case 4: return{x:bx+s, y:by+s, w:s,h:s}; // ZгғңгӮҝгғі
    case 5: return{x:bx,   y:by,   w:s,h:s}; // гғЎгғӢгғҘгғј
  }
}
function inRect(px,py,r){return px>=r.x&&px<r.x+r.w&&py>=r.y&&py<r.y+r.h;}

// з§»еӢ•з”ЁгҒ®йҖЈз¶ҡжҠјгҒ—зҠ¶ж…Ӣ
const dpadHeld={};
let dpadMoveTimer=0;
let mouseX=0, mouseY=0;

C.addEventListener('mousemove',e=>{
  const{x,y}=getCanvasPos(e);
  mouseX=x; mouseY=y;
  if(gState==='battle') handleBattleHover(x,y);
});

function handleBattleHover(x,y){
  if(bPhase==='selecting'){
    BCMDS.forEach((c,i)=>{
      if(x>=510&&x<=635&&y>=315+i*38&&y<=315+(i+1)*38){
        if(bCursor!==i){bCursor=i;snd('cursor');}
      }
    });
  }else if(bPhase==='spellmenu'){
    player.spells.forEach((sp,i)=>{
      if(x>=510&&x<=635&&y>=340+i*38&&y<=340+(i+1)*38){
        if(bSubCursor!==i){bSubCursor=i;snd('cursor');}
      }
    });
  }else if(bPhase==='itemmenu'){
    const items=player.items.filter(it=>it.count>0);
    items.forEach((it,i)=>{
      if(x>=510&&x<=635&&y>=340+i*38&&y<=340+(i+1)*38){
        if(bSubCursor!==i){bSubCursor=i;snd('cursor');}
      }
    });

}

C.addEventListener('mousedown',e=>{
  if(AC&&AC.state==='suspended') AC.resume();
  const{x,y}=getCanvasPos(e);
  handleMouseDown(x,y);
});
C.addEventListener('mouseup',e=>{
  for(const k in dpadHeld) delete dpadHeld[k];
});
C.addEventListener('mouseleave',e=>{
  for(const k in dpadHeld) delete dpadHeld[k];
});

// гӮҝгғғгғҒеҜҫеҝң
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(AC&&AC.state==='suspended') AC.resume();
  const t=e.touches[0];
  const r=C.getBoundingClientRect();
  const scaleX=640/r.width, scaleY=480/r.height;
  const cx=(t.clientX-r.left)*scaleX, cy=(t.clientY-r.top)*scaleY;
  handleMouseDown(cx,cy);
},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const k in dpadHeld) delete dpadHeld[k];
},{passive:false});

function handleMouseDown(x,y){
  switch(gState){
    case'title': keyJust['z']=true; break;
    case'overworld': handleOverworldClick(x,y); break;
    case'town': handleTownClick(x,y); break;
    case'battle': handleBattleClick(x,y); break;
    case'password': handlePasswordClick(x,y); break;
    case'ending': keyJust['z']=true; break;
  }
}

function handleOverworldClick(x,y){
  if(fieldMenu){
    // гғ•гӮЈгғјгғ«гғүгғЎгғӢгғҘгғјгӮҜгғӘгғғгӮҜ
    FIELD_OPTS.forEach((o,i)=>{
      if(x>=388&&x<=628&&y>=302+i*28&&y<=302+(i+1)*28){
        fieldMenuCursor=i; keyJust['z']=true;
      }
    });
    return;
  }
  // Dгғ‘гғғгғүгғңгӮҝгғі
  const dirs=['ArrowUp','ArrowRight','ArrowDown','ArrowLeft'];
  dirs.forEach((d,i)=>{
    const b=dpadBtn(i);
    if(inRect(x,y,b)){dpadHeld[d]=true;keyJust[d]=true;snd('step');}
  });
  // ZгғңгӮҝгғіпјҲдёӯеӨ®пјү
  const zb=dpadBtn(4);
  if(inRect(x,y,zb)) keyJust['z']=true;
  // гғЎгғӢгғҘгғјгғңгӮҝгғі
  const mb=dpadBtn(5);
  if(inRect(x,y,mb)){keyJust['Enter']=true;}
}

function handleTownClick(x,y){

    TOWN_OPTS.forEach((o,i)=>{
      if(x>=158&&x<=500&&y>=372+i*32&&y<=372+(i+1)*32){
        townCursor=i; keyJust['z']=true;
      }
    });
    if(x>=100&&x<=540&&y>=380&&y<=455) {} // иғҢжҷҜгӮҜгғӘгғғгӮҜгҒҜз„ЎиҰ–

function handleBattleClick(x,y){

      if(x>=510&&x<=635&&y>=315+i*38&&y<=315+(i+1)*38){

        bSubCursor=i; keyJust['z']=true;
      }

    if(x>=510&&x<=635&&y>=440&&y<=470) keyJust['x']=true;
  }else if(bPhase==='itemmenu'){
    const items=player.items.filter(it=>it.count>0);
    items.forEach((it,i)=>{
      if(x>=510&&x<=635&&y>=340+i*38&&y<=340+(i+1)*38){
        bSubCursor=i; keyJust['z']=true;
      }
    });
    if(x>=510&&x<=635&&y>=440&&y<=470) keyJust['x']=true;
  }else if(bPhase==='executing'||bPhase==='enemy_turn'){
    if(bMsgDone&&x>=220&&x<=500&&y>=303&&y<=413) keyJust['z']=true;
  }else if(bPhase==='won'||bPhase==='lost'){
    if(bResultT>80) keyJust['z']=true;

}

function handlePasswordClick(x,y){
  if(pwMode==='show'){
    keyJust['z']=true; return;
  }
  // гӮӯгғјгғңгғјгғүгӮ°гғӘгғғгғү
  const KBX=30,KBY=130,KW=74,KH=34;
  if(x>=KBX&&x<=KBX+KW*KB_COLS&&y>=KBY+8&&y<=KBY+KB_ROWS*KH+8){
    const c=Math.floor((x-KBX)/KW);
    const r=Math.floor((y-KBY-8)/KH);
    if(r>=0&&r<KB_ROWS&&c>=0&&c<KB_COLS){
      pwKbRow=r; pwKbCol=c; keyJust['z']=true;
    }
  }
  // е…ҘеҠӣгӮ№гғӯгғғгғҲгҒ®гғҗгғғгӮҜгӮ№гғҡгғјгӮ№пјҲгӮ№гғӯгғғгғҲгӮ’гӮҜгғӘгғғгӮҜгҒ§ж¶ҲгҒҷпјү
  for(let i=0;i<20;i++){
    const sx=42+i*29,sy=82;
    if(x>=sx&&x<=sx+26&&y>=sy&&y<=sy+30&&i<pwInputPos){
      // гӮҜгғӘгғғгӮҜгҒ—гҒҹгӮ№гғӯгғғгғҲдҪҚзҪ®гҒҫгҒ§еүҠйҷӨ
      while(pwInputPos>i){pwInputPos--;pwInputArr[pwInputPos]='';}
      snd('cancel'); return;
    }
  }
  // жҲ»гӮӢгғңгӮҝгғіпјҲе·ҰдёӢгҒ®гҖҢгӮӮгҒ©гӮӢгҖҚпјү
  if(x>=36&&x<=126&&y>=414&&y<=450){ gState=pwFromState; snd('cancel'); return; }
  // жұәе®ҡгғңгӮҝгғігӮЁгғӘгӮўпјҲдёӢйғЁпјү
  if(y>=408&&y<=448) keyJust['Enter']=true;
}

// Dгғ‘гғғгғүгҒ®йҖЈз¶ҡз§»еӢ•еҮҰзҗҶпјҲmousedownдҝқжҢҒдёӯпјү
function updateDpadHeld(){
  if(gState!=='overworld'||fieldMenu) return;
  dpadMoveTimer++;
  if(dpadMoveTimer>=12){
    dpadMoveTimer=0;
    const dirs=['ArrowUp','ArrowRight','ArrowDown','ArrowLeft'];
    dirs.forEach(d=>{ if(dpadHeld[d]) keyJust[d]=true; });

}

// ===== Dгғ‘гғғгғүжҸҸз”» =====
function drawDpad(){
  const dirs=['вҶ‘','вҶ’','вҶ“','вҶҗ'];
  const labels=['вҶ‘','вҶ’','вҶ“','вҶҗ'];
  dirs.forEach((d,i)=>{
    const b=dpadBtn(i);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle='rgba(255,255,255,0.4)';
    ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='bold 22px monospace';ctx.textAlign='center';
    ctx.fillText(labels[i],b.x+b.w/2,b.y+b.h/2+8);
  });
  // ZгғңгӮҝгғіпјҲдёӯеӨ®пјҡжұәе®ҡпјү
  const zb=dpadBtn(4);
  ctx.fillStyle='rgba(0,80,160,0.6)';ctx.fillRect(zb.x,zb.y,zb.w,zb.h);
  ctx.strokeStyle='rgba(100,180,255,0.6)';ctx.lineWidth=1;ctx.strokeRect(zb.x,zb.y,zb.w,zb.h);
  ctx.fillStyle='rgba(180,220,255,0.9)';ctx.font='bold 13px monospace';
  ctx.fillText('жұәе®ҡ',zb.x+zb.w/2,zb.y+zb.h/2+5);
  // гғЎгғӢгғҘгғјгғңгӮҝгғі
  const mb=dpadBtn(5);
  ctx.fillStyle='rgba(60,40,0,0.6)';ctx.fillRect(mb.x,mb.y,mb.w,mb.h);
  ctx.strokeStyle='rgba(200,160,80,0.5)';ctx.lineWidth=1;ctx.strokeRect(mb.x,mb.y,mb.w,mb.h);
  ctx.fillStyle='rgba(220,180,80,0.9)';ctx.font='bold 11px monospace';
  ctx.fillText('гғЎгғӢгғҘгғј',mb.x+mb.w/2,mb.y+mb.h/2+4);
  ctx.textAlign='left';
}

// ===== GAME STATE =====
let gState='title'; // title,overworld,town,battle,ending

// ===== UTILITY =====
function wrapText(text,maxW){
  if(!text)return[];
  const lines=[], parts=text.split('\n');
  parts.forEach(p=>{
    for(let i=0;i<p.length;i+=maxW) lines.push(p.slice(i,i+maxW));
  });
  return lines.slice(0,4);
}

function lerp(a,b,t){return a+(b-a)*t;}

// ===== DRAW UTILITY =====
function win(x,y,w,h,alpha=1){
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#000b44';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#ffffff';ctx.lineWidth=3;
  ctx.strokeRect(x+2,y+2,w-4,h-4);
  ctx.strokeStyle='#2244aa';ctx.lineWidth=1;
  ctx.strokeRect(x+4,y+4,w-8,h-8);
  ctx.globalAlpha=1;
}

function txt(s,x,y,size=16,color='#ffffff',align='left'){
  ctx.font=`bold ${size}px "Courier New",monospace`;
  ctx.fillStyle=color; ctx.textAlign=align;
  ctx.fillText(s,x,y); ctx.textAlign='left';
}

function hpBar(label,x,y,w,cur,max){
  txt(label,x,y+11,13,'#ffffff');
  const bx=x+32,bw=w-32,bh=11;
  ctx.fillStyle='#222'; ctx.fillRect(bx,y,bw,bh);
  const r=Math.max(0,cur/max);
  ctx.fillStyle=r>0.5?'#00cc44':r>0.25?'#ffcc00':'#ff3300';
  ctx.fillRect(bx,y,Math.floor(bw*r),bh);
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,y,bw,bh);
  txt(`${cur}/${max}`,bx+bw+4,y+10,11,'#ffff88');
}

// ===== TILE DRAWING =====
function drawTile(type,px,py){
  const colors={[G]:'#448833',[W]:'#1133bb',[M]:'#776655',[T]:'#ccbb77',[D]:'#330022',[F]:'#224422',[X]:'#443322'};
  ctx.fillStyle=colors[type]||'#333'; ctx.fillRect(px,py,TW,TH);

  if(type===G){
    ctx.fillStyle='#55aa44';
    [[2,6,4,2],[12,2,3,2],[20,14,4,2],[8,20,5,2],[25,8,3,2]].forEach(([rx,ry,rw,rh])=>ctx.fillRect(px+rx,py+ry,rw,rh));
  }else if(type===W){
    ctx.fillStyle='#2244dd';
    ctx.fillRect(px+3,py+7,10,3); ctx.fillRect(px+16,py+18,12,3);
    ctx.fillStyle='#4466ff'; ctx.fillRect(px+8,py+3,6,2);
  }else if(type===M){
    ctx.fillStyle='#887766';
    ctx.beginPath(); ctx.moveTo(px+16,py+3); ctx.lineTo(px+3,py+29); ctx.lineTo(px+29,py+29); ctx.fill();
    ctx.fillStyle='#bbaa99';
    ctx.beginPath(); ctx.moveTo(px+16,py+3); ctx.lineTo(px+12,py+14); ctx.lineTo(px+20,py+14); ctx.fill();
  }else if(type===F){
    ctx.fillStyle='#336633'; ctx.beginPath(); ctx.arc(px+16,py+15,11,0,Math.PI*2); ctx.fill();

function drawEnemy(enemy,t){
  const x=420,y=180,fl=enemy.flashTimer>0;

function handleOverworld(){
  if(moveDelay>0){moveDelay--;return;}
  let dx=0,dy=0;
  if(keys['ArrowUp']   ||keyJust['ArrowUp'])   {dy=-1;player.dir=0;}
  else if(keys['ArrowRight']||keyJust['ArrowRight']){dx=1; player.dir=1;}
  else if(keys['ArrowDown'] ||keyJust['ArrowDown']) {dy=1; player.dir=2;}
  else if(keys['ArrowLeft'] ||keyJust['ArrowLeft']) {dx=-1;player.dir=3;}

  if(dx!==0||dy!==0){
    const nx=player.x+dx,ny=player.y+dy;
    if(nx>=0&&nx<MW&&ny>=0&&ny<MH&&WALKABLE.includes(MAP[ny][nx])){
      player.x=nx;player.y=ny;
      player.walkFrame^=1;
      moveDelay=10;snd('step');
      const tile=MAP[ny][nx];
      if(tile===T||tile===D) return; // handled by Z press
      // Random encounter
      const chance=tile===F?0.2:0.1;
      if(Math.random()<chance) startEncounter();
    }
  }

  const tile=MAP[player.y][player.x];
  if(keyJust['z']||keyJust['Z']){
    if(tile===T){ gState='town'; townCursor=0; townPhase='menu'; snd('confirm'); }
    else if(tile===D){ startBattle({...BOSS,hp:BOSS.hp}); }
  }
}

let bEnemy=null,bPhase='',bCursor=0,bSubCursor=0;
let bMsg='',bMsgTgt='',bMsgDone=false,bMsgT=0,bMsgCb=null;
let bAnimT=0,bResultT=0,bExpGain=0,bGoldGain=0,bLevelUp=false;
const BCMDS=['гҒҹгҒҹгҒӢгҒҶ','гҒҫгҒ»гҒҶ','гҒ©гҒҶгҒҗ','гҒ«гҒ’гӮӢ'];

function setMsg(text,cb){
  bMsgTgt=text;bMsgT=0;bMsg='';bMsgDone=false;bMsgCb=cb||null;
}
function updateMsg(){
  if(!bMsgTgt){bMsgDone=true;return;}
  if(bMsg.length<bMsgTgt.length){
    bMsgT++;if(bMsgT>=2){bMsgT=0;bMsg+=bMsgTgt[bMsg.length];}
  }else bMsgDone=true;
}

function startEncounter(){
  let pool;
  if(player.level<=2) pool=[EDEFS[0]];
  else if(player.level<=4) pool=[EDEFS[0],EDEFS[1],EDEFS[3]];
  else if(player.level<=6) pool=[EDEFS[1],EDEFS[2],EDEFS[3]];
  else pool=[EDEFS[2],EDEFS[3]];
  startBattle({...pool[pool.length*Math.random()|0]});
}

function startBattle(eDef){
  gState='battle';
  bEnemy={...eDef,flashTimer:0};
  bPhase='selecting';bCursor=0;bSubCursor=0;
  bAnimT=0;bResultT=0;bExpGain=0;bGoldGain=0;bLevelUp=false;
  player.flashTimer=0;
  setMsg(`${bEnemy.name}гҒҢ\nгҒӮгӮүгӮҸгӮҢгҒҹпјҒ`);
  snd('encounter');
}

function dmg(atk,def){return Math.max(1,Math.floor((atk-def)*(0.8+Math.random()*0.4)));}

function afterPlayer(){
  if(bEnemy.hp<=0){
    bExpGain=bEnemy.exp; bGoldGain=bEnemy.gold;
    player.exp+=bExpGain; player.gold+=bGoldGain;
    while(player.exp>=player.expNext){
      player.level++;
      player.maxHp+=8+Math.random()*5|0;
      player.maxMp+=2;player.hp=player.maxHp;player.mp=player.maxMp;
      player.atk+=3+Math.random()*2|0;
      player.def+=1+Math.random()*2|0;
      player.expNext=Math.floor(player.expNext*1.75);
      bLevelUp=true;snd('levelup');
    }
    bPhase='won';bResultT=0;return;
  }
  enemyTurn();
}

function enemyTurn(){
  bPhase='enemy_turn';
  let d,msg;
  if(bEnemy.isBoss&&Math.random()<0.3){
    d=15+Math.random()*18|0;
    msg=`${bEnemy.name}гҒҜ\nгҒҫгҒҳгӮ…гҒӨгӮ’гҖҖгҒЁгҒӘгҒҲгҒҹпјҒ\nгӮҶгҒҶгҒ—гӮғгҒ«гҖҖ${d}гҒ®\nгғҖгғЎгғјгӮёпјҒ`;
  }else{
    d=dmg(bEnemy.atk,player.def);
    msg=`${bEnemy.name}гҒ®\nгҒ“гҒҶгҒ’гҒҚпјҒ\nгӮҶгҒҶгҒ—гӮғгҒ«гҖҖ${d}гҒ®\nгғҖгғЎгғјгӮёпјҒ`;
  }
  player.hp=Math.max(0,player.hp-d);
  player.flashTimer=18;snd('attack');
  setMsg(msg,()=>{
    if(player.hp<=0){bPhase='lost';bResultT=0;snd('gameover');}
    else{bPhase='selecting';setMsg('');}
  });
}

function doAttack(){
  const d=dmg(player.atk,bEnemy.def);
  bEnemy.hp=Math.max(0,bEnemy.hp-d);
  bEnemy.flashTimer=20;snd('attack');
  setMsg(`${player.name}гҒ®\nгҒ“гҒҶгҒ’гҒҚпјҒ\n${bEnemy.name}гҒ«гҖҖ${d}гҒ®\nгғҖгғЎгғјгӮёпјҒ`,afterPlayer);
  bPhase='executing';
}
function doMagic(sp){
  if(player.mp<sp.mp){setMsg('MPгҒҢгҖҖгҒҹгӮҠгҒӘгҒ„пјҒ',()=>{bPhase='selecting';setMsg('');});bPhase='executing';return;}
  player.mp-=sp.mp;
  if(sp.type==='heal'){
    const h=Math.floor(sp.power*(0.8+Math.random()*0.4));
    player.hp=Math.min(player.maxHp,player.hp+h);snd('heal');
    setMsg(`${player.name}гҒҜгҖҖ${sp.name}гӮ’\nгҒЁгҒӘгҒҲгҒҹпјҒ\nHPгҒҢгҖҖ${h}гҖҖгҒӢгҒ„гҒөгҒҸпјҒ`,afterPlayer);
  }else{
    const d=Math.floor(sp.power*(0.8+Math.random()*0.4));
    bEnemy.hp=Math.max(0,bEnemy.hp-d);bEnemy.flashTimer=25;snd('magic');
    setMsg(`${player.name}гҒҜгҖҖ${sp.name}гӮ’\nгҒЁгҒӘгҒҲгҒҹпјҒ\n${bEnemy.name}гҒ«гҖҖ${d}гҒ®\nгҒ»гҒ®гҒҠгғҖгғЎгғјгӮёпјҒ`,afterPlayer);
  }
  bPhase='executing';
}
function doItem(item){
  const h=28+Math.random()*12|0;
  player.hp=Math.min(player.maxHp,player.hp+h);
  item.count--;snd('heal');
  setMsg(`${player.name}гҒҜгҖҖ${item.name}гӮ’\nгҒӨгҒӢгҒЈгҒҹпјҒ\nHPгҒҢгҖҖ${h}гҖҖгҒӢгҒ„гҒөгҒҸпјҒ`,afterPlayer);
  bPhase='executing';
}

function drawBattleBG(){
  const gr=ctx.createLinearGradient(0,0,0,295);
  gr.addColorStop(0,'#000022');gr.addColorStop(0.6,'#110033');gr.addColorStop(1,'#220011');
  ctx.fillStyle=gr;ctx.fillRect(0,0,640,295);
  ctx.fillStyle='rgba(255,255,255,0.8)';
  for(let i=0;i<20;i++){const sx=(i*137+30)%640,sy=(i*91+15)%200;ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();}
  const gg=ctx.createLinearGradient(0,265,0,295);
  gg.addColorStop(0,'#220011');gg.addColorStop(1,'#110008');
  ctx.fillStyle=gg;ctx.fillRect(0,265,640,30);
}

  drawBattleBG();

    drawEnemy(bEnemy,bAnimT);
    // Enemy HP

    txt(bEnemy.name,26,30,16,'#ff9999');
    hpBar('HP',16,36,295,bEnemy.hp,bEnemy.maxHp);
  }

    ctx.fillStyle='rgba(255,60,60,0.35)';ctx.fillRect(0,0,640,295);

  win(8,303,204,170);

  txt(`G:   ${player.gold}`,14,410,12,'#ffcc44');

  win(220,303,280,110);
  if(bMsgTgt){
    wrapText(bMsg,15).forEach((l,i)=>txt(l,236,330+i*24,15,'#ffffff'));

      if(Math.floor(bAnimT/22)%2===0) txt('в–ј',472,400,14,'#ffffff');
  }

  // Command / sub-menu
  if(bPhase==='selecting'){
    win(510,303,125,170);

    });
  }else if(bPhase==='spellmenu'){
    win(510,303,125,170);
    txt('гҒҫгҒ»гҒҶ',518,324,13,'#ffaaff');
    player.spells.forEach((sp,i)=>{
      const can=player.mp>=sp.mp;
      const isHov=mouseX>=510&&mouseX<=635&&mouseY>=340+i*38&&mouseY<=340+(i+1)*38;
      const isSel=i===bSubCursor;
      if(isSel){ctx.fillStyle='rgba(80,80,0,0.6)';ctx.fillRect(511,341+i*38,123,34);}
      else if(isHov&&can){ctx.fillStyle='rgba(40,40,80,0.7)';ctx.fillRect(511,341+i*38,123,34);}
      const col=isSel?'#ffff00':can?isHov?'#aaddff':'#ffffff':'#888888';

      txt(`${sp.mp}MP`,580,350+i*38,11,'#9999ff');
    });
    txt('пјҲпјёпјҡгӮӮгҒ©гӮӢпјү',515,450,11,'#888888');
  }else if(bPhase==='itemmenu'){
    win(510,303,125,170);
    txt('гҒ©гҒҶгҒҗ',518,324,13,'#ffffaa');
    const items=player.items.filter(it=>it.count>0);
    if(!items.length) txt('гҒӘгҒ—',530,360,14,'#888888');
    else items.forEach((it,i)=>{
      const isHov=mouseX>=510&&mouseX<=635&&mouseY>=340+i*38&&mouseY<=340+(i+1)*38;
      const isSel=i===bSubCursor;
      if(isSel){ctx.fillStyle='rgba(80,80,0,0.6)';ctx.fillRect(511,341+i*38,123,34);}
      else if(isHov){ctx.fillStyle='rgba(40,40,80,0.7)';ctx.fillRect(511,341+i*38,123,34);}
      const col=isSel?'#ffff00':isHov?'#aaddff':'#ffffff';
      txt((isSel?'в–¶':' ')+it.name,516,350+i*38,14,col);
      txt(`x${it.count}`,590,350+i*38,11,'#aaaaaa');
    });
    txt('пјҲпјёпјҡгӮӮгҒ©гӮӢпјү',515,450,11,'#888888');
  }else if(bPhase==='won'){
    bResultT++;
    win(220,303,415,170);
    txt('гҒ—гӮҮгҒҶгӮҠпјҒ',330,335,22,'#ffff00');
    txt(`${bExpGain} EXPгҖҖгҒӢгҒҸгҒЁгҒҸпјҒ`,236,368,15,'#88ff88');
    txt(`${bGoldGain} GгҖҖгҒӢгҒҸгҒЁгҒҸпјҒ`,236,392,15,'#ffcc44');
    if(bLevelUp) txt(`гғ¬гғҷгғ«гҒҢгҖҖ${player.level}гҒ«гҖҖгҒӮгҒҢгҒЈгҒҹпјҒ`,236,418,15,'#ff88ff');
    if(bResultT>80&&Math.floor(bResultT/28)%2===0) txt('пјәгӮӯгғјгҒ§гҖҖз¶ҡгҒ‘гӮӢ',316,455,13,'#aaaaaa');
  }else if(bPhase==='lost'){
    bResultT++;
    win(160,303,320,170);
    ctx.fillStyle='rgba(80,0,0,0.7)';ctx.fillRect(162,305,316,166);
    txt('гӮҶгҒҶгҒ—гӮғгҒҜгҖҖгҒҹгҒҠгӮҢгҒҹ...гҖҖ',170,370,14,'#ff4444');
    txt('гҒӮгҒҚгӮүгӮҒгӮӢгҒӘпјҒ',205,400,15,'#ffaa88');
    if(bResultT>80&&Math.floor(bResultT/28)%2===0) txt('пјәгӮӯгғјгҒ§гҖҖгӮ„гӮҠгҒӘгҒҠгҒҷ',190,445,13,'#aaaaaa');

function handleBattle(){
  if(bPhase==='selecting'){
    if(keyJust['ArrowUp']){bCursor=(bCursor-1+4)%4;snd('cursor');}
    if(keyJust['ArrowDown']){bCursor=(bCursor+1)%4;snd('cursor');}
    if(keyJust['z']||keyJust['Z']){
      snd('confirm');
      if(bCursor===0) doAttack();
      else if(bCursor===1){bPhase='spellmenu';bSubCursor=0;}
      else if(bCursor===2){bPhase='itemmenu';bSubCursor=0;}
      else{
        if(bEnemy.isBoss){setMsg('гҒ«гҒ’гӮүгӮҢгҒӘгҒ„пјҒ',()=>{bPhase='selecting';setMsg('');});bPhase='executing';}
        else if(Math.random()<0.65){gState='overworld';}
        else{setMsg('гҒ«гҒ’гӮүгӮҢгҒӘгҒӢгҒЈгҒҹпјҒ',()=>{enemyTurn();});bPhase='executing';}
      }
    }
  }else if(bPhase==='spellmenu'){
    if(keyJust['ArrowUp']){bSubCursor=(bSubCursor-1+player.spells.length)%player.spells.length;snd('cursor');}
    if(keyJust['ArrowDown']){bSubCursor=(bSubCursor+1)%player.spells.length;snd('cursor');}
    if(keyJust['z']||keyJust['Z']) doMagic(player.spells[bSubCursor]);
    if(keyJust['x']||keyJust['X']){bPhase='selecting';snd('cancel');}
  }else if(bPhase==='itemmenu'){
    const items=player.items.filter(it=>it.count>0);
    const n=Math.max(1,items.length);
    if(keyJust['ArrowUp']){bSubCursor=(bSubCursor-1+n)%n;snd('cursor');}
    if(keyJust['ArrowDown']){bSubCursor=(bSubCursor+1)%n;snd('cursor');}
    if(keyJust['z']||keyJust['Z']){if(items.length) doItem(items[bSubCursor]);}
    if(keyJust['x']||keyJust['X']){bPhase='selecting';snd('cancel');}
  }else if(bPhase==='executing'||bPhase==='enemy_turn'){
    if(bMsgDone&&(keyJust['z']||keyJust['Z'])){
      const cb=bMsgCb;bMsgCb=null;bMsgTgt='';bMsg='';bMsgDone=false;
      if(cb) cb();
    }
  }else if(bPhase==='won'){
    bResultT++;
    if(bResultT>80&&(keyJust['z']||keyJust['Z'])){
      if(bEnemy.isBoss){gState='ending';endT=0;snd('victory');}
      else{gState='overworld';}
      bMsgTgt='';bMsg='';
    }
  }else if(bPhase==='lost'){
    bResultT++;
    if(bResultT>80&&(keyJust['z']||keyJust['Z'])){
      player.hp=player.maxHp;player.mp=player.maxMp;
      player.x=2;player.y=1;
      gState='overworld';bMsgTgt='';bMsg='';
    }
  }
}

  }

    ctx.globalAlpha=Math.min(1,(endT-100)/50);
    ctx.fillStyle='#ffffff';ctx.font='20px "Courier New",monospace';

    ctx.fillText('дё–з•ҢгҒ«гҖҖгҒёгҒ„гӮҸгҒҢгҖҖгӮӮгҒ©гҒЈгҒҹпјҒ',320,235);
    ctx.globalAlpha=1;
  }
  if(endT>160){
    ctx.globalAlpha=Math.min(1,(endT-160)/50);
    win(160,270,320,150,ctx.globalAlpha);
    ctx.fillStyle='#ffcc88';ctx.font='16px "Courier New",monospace';
    ctx.fillText(`гғ¬гғҷгғ«пјҡ${player.level}`,320,305);
    ctx.fillText(`гӮҙгғјгғ«гғүпјҡ${player.gold} G`,320,332);
    ctx.fillText(`зөҢйЁ“еҖӨпјҡ${player.exp} EXP`,320,359);
    ctx.fillText(`HPпјҡ${player.hp} / ${player.maxHp}`,320,386);
    ctx.globalAlpha=1;
  }
  if(endT>250&&Math.floor(endT/30)%2===0){
    ctx.fillStyle='#aaaaaa';ctx.font='14px "Courier New",monospace';
    ctx.fillText('пјәгӮӯгғјгҒ§гҖҖгӮҝгӮӨгғҲгғ«гҒё',320,455);
  }
  ctx.textAlign='left';
  if(endT>250&&(keyJust['z']||keyJust['Z'])){
    gState='title';titleT=0;
    player.hp=player.maxHp;player.mp=player.maxMp;
    player.x=2;player.y=1;
  }
}

// ===== еҫ©жҙ»гҒ®е‘Әж–Ү =====
// 64зЁ®гӮ«гӮҝгӮ«гғҠж–Үеӯ—гӮ»гғғгғҲпјҲ6bit/ж–Үеӯ— Г— 20ж–Үеӯ— = 120bitпјү
const SPELL_CHARS='гӮўгӮӨгӮҰгӮЁгӮӘгӮ«гӮӯгӮҜгӮұгӮігӮөгӮ·гӮ№гӮ»гӮҪгӮҝгғҒгғ„гғҶгғҲгғҠгғӢгғҢгғҚгғҺгғҸгғ’гғ•гғҳгғӣгғһгғҹгғ гғЎгғўгғӨгғҰгғЁгғ©гғӘгғ«гғ¬гғӯгғҜгғІгғігӮ¬гӮ®гӮ°гӮІгӮҙгӮ¶гӮёгӮәгӮјгӮҫгғҖгғӮгғ…гғҮгғүгғҗгғ“';

// гғ“гғғгғҲеҲ—гӮЁгғігӮігғјгғү
function bitsWrite(arr,pos,val,bits){
  for(let i=bits-1;i>=0;i--){arr[pos+bits-1-i]=(val>>i)&1;}
  return pos+bits;
}
function bitsRead(arr,pos,bits){
  let v=0;
  for(let i=0;i<bits;i++) v=(v<<1)|arr[pos+i];
  return[v,pos+bits];
}

// гғ—гғ¬гӮӨгғӨгғјзҠ¶ж…Ӣ вҶ’ е‘Әж–Үж–Үеӯ—еҲ—пјҲгғҒгӮ§гғғгӮҜгӮөгғ иҫјгҒҝпјү
// гғ“гғғгғҲеүІеҪ“: level(7) hp(10) maxHp(10) mp(7) maxMp(7) atk(7) def(7)
//             exp(14) expNext(14) gold(14) yakusou(7) x(5) y(4) chk(7)  = 120bit
function encodePassword(){
  const bits=new Array(120).fill(0);
  const yaku=(player.items.find(i=>i.name==='гӮ„гҒҸгҒқгҒҶ')||{count:0}).count;
  let p=0;
  p=bitsWrite(bits,p,Math.min(player.level,127),7);
  p=bitsWrite(bits,p,Math.min(player.hp,1023),10);
  p=bitsWrite(bits,p,Math.min(player.maxHp,1023),10);
  p=bitsWrite(bits,p,Math.min(player.mp,127),7);
  p=bitsWrite(bits,p,Math.min(player.maxMp,127),7);
  p=bitsWrite(bits,p,Math.min(player.atk,127),7);
  p=bitsWrite(bits,p,Math.min(player.def,127),7);
  p=bitsWrite(bits,p,Math.min(player.exp,16383),14);
  p=bitsWrite(bits,p,Math.min(player.expNext,16383),14);
  p=bitsWrite(bits,p,Math.min(player.gold,16383),14);
  p=bitsWrite(bits,p,Math.min(yaku,127),7);
  p=bitsWrite(bits,p,Math.min(player.x,31),5);
  p=bitsWrite(bits,p,Math.min(player.y,15),4);
  // гғҒгӮ§гғғгӮҜгӮөгғ пјҲе…Ҳй ӯ113bitгҒ®еҗҲиЁҲ mod 128пјү
  let chk=0; for(let i=0;i<113;i++) chk=(chk+bits[i])%128;
  bitsWrite(bits,p,chk,7);
  // 6bitгҒҡгҒӨж–Үеӯ—гҒ«еӨүжҸӣ
  let result='';
  for(let i=0;i<20;i++){
    let idx=0;
    for(let b=0;b<6;b++) idx=(idx<<1)|bits[i*6+b];
    result+=SPELL_CHARS[idx];
  }
  return result;
}

// е‘Әж–Үж–Үеӯ—еҲ— вҶ’ гғ—гғ¬гӮӨгғӨгғјзҠ¶ж…ӢпјҲеҫ©е…ғпјү
function decodePassword(str){
  if(str.length!==20) return{ok:false,msg:'е‘Әж–ҮгҒҜгҖҖпј’пјҗж–Үеӯ—гҖҖгҒІгҒӨгӮҲгҒҶгҒ§гҒҷ'};
  const bits=[];
  for(const ch of str){
    const idx=SPELL_CHARS.indexOf(ch);
    if(idx<0) return{ok:false,msg:`гҖҢ${ch}гҖҚгҒҜгҖҖгҒҹгҒ гҒ—гҒҸгҒӘгҒ„\nж–Үеӯ—гҒ§гҒҷ`};
    for(let b=5;b>=0;b--) bits.push((idx>>b)&1);
  }
  let p=0,v;
  [v,p]=bitsRead(bits,p,7);  const level=v;
  [v,p]=bitsRead(bits,p,10); const hp=v;
  [v,p]=bitsRead(bits,p,10); const maxHp=v;
  [v,p]=bitsRead(bits,p,7);  const mp=v;
  [v,p]=bitsRead(bits,p,7);  const maxMp=v;
  [v,p]=bitsRead(bits,p,7);  const atk=v;
  [v,p]=bitsRead(bits,p,7);  const def=v;
  [v,p]=bitsRead(bits,p,14); const exp=v;
  [v,p]=bitsRead(bits,p,14); const expNext=v;
  [v,p]=bitsRead(bits,p,14); const gold=v;
  [v,p]=bitsRead(bits,p,7);  const yaku=v;
  [v,p]=bitsRead(bits,p,5);  const px=v;
  [v,p]=bitsRead(bits,p,4);  const py=v;
  [v,  ]=bitsRead(bits,p,7);  const chkGot=v;
  let chkCalc=0; for(let i=0;i<113;i++) chkCalc=(chkCalc+bits[i])%128;
  if(chkCalc!==chkGot) return{ok:false,msg:'е‘Әж–ҮгҒҢгҖҖгҒҫгҒЎгҒҢгҒЈгҒҰгҒ„гҒҫгҒҷпјҒ\nгӮӮгҒҶгҒ„гҒЎгҒ©гҖҖгҒӢгҒҸгҒ«гӮ“гҒ—гҒҰ\nгҒҸгҒ гҒ•гҒ„'};
  if(level<1||maxHp<1) return{ok:false,msg:'гғҮгғјгӮҝгҒҢгҖҖгҒ“гӮҸгӮҢгҒҰгҒ„гҒҫгҒҷ'};
  return{ok:true,level,hp:Math.min(hp,maxHp),maxHp,mp:Math.min(mp,maxMp),maxMp,atk,def,exp,expNext,gold,yaku,px:Math.min(px,MW-1),py:Math.min(py,MH-1)};
}

function applyPassword(d){
  player.level=d.level; player.hp=d.hp; player.maxHp=d.maxHp;
  player.mp=d.mp; player.maxMp=d.maxMp; player.atk=d.atk; player.def=d.def;
  player.exp=d.exp; player.expNext=d.expNext; player.gold=d.gold;
  player.x=d.px; player.y=d.py;
  const y=player.items.find(i=>i.name==='гӮ„гҒҸгҒқгҒҶ');
  if(y) y.count=d.yaku; else if(d.yaku>0) player.items.push({name:'гӮ„гҒҸгҒқгҒҶ',count:d.yaku});
}

// ===== е‘Әж–ҮUI =====
// гӮ«гӮҝгӮ«гғҠгӮӯгғјгғңгғјгғү 8еҲ—Г—8иЎҢ = 64ж–Үеӯ—
const KB_COLS=8, KB_ROWS=8;
let pwMode='show'; // 'show' or 'input'
let pwInputArr=new Array(20).fill(''); // е…ҘеҠӣдёӯгҒ®ж–Үеӯ—
let pwInputPos=0;  // гӮ«гғјгӮҪгғ«дҪҚзҪ®пјҲ0-19пјү
let pwKbRow=0, pwKbCol=0; // гӮӯгғјгғңгғјгғүгӮ«гғјгӮҪгғ«
let pwMsg='', pwMsgT=0, pwResult=null;
let pwFromState=''; // гҒ©гҒ“гҒӢгӮүжқҘгҒҹгҒӢ

function openPassword(from,mode){
  pwFromState=from; pwMode=mode;
  pwMsg=''; pwMsgT=0; pwResult=null;
  pwInputArr=new Array(20).fill('');
  pwInputPos=0; pwKbRow=0; pwKbCol=0;
  gState='password';
}

function drawPasswordScreen(){
  // BG
  const gr=ctx.createLinearGradient(0,0,0,480);
  gr.addColorStop(0,'#000814');gr.addColorStop(1,'#001122');
  ctx.fillStyle=gr; ctx.fillRect(0,0,640,480);

  ctx.textAlign='center';
  ctx.shadowColor='#00aaff'; ctx.shadowBlur=15;
  ctx.fillStyle='#00ccff'; ctx.font='bold 22px "Courier New",monospace';
  ctx.fillText('гҒөгҒЈгҒӢгҒӨгҒ®гҖҖгҒҳгӮ…гӮӮгӮ“',320,32);
  ctx.shadowBlur=0;

  if(pwMode==='show'){
    // зҸҫеңЁгҒ®зҠ¶ж…ӢгӮ’е‘Әж–ҮеҢ–гҒ—гҒҰиЎЁзӨә
    const pw=encodePassword();
    win(80,50,480,110);
    ctx.fillStyle='#aaddff'; ctx.font='13px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('гҒ“гҒ®гҒҳгӮ…гӮӮгӮ“гӮ’гҖҖгғЎгғўгҒ—гҒҰгҒҸгҒ гҒ•гҒ„',320,75);
    // 10ж–Үеӯ—гҒҡгҒӨ2иЎҢгҒ§иЎЁзӨә
    ctx.fillStyle='#ffff44'; ctx.font='bold 28px "Courier New",monospace';
    ctx.letterSpacing='6px';
    ctx.fillText(pw.slice(0,10),320,110);
    ctx.fillText(pw.slice(10,20),320,148);
    ctx.letterSpacing='0px';
    // гӮ№гғҶгғјгӮҝгӮ№гӮөгғһгғӘ
    win(80,175,480,120);
    ctx.fillStyle='#88ccff'; ctx.font='13px "Courier New",monospace';
    ctx.fillText(`Lv.${player.level}гҖҖHP:${player.hp}/${player.maxHp}гҖҖMP:${player.mp}/${player.maxMp}`,320,200);
    ctx.fillText(`ATK:${player.atk}гҖҖDEF:${player.def}гҖҖEXP:${player.exp}`,320,222);
    ctx.fillText(`GOLD:${player.gold}GгҖҖгӮ„гҒҸгҒқгҒҶ:${(player.items.find(i=>i.name==='гӮ„гҒҸгҒқгҒҶ')||{count:0}).count}гҒ“`,320,244);
    ctx.fillText(`гғ•гӮЈгғјгғ«гғүеә§жЁҷ (${player.x}, ${player.y})`,320,268);
    ctx.fillStyle='#888888'; ctx.font='13px "Courier New",monospace';
    ctx.fillText('пјёгӮӯгғјгҒ§гҖҖгӮӮгҒ©гӮӢ',320,450);
  }else{
    // е…ҘеҠӣгғўгғјгғү
    // е…ҘеҠӣгӮ№гғӯгғғгғҲпјҲ20ж–Үеӯ—пјү
    win(30,48,580,70);
    ctx.fillStyle='#aaddff'; ctx.font='13px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('гҒҳгӮ…гӮӮгӮ“гӮ’гҖҖгҒ«гӮ…гҒҶгӮҠгӮҮгҒҸгҒ—гҒҰгҖҖгҒҸгҒ гҒ•гҒ„',320,68);
    for(let i=0;i<20;i++){
      const slotX=42+i*29, slotY=82, slotW=26, slotH=30;
      const isCur=(i===pwInputPos);
      ctx.fillStyle=isCur?'#003366':'#001133';
      ctx.fillRect(slotX,slotY,slotW,slotH);
      ctx.strokeStyle=isCur?'#00ffff':'#004488';
      ctx.lineWidth=isCur?2:1; ctx.strokeRect(slotX,slotY,slotW,slotH);
      if(pwInputArr[i]){
        ctx.fillStyle=isCur?'#ffff00':'#ffffff';
        ctx.font=`bold 16px "Courier New",monospace`;
        ctx.fillText(pwInputArr[i],slotX+13,slotY+22);
      }
      if(isCur&&Math.floor(Date.now()/400)%2===0){
        ctx.fillStyle='#00ffff'; ctx.fillRect(slotX+2,slotY+27,22,2);
      }
      if(i===9){ctx.fillStyle='#004488';ctx.fillRect(slotX+slotW+1,slotY+5,2,20);}
    }

    // гӮӯгғјгғңгғјгғүгӮ°гғӘгғғгғү
    const KBX=30, KBY=130, KW=74, KH=34;
    win(28,128,584,KB_ROWS*KH+16);
    for(let r=0;r<KB_ROWS;r++){
      for(let c=0;c<KB_COLS;c++){
        const idx=r*KB_COLS+c;
        if(idx>=64) break;
        const kx=KBX+c*KW+2, ky=KBY+r*KH+8;
        const isCur=(r===pwKbRow&&c===pwKbCol);
        ctx.fillStyle=isCur?'#002255':'#001133';
        ctx.fillRect(kx,ky,KW-4,KH-4);
        ctx.strokeStyle=isCur?'#00ffff':'#003366';
        ctx.lineWidth=1; ctx.strokeRect(kx,ky,KW-4,KH-4);
        ctx.fillStyle=isCur?'#ffff00':'#ccddff';
        ctx.font=`${isCur?'bold ':''}17px "Courier New",monospace`;
        ctx.fillText(SPELL_CHARS[idx],kx+(KW-4)/2,ky+(KH-4)*0.68);
      }
    }

    // ж“ҚдҪңиӘ¬жҳҺ + гӮӮгҒ©гӮӢгғңгӮҝгғі
    win(30,408,580,56);
    // гӮӮгҒ©гӮӢгғңгӮҝгғі
    ctx.fillStyle='rgba(120,40,40,0.8)';ctx.fillRect(36,414,90,36);
    ctx.strokeStyle='#ff8888';ctx.lineWidth=1;ctx.strokeRect(36,414,90,36);
    ctx.fillStyle='#ffaaaa';ctx.font='bold 14px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('гӮӮгҒ©гӮӢ',81,437);
    ctx.fillStyle='#7799bb';ctx.font='12px "Courier New",monospace';
    ctx.fillText('зҹўеҚ°пјҡгӮ«гғјгӮҪгғ«гҖҖпјәпјҡе…ҘеҠӣгҖҖпјёпјҡпј‘ж–Үеӯ—ж¶ҲгҒҷгҖҖEnterпјҡгҒ‘гҒЈгҒҰгҒ„',340,437);
    ctx.textAlign='left';

    // гӮЁгғ©гғјгғЎгғғгӮ»гғјгӮё
    if(pwMsg){
      win(80,355,480,48);
      ctx.fillStyle=pwResult?'#88ff88':'#ff6666';
      ctx.font='14px "Courier New",monospace';
      wrapText(pwMsg,28).slice(0,2).forEach((l,i)=>ctx.fillText(l,320,376+i*20));
    }
  }
  ctx.textAlign='left';
}

function handlePasswordScreen(){
  if(pwMode==='show'){
    if(keyJust['x']||keyJust['X']||keyJust['z']||keyJust['Z']){
      gState=pwFromState; snd('cancel');
    }
    return;
  }
  // е…ҘеҠӣгғўгғјгғү
  if(keyJust['ArrowUp']){pwKbRow=(pwKbRow-1+KB_ROWS)%KB_ROWS;snd('cursor');}
  if(keyJust['ArrowDown']){pwKbRow=(pwKbRow+1)%KB_ROWS;snd('cursor');}
  if(keyJust['ArrowLeft']){pwKbCol=(pwKbCol-1+KB_COLS)%KB_COLS;snd('cursor');}
  if(keyJust['ArrowRight']){pwKbCol=(pwKbCol+1)%KB_COLS;snd('cursor');}

  // EscгӮӯгғјгҒҫгҒҹгҒҜгҖҢгӮӮгҒ©гӮӢгҖҚгҒ§еҚіи„ұеҮә
  if(keyJust['Escape']||keyJust['Backspace']){
    gState=pwFromState; snd('cancel'); return;
  }

  if(keyJust['z']||keyJust['Z']){
    if(pwInputPos<20){
      const idx=pwKbRow*KB_COLS+pwKbCol;
      if(idx<64){ pwInputArr[pwInputPos]=SPELL_CHARS[idx]; pwInputPos++; snd('confirm'); }
    }
  }
  if(keyJust['x']||keyJust['X']){
    if(pwInputPos>0){ pwInputPos--; pwInputArr[pwInputPos]=''; snd('cancel'); }
    else{ gState=pwFromState; snd('cancel'); }
  }
  if(keyJust['Enter']){
    if(pwInputPos===20){
      const result=decodePassword(pwInputArr.join(''));
      if(result.ok){
        applyPassword(result);
        pwMsg='гҒҳгӮ…гӮӮгӮ“гӮ’гҖҖгҒ«гӮ…гҒҶгӮҠгӮҮгҒҸгҒ—гҒҹпјҒ\nгҒјгҒҶгҒ‘гӮ“гӮ’гҖҖгҒ•гҒ„гҒӢгҒ„пјҒ';
        pwResult=true; snd('levelup');
        setTimeout(()=>{ gState='overworld'; },1800);
      }else{
        pwMsg=result.msg; pwResult=false; snd('cancel');
      }
    }else{
      pwMsg=`гҒӮгҒЁгҖҖ${20-pwInputPos}ж–Үеӯ—гҖҖгҒҹгӮҠгҒҫгҒӣгӮ“`; pwResult=false; snd('cancel');
    }
  }
}

// ===== гғ•гӮЈгғјгғ«гғүгғЎгғӢгғҘгғјгҒ«е‘Әж–ҮгӮӘгғ—гӮ·гғ§гғіиҝҪеҠ  =====
let fieldMenu=false, fieldMenuCursor=0;
const FIELD_OPTS=['гҒөгҒЈгҒӢгҒӨгҒ®гҖҖгҒҳгӮ…гӮӮгӮ“гӮ’гҖҖгҒҝгӮӢ','гҒҳгӮ…гӮӮгӮ“гӮ’гҖҖгҒ«гӮ…гҒҶгӮҠгӮҮгҒҸгҒҷгӮӢ','гҒЁгҒҳгӮӢ'];

function drawFieldMenu(){
  win(380,260,250,130);
  txt('гғЎгғӢгғҘгғј',396,285,14,'#ffff88');
  FIELD_OPTS.forEach((o,i)=>{
    const col=i===fieldMenuCursor?'#ffff00':'#ffffff';
    txt((i===fieldMenuCursor?'в–¶':' ')+o,388,310+i*28,12,col);
  });
}

// ===== MAIN LOOP =====
function loop(){
  ctx.clearRect(0,0,640,480);
  updateDpadHeld();
  switch(gState){
    case'title':
      drawTitle();
      if(keyJust['z']||keyJust['Z']){gState='overworld';snd('confirm');try{AC&&AC.resume();}catch(e){}}
      break;
    case'overworld':
      drawOverworld();
      if(fieldMenu){
        drawFieldMenu();
        if(keyJust['ArrowUp']){fieldMenuCursor=(fieldMenuCursor-1+3)%3;snd('cursor');}
        if(keyJust['ArrowDown']){fieldMenuCursor=(fieldMenuCursor+1)%3;snd('cursor');}
        if(keyJust['z']||keyJust['Z']){
          snd('confirm');
          if(fieldMenuCursor===0){fieldMenu=false;openPassword('overworld','show');}
          else if(fieldMenuCursor===1){fieldMenu=false;openPassword('overworld','input');}
          else{fieldMenu=false;}
        }
        if(keyJust['x']||keyJust['X']){fieldMenu=false;snd('cancel');}
      }else{
        if(keyJust['Enter']){fieldMenu=true;fieldMenuCursor=0;snd('cursor');}
        else handleOverworld();
      }
      drawDpad();
      break;
    case'town':     drawTown();    handleTown(); break;
    case'battle':   drawBattle();  handleBattle(); break;
    case'password': drawPasswordScreen(); handlePasswordScreen(); break;
    case'ending':   drawEnding();  break;
  }
  for(const k in keyJust) delete keyJust[k];
  requestAnimationFrame(loop);
}
loop();
</script>
