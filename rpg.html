// ===== AUDIO =====
let AC;
try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}

function beep(freq,dur,type='sine',vol=0.15,freqEnd=null,startDelay=0){
  if(!AC)return;
  try{
    if(AC.state==='suspended')AC.resume();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.connect(g); g.connect(AC.destination);
    const t=AC.currentTime+startDelay;
    o.frequency.setValueAtTime(freq,t);
    if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.01);
  }catch(e){}
}

function snd(type){
  switch(type){
    case'cursor': beep(440,0.05,'sine',0.06); break;
    case'confirm': beep(660,0.08,'sine',0.1); break;
    case'cancel': beep(220,0.1,'sine',0.1); break;
    case'step': beep(180,0.04,'sine',0.02); break;
    case'attack': beep(200,0.18,'sawtooth',0.15,50); break;
    case'magic': beep(400,0.3,'sine',0.18,900); break;
    case'heal': beep(550,0.08,'sine',0.12); beep(700,0.12,'sine',0.12,null,0.1); beep(880,0.2,'sine',0.12,null,0.2); break;
    case'encounter': [200,150,250,300].forEach((f,i)=>beep(f,0.12,'square',0.12,null,i*0.1)); break;
    case'levelup': [523,659,784,1047].forEach((f,i)=>beep(f,0.18,'sine',0.2,null,i*0.12)); break;
    case'gameover': beep(300,1.5,'sawtooth',0.18,40); break;
    case'victory': [523,523,523,523,415,466,523,466,523].forEach((f,i)=>beep(f,0.15,'sine',0.2,null,i*0.14)); break;
  }
}

// ===== UTILITY =====
function wrapText(text,maxW){
  if(!text)return[];
  const lines=[], parts=text.split('\n');
  parts.forEach(p=>{
    for(let i=0;i<p.length;i+=maxW) lines.push(p.slice(i,i+maxW));
  });
  return lines.slice(0,4);
}

function lerp(a,b,t){return a+(b-a)*t;}

// ===== DRAW UTILITY =====
function win(x,y,w,h,alpha=1){
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#000b44';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#ffffff';ctx.lineWidth=3;
  ctx.strokeRect(x+2,y+2,w-4,h-4);
  ctx.strokeStyle='#2244aa';ctx.lineWidth=1;
  ctx.strokeRect(x+4,y+4,w-8,h-8);
  ctx.globalAlpha=1;
}

function txt(s,x,y,size=16,color='#ffffff',align='left'){
  ctx.font=`bold ${size}px "Courier New",monospace`;
  ctx.fillStyle=color; ctx.textAlign=align;
  ctx.fillText(s,x,y); ctx.textAlign='left';
}

function hpBar(label,x,y,w,cur,max){
  txt(label,x,y+11,13,'#ffffff');
  const bx=x+32,bw=w-32,bh=11;
  ctx.fillStyle='#222'; ctx.fillRect(bx,y,bw,bh);
  const r=Math.max(0,cur/max);
  ctx.fillStyle=r>0.5?'#00cc44':r>0.25?'#ffcc00':'#ff3300';
  ctx.fillRect(bx,y,Math.floor(bw*r),bh);
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,y,bw,bh);
  txt(`${cur}/${max}`,bx+bw+4,y+10,11,'#ffff88');
}

// ===== TILE DRAWING =====
function drawTile(type,px,py){
  const colors={[G]:'#448833',[W]:'#1133bb',[M]:'#776655',[T]:'#ccbb77',[D]:'#330022',[F]:'#224422',[X]:'#443322'};
  ctx.fillStyle=colors[type]||'#333'; ctx.fillRect(px,py,TW,TH);

  if(type===G){
    ctx.fillStyle='#55aa44';
    [[2,6,4,2],[12,2,3,2],[20,14,4,2],[8,20,5,2],[25,8,3,2]].forEach(([rx,ry,rw,rh])=>ctx.fillRect(px+rx,py+ry,rw,rh));
  }else if(type===W){
    ctx.fillStyle='#2244dd';
    ctx.fillRect(px+3,py+7,10,3); ctx.fillRect(px+16,py+18,12,3);
    ctx.fillStyle='#4466ff'; ctx.fillRect(px+8,py+3,6,2);
  }else if(type===M){
    ctx.fillStyle='#887766';
    ctx.beginPath(); ctx.moveTo(px+16,py+3); ctx.lineTo(px+3,py+29); ctx.lineTo(px+29,py+29); ctx.fill();
    ctx.fillStyle='#bbaa99';
    ctx.beginPath(); ctx.moveTo(px+16,py+3); ctx.lineTo(px+12,py+14); ctx.lineTo(px+20,py+14); ctx.fill();
  }else if(type===F){
    ctx.fillStyle='#336633'; ctx.beginPath(); ctx.arc(px+16,py+15,11,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#44aa44'; ctx.beginPath(); ctx.arc(px+16,py+11,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#553322'; ctx.fillRect(px+13,py+24,6,7);
  }else if(type===T){
    ctx.fillStyle='#ddcc88'; ctx.fillRect(px,py,TW,TH);
    ctx.fillStyle='#cc7733'; ctx.fillRect(px+6,py+13,20,16);
    ctx.fillStyle='#cc3322';
    ctx.beginPath(); ctx.moveTo(px+4,py+14); ctx.lineTo(px+16,py+3); ctx.lineTo(px+28,py+14); ctx.fill();
    ctx.fillStyle='#7799cc'; ctx.fillRect(px+12,py+20,7,8);
    ctx.fillStyle='#cc9922'; ctx.fillRect(px+12,py+20,7,2);
  }else if(type===D){
    ctx.fillStyle='#220011'; ctx.fillRect(px,py,TW,TH);
    ctx.fillStyle='#440033'; ctx.fillRect(px+9,py+7,14,18);
    ctx.fillStyle='#110011';
    ctx.beginPath(); ctx.arc(px+16,py+18,6,Math.PI,0); ctx.fill();
    ctx.fillStyle='#ff0000'; ctx.fillRect(px+13,py+13,2,2); ctx.fillRect(px+17,py+13,2,2);
  }else if(type===X){
    ctx.fillStyle='#554433'; ctx.fillRect(px,py,TW,TH);
    ctx.fillStyle='#443322';
    for(let i=0;i<4;i++) for(let j=0;j<4;j++) if((i+j)%2===0) ctx.fillRect(px+i*8,py+j*8,8,8);
  }
}

  // Helmet
  ctx.fillStyle='#bb9933'; ctx.fillRect(px+8,py+5,16,7);

  ctx.fillStyle='#ff4444'; ctx.fillRect(px+13,py+1,6,5);
  // Eyes
  ctx.fillStyle='#332200'; ctx.fillRect(px+12,py+11,2,2); ctx.fillRect(px+18,py+11,2,2);
  // Sword
  ctx.fillStyle='#ccddee'; ctx.fillRect(px+24,py+13,3,15);
  ctx.fillStyle='#ddaa33'; ctx.fillRect(px+21,py+17,9,3);
  ctx.fillStyle='#ffffaa'; ctx.fillRect(px+25,py+13,1,3);
  // Shield
  ctx.fillStyle='#cc4422'; ctx.beginPath(); ctx.arc(px+7,py+19,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffcc44'; ctx.beginPath(); ctx.arc(px+7,py+19,2,0,Math.PI*2); ctx.fill();
  // Legs
  ctx.fillStyle='#224488';
  ctx.fillRect(px+9,py+27,6,5+b); ctx.fillRect(px+17,py+27,6,5-b);
  // Boots
  ctx.fillStyle='#442211';
  ctx.fillRect(px+8,py+30+b,7,3); ctx.fillRect(px+17,py+30-b,7,3);
}

// ===== ENEMY SPRITES =====
function drawSlime(x,y,col,fl,t){
  const bob=Math.sin(t*0.06)*4, c=fl?'#ffffff':col;
  ctx.fillStyle=c;
  ctx.beginPath(); ctx.ellipse(x,y+5+bob,36,30,0,0,Math.PI*2); ctx.fill();
  if(!fl){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.ellipse(x-11,y-8+bob,10,8,-0.3,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.ellipse(x-13,y-4+bob,6,7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+13,y-4+bob,6,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#001144';
  ctx.beginPath();ctx.ellipse(x-12,y-4+bob,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+14,y-4+bob,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#001144';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(x,y+10+bob,9,0,Math.PI);ctx.stroke();
}

function drawBat(x,y,fl,t){
  const c=fl?'#ffffff':'#553366', wf=Math.sin(t*0.18)*18;
  ctx.fillStyle=c;
  ctx.beginPath();ctx.moveTo(x-10,y);ctx.quadraticCurveTo(x-50,y-20+wf,x-65,y+5+wf);ctx.quadraticCurveTo(x-40,y+18,x-10,y+10);ctx.fill();
  ctx.beginPath();ctx.moveTo(x+10,y);ctx.quadraticCurveTo(x+50,y-20+wf,x+65,y+5+wf);ctx.quadraticCurveTo(x+40,y+18,x+10,y+10);ctx.fill();
  ctx.fillStyle=fl?'#ffffff':'#331144';
  ctx.beginPath();ctx.ellipse(x,y+5,17,22,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=c;
  ctx.beginPath();ctx.moveTo(x-8,y-10);ctx.lineTo(x-16,y-32);ctx.lineTo(x-2,y-10);ctx.fill();
  ctx.beginPath();ctx.moveTo(x+8,y-10);ctx.lineTo(x+16,y-32);ctx.lineTo(x+2,y-10);ctx.fill();
  ctx.fillStyle='#ff6600';
  ctx.beginPath();ctx.ellipse(x-7,y+1,5,5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+7,y+1,5,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(x-7,y+1,2,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+7,y+1,2,2,0,0,Math.PI*2);ctx.fill();
}

function drawSlug(x,y,fl,t){
  const c=fl?'#ffffff':'#44aa33', bob=Math.sin(t*0.04)*3;
  ctx.fillStyle=c;
  ctx.beginPath();ctx.ellipse(x+5,y+10+bob,52,22,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x-38,y+2+bob,20,17,-0.2,0,Math.PI*2);ctx.fill();
  if(!fl){ctx.fillStyle='rgba(150,255,80,0.3)';ctx.beginPath();ctx.ellipse(x+5,y+25+bob,50,8,0,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle=fl?'#ffffff':'#226622';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x-44,y-6+bob);ctx.quadraticCurveTo(x-55,y-28+bob,x-50,y-40+bob);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-34,y-5+bob);ctx.quadraticCurveTo(x-28,y-30+bob,x-25,y-42+bob);ctx.stroke();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x-50,y-40+bob,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-25,y-42+bob,3,0,Math.PI*2);ctx.fill();
}

function drawMetal(x,y,fl,t){
  const bob=Math.sin(t*0.06)*3;
  const gr=ctx.createRadialGradient(x-10,y-8+bob,0,x,y+bob,36);
  if(fl){gr.addColorStop(0,'#fff');gr.addColorStop(1,'#fff');}
  else{gr.addColorStop(0,'#eef4ff');gr.addColorStop(0.5,'#aabbcc');gr.addColorStop(1,'#667788');}
  ctx.fillStyle=gr;
  ctx.beginPath();ctx.ellipse(x,y+5+bob,33,28,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=fl?'#ffffff':'#99aabb';
  ctx.beginPath();ctx.moveTo(x,y-24+bob);ctx.lineTo(x-6,y-14+bob);ctx.lineTo(x+6,y-14+bob);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(x-11,y-2+bob,5,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+11,y-2+bob,5,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#001144';
  ctx.beginPath();ctx.ellipse(x-10,y-1+bob,2.5,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+12,y-1+bob,2.5,3.5,0,0,Math.PI*2);ctx.fill();
}

function drawBoss(x,y,fl,t){
  const bob=Math.sin(t*0.025)*5;
  if(!fl){
    ctx.strokeStyle='#660000';ctx.lineWidth=3;
    for(let i=0;i<4;i++){ctx.globalAlpha=0.25-i*0.05;ctx.beginPath();ctx.ellipse(x,y-15+bob,40+i*18,55+i*18,0,0,Math.PI*2);ctx.stroke();}
    ctx.globalAlpha=1;
  }
  ctx.fillStyle=fl?'#ffffff':'#220000';
  ctx.beginPath();ctx.moveTo(x,y-55+bob);ctx.lineTo(x-55,y+45+bob);ctx.lineTo(x+55,y+45+bob);ctx.fill();
  ctx.fillStyle=fl?'#ffffff':'#440000';
  ctx.beginPath();ctx.ellipse(x,y-15+bob,32,45,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=fl?'#ffffff':'#330000';
  ctx.beginPath();ctx.ellipse(x,y-68+bob,30,32,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=fl?'#ffffff':'#770000';
  ctx.beginPath();ctx.moveTo(x-18,y-84+bob);ctx.lineTo(x-38,y-115+bob);ctx.lineTo(x-6,y-78+bob);ctx.fill();
  ctx.beginPath();ctx.moveTo(x+18,y-84+bob);ctx.lineTo(x+38,y-115+bob);ctx.lineTo(x+6,y-78+bob);ctx.fill();
  ctx.fillStyle='#ff2200';
  ctx.beginPath();ctx.ellipse(x-13,y-68+bob,8,9,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+13,y-68+bob,8,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffaa00';
  ctx.beginPath();ctx.ellipse(x-13,y-68+bob,4,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+13,y-68+bob,4,4,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=fl?'#ffffff':'#550000';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x-20,y-40+bob);ctx.quadraticCurveTo(x,y-30+bob,x+20,y-40+bob);ctx.stroke();
}

function drawEnemy(enemy,t){
  const x=420,y=180,fl=enemy.flashTimer>0;
  switch(enemy.type){
    case'slime': drawSlime(x,y,enemy.color,fl,t); break;
    case'bat':   drawBat(x,y,fl,t); break;
    case'slug':  drawSlug(x,y,fl,t); break;
    case'metal': drawMetal(x,y,fl,t); break;
    case'boss':  drawBoss(x,y,fl,t); break;
  }
}

// ===== TITLE SCREEN =====
let titleT=0;
function drawTitle(){
  titleT++;
  const gr=ctx.createLinearGradient(0,0,0,480);
  gr.addColorStop(0,'#000022');gr.addColorStop(1,'#000011');
  ctx.fillStyle=gr;ctx.fillRect(0,0,640,480);
  ctx.fillStyle='#ffffff';
  for(let i=0;i<60;i++){
    const sx=(i*137+40)%640,sy=(i*79+20)%480,sz=(i%4===0)?2:1;
    const br=0.3+0.7*(Math.sin(titleT*0.05+i*0.8)*0.5+0.5);
    ctx.globalAlpha=br;ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Title glow
  ctx.shadowColor='#ffcc00';ctx.shadowBlur=30;
  ctx.fillStyle='#ffdd00';ctx.font='bold 52px "Courier New",monospace';ctx.textAlign='center';
  ctx.fillText('勇者の冒険',320,140);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ff8844';ctx.font='bold 20px "Courier New",monospace';
  ctx.fillText('～ドラクエ風RPG～',320,184);
  ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(80,205);ctx.lineTo(560,205);ctx.stroke();
  drawHero(296,225,Math.floor(titleT/15)%2);
  if(Math.floor(titleT/35)%2===0){
    ctx.fillStyle='#ffffff';ctx.font='bold 22px "Courier New",monospace';
    ctx.fillText('Ｚキーで　スタート',320,320);
  }
  ctx.fillStyle='#8888aa';ctx.font='14px "Courier New",monospace';
  ctx.fillText('町に立ち寄り、ダンジョンの魔王を倒せ！',320,390);
  ctx.fillStyle='#665566';ctx.font='13px "Courier New",monospace';
  ctx.fillText('矢印キー：移動　Ｚ：決定　Ｘ：キャンセル',320,415);
  ctx.textAlign='left';
}

// ===== OVERWORLD =====
let moveDelay=0,animT=0;
function drawOverworld(){
  animT++;
  for(let ty=0;ty<MH;ty++)
    for(let tx=0;tx<MW;tx++)
      drawTile(MAP[ty][tx],tx*TW,ty*TH);
  // Dungeon marker glow
  const pulse=Math.sin(animT*0.08)*0.5+0.5;
  ctx.globalAlpha=0.3*pulse;ctx.fillStyle='#ff00ff';
  ctx.fillRect(9*TW,7*TH,TW,TH);ctx.globalAlpha=1;
  // Player
  if(player.flashTimer>0){player.flashTimer--;ctx.globalAlpha=0.4+Math.sin(animT*0.5)*0.3;}
  drawHero(player.x*TW,player.y*TH,player.walkFrame);
  ctx.globalAlpha=1;
  // Status HUD
  win(464,0,176,108);
  txt(player.name,476,22,14,'#ffff88');
  txt(`Lv.${player.level}`,572,22,14,'#88ffff');
  hpBar('HP',468,28,168,player.hp,player.maxHp);
  hpBar('MP',468,48,168,player.mp,player.maxMp);
  txt(`G  ${player.gold}`,476,82,14,'#ffcc44');
  txt(`EXP ${player.exp}`,550,82,12,'#aaffaa');
  // Mini hint
  if(MAP[player.y][player.x]===T){
    win(160,430,320,46);txt('【町】Ｚキーで　はいる',180,460,15,'#ffff88');
  }
  if(MAP[player.y][player.x]===D){
    win(100,430,440,46);ctx.fillStyle='rgba(80,0,0,0.7)';ctx.fillRect(102,432,436,42);
    txt('【ダンジョン】Ｚキーで　まおうに　いどむ！',118,460,14,'#ff6666');
  }
}

function handleOverworld(){
  if(moveDelay>0){moveDelay--;return;}
  let dx=0,dy=0;
  if(keys['ArrowUp'])    {dy=-1;player.dir=0;}
  else if(keys['ArrowRight']){dx=1; player.dir=1;}
  else if(keys['ArrowDown']) {dy=1; player.dir=2;}
  else if(keys['ArrowLeft']) {dx=-1;player.dir=3;}

  if(dx!==0||dy!==0){
    const nx=player.x+dx,ny=player.y+dy;
    if(nx>=0&&nx<MW&&ny>=0&&ny<MH&&WALKABLE.includes(MAP[ny][nx])){
      player.x=nx;player.y=ny;
      player.walkFrame^=1;
      moveDelay=10;snd('step');
      const tile=MAP[ny][nx];
      if(tile===T||tile===D) return; // handled by Z press
      // Random encounter
      const chance=tile===F?0.2:0.1;
      if(Math.random()<chance) startEncounter();
    }
  }

  const tile=MAP[player.y][player.x];
  if(keyJust['z']||keyJust['Z']){
    if(tile===T){ gState='town'; townCursor=0; townPhase='menu'; snd('confirm'); }
    else if(tile===D){ startBattle({...BOSS,hp:BOSS.hp}); }
  }
}

// ===== BATTLE =====
let bEnemy=null,bPhase='',bCursor=0,bSubCursor=0;
let bMsg='',bMsgTgt='',bMsgDone=false,bMsgT=0,bMsgCb=null;
let bAnimT=0,bResultT=0,bExpGain=0,bGoldGain=0,bLevelUp=false;
const BCMDS=['たたかう','まほう','どうぐ','にげる'];

function setMsg(text,cb){
  bMsgTgt=text;bMsgT=0;bMsg='';bMsgDone=false;bMsgCb=cb||null;
}
function updateMsg(){
  if(!bMsgTgt){bMsgDone=true;return;}
  if(bMsg.length<bMsgTgt.length){
    bMsgT++;if(bMsgT>=2){bMsgT=0;bMsg+=bMsgTgt[bMsg.length];}
  }else bMsgDone=true;
}

function startEncounter(){
  let pool;
  if(player.level<=2) pool=[EDEFS[0]];
  else if(player.level<=4) pool=[EDEFS[0],EDEFS[1],EDEFS[3]];
  else if(player.level<=6) pool=[EDEFS[1],EDEFS[2],EDEFS[3]];
  else pool=[EDEFS[2],EDEFS[3]];
  startBattle({...pool[pool.length*Math.random()|0]});
}

function startBattle(eDef){
  gState='battle';
  bEnemy={...eDef,flashTimer:0};
  bPhase='selecting';bCursor=0;bSubCursor=0;
  bAnimT=0;bResultT=0;bExpGain=0;bGoldGain=0;bLevelUp=false;
  player.flashTimer=0;
  setMsg(`${bEnemy.name}が\nあらわれた！`);
  snd('encounter');
}

function dmg(atk,def){return Math.max(1,Math.floor((atk-def)*(0.8+Math.random()*0.4)));}

function afterPlayer(){
  if(bEnemy.hp<=0){
    bExpGain=bEnemy.exp; bGoldGain=bEnemy.gold;
    player.exp+=bExpGain; player.gold+=bGoldGain;
    while(player.exp>=player.expNext){
      player.level++;
      player.maxHp+=8+Math.random()*5|0;
      player.maxMp+=2;player.hp=player.maxHp;player.mp=player.maxMp;
      player.atk+=3+Math.random()*2|0;
      player.def+=1+Math.random()*2|0;
      player.expNext=Math.floor(player.expNext*1.75);
      bLevelUp=true;snd('levelup');
    }
    bPhase='won';bResultT=0;return;
  }
  enemyTurn();
}

function enemyTurn(){
  bPhase='enemy_turn';
  let d,msg;
  if(bEnemy.isBoss&&Math.random()<0.3){
    d=15+Math.random()*18|0;
    msg=`${bEnemy.name}は\nまじゅつを　となえた！\nゆうしゃに　${d}の\nダメージ！`;
  }else{
    d=dmg(bEnemy.atk,player.def);
    msg=`${bEnemy.name}の\nこうげき！\nゆうしゃに　${d}の\nダメージ！`;
  }
  player.hp=Math.max(0,player.hp-d);
  player.flashTimer=18;snd('attack');
  setMsg(msg,()=>{
    if(player.hp<=0){bPhase='lost';bResultT=0;snd('gameover');}
    else{bPhase='selecting';setMsg('');}
  });
}

function doAttack(){
  const d=dmg(player.atk,bEnemy.def);
  bEnemy.hp=Math.max(0,bEnemy.hp-d);
  bEnemy.flashTimer=20;snd('attack');
  setMsg(`${player.name}の\nこうげき！\n${bEnemy.name}に　${d}の\nダメージ！`,afterPlayer);
  bPhase='executing';
}
function doMagic(sp){
  if(player.mp<sp.mp){setMsg('MPが　たりない！',()=>{bPhase='selecting';setMsg('');});bPhase='executing';return;}
  player.mp-=sp.mp;
  if(sp.type==='heal'){
    const h=Math.floor(sp.power*(0.8+Math.random()*0.4));
    player.hp=Math.min(player.maxHp,player.hp+h);snd('heal');
    setMsg(`${player.name}は　${sp.name}を\nとなえた！\nHPが　${h}　かいふく！`,afterPlayer);
  }else{
    const d=Math.floor(sp.power*(0.8+Math.random()*0.4));
    bEnemy.hp=Math.max(0,bEnemy.hp-d);bEnemy.flashTimer=25;snd('magic');
    setMsg(`${player.name}は　${sp.name}を\nとなえた！\n${bEnemy.name}に　${d}の\nほのおダメージ！`,afterPlayer);
  }
  bPhase='executing';
}
function doItem(item){
  const h=28+Math.random()*12|0;
  player.hp=Math.min(player.maxHp,player.hp+h);
  item.count--;snd('heal');
  setMsg(`${player.name}は　${item.name}を\nつかった！\nHPが　${h}　かいふく！`,afterPlayer);
  bPhase='executing';
}

function drawBattleBG(){

  if(bPhase==='selecting'){
    win(510,303,125,170);
    BCMDS.forEach((c,i)=>{
      const col=i===bCursor?'#ffff00':'#ffffff';
      txt((i===bCursor?'▶':' ')+c,518,330+i*38,15,col);
    });

    txt('まほう',518,324,13,'#ffaaff');
    player.spells.forEach((sp,i)=>{
      const can=player.mp>=sp.mp;
      const col=i===bSubCursor?'#ffff00':can?'#ffffff':'#888888';
      txt((i===bSubCursor?'▶':' ')+sp.name,516,350+i*38,14,col);
      txt(`${sp.mp}MP`,580,350+i*38,11,'#9999ff');
    });
    txt('（Ｘ：もどる）',515,450,11,'#888888');
  }else if(bPhase==='itemmenu'){
    win(510,303,125,170);
    txt('どうぐ',518,324,13,'#ffffaa');
    const items=player.items.filter(it=>it.count>0);
    if(!items.length) txt('なし',530,360,14,'#888888');
    else items.forEach((it,i)=>{
      const col=i===bSubCursor?'#ffff00':'#ffffff';
      txt((i===bSubCursor?'▶':' ')+it.name,516,350+i*38,14,col);
      txt(`x${it.count}`,590,350+i*38,11,'#aaaaaa');
    });
    txt('（Ｘ：もどる）',515,450,11,'#888888');
  }else if(bPhase==='won'){
    bResultT++;
    win(220,303,415,170);
    txt('しょうり！',330,335,22,'#ffff00');
    txt(`${bExpGain} EXP　かくとく！`,236,368,15,'#88ff88');
    txt(`${bGoldGain} G　かくとく！`,236,392,15,'#ffcc44');
    if(bLevelUp) txt(`レベルが　${player.level}に　あがった！`,236,418,15,'#ff88ff');
    if(bResultT>80&&Math.floor(bResultT/28)%2===0) txt('Ｚキーで　続ける',316,455,13,'#aaaaaa');
  }else if(bPhase==='lost'){
    bResultT++;
    win(160,303,320,170);
    ctx.fillStyle='rgba(80,0,0,0.7)';ctx.fillRect(162,305,316,166);
    txt('ゆうしゃは　たおれた...　',170,370,14,'#ff4444');
    txt('あきらめるな！',205,400,15,'#ffaa88');
    if(bResultT>80&&Math.floor(bResultT/28)%2===0) txt('Ｚキーで　やりなおす',190,445,13,'#aaaaaa');
  }
}

function handleBattle(){
  if(bPhase==='selecting'){
    if(keyJust['ArrowUp']){bCursor=(bCursor-1+4)%4;snd('cursor');}
    if(keyJust['ArrowDown']){bCursor=(bCursor+1)%4;snd('cursor');}
    if(keyJust['z']||keyJust['Z']){
      snd('confirm');
      if(bCursor===0) doAttack();
      else if(bCursor===1){bPhase='spellmenu';bSubCursor=0;}
      else if(bCursor===2){bPhase='itemmenu';bSubCursor=0;}
      else{
        if(bEnemy.isBoss){setMsg('にげられない！',()=>{bPhase='selecting';setMsg('');});bPhase='executing';}
        else if(Math.random()<0.65){gState='overworld';}
        else{setMsg('にげられなかった！',()=>{enemyTurn();});bPhase='executing';}
      }
    }
  }else if(bPhase==='spellmenu'){
    if(keyJust['ArrowUp']){bSubCursor=(bSubCursor-1+player.spells.length)%player.spells.length;snd('cursor');}
    if(keyJust['ArrowDown']){bSubCursor=(bSubCursor+1)%player.spells.length;snd('cursor');}
    if(keyJust['z']||keyJust['Z']) doMagic(player.spells[bSubCursor]);
    if(keyJust['x']||keyJust['X']){bPhase='selecting';snd('cancel');}
  }else if(bPhase==='itemmenu'){
    const items=player.items.filter(it=>it.count>0);
    const n=Math.max(1,items.length);
    if(keyJust['ArrowUp']){bSubCursor=(bSubCursor-1+n)%n;snd('cursor');}
    if(keyJust['ArrowDown']){bSubCursor=(bSubCursor+1)%n;snd('cursor');}
    if(keyJust['z']||keyJust['Z']){if(items.length) doItem(items[bSubCursor]);}
    if(keyJust['x']||keyJust['X']){bPhase='selecting';snd('cancel');}
  }else if(bPhase==='executing'||bPhase==='enemy_turn'){
    if(bMsgDone&&(keyJust['z']||keyJust['Z'])){
      const cb=bMsgCb;bMsgCb=null;bMsgTgt='';bMsg='';bMsgDone=false;
      if(cb) cb();
    }
  }else if(bPhase==='won'){
    bResultT++;
    if(bResultT>80&&(keyJust['z']||keyJust['Z'])){
      if(bEnemy.isBoss){gState='ending';endT=0;snd('victory');}
      else{gState='overworld';}
      bMsgTgt='';bMsg='';
    }
  }else if(bPhase==='lost'){
    bResultT++;
    if(bResultT>80&&(keyJust['z']||keyJust['Z'])){
      player.hp=player.maxHp;player.mp=player.maxMp;
      player.x=2;player.y=1;
      gState='overworld';bMsgTgt='';bMsg='';
    }
  }
}

    ctx.fillText(`レベル：${player.level}`,320,305);
    ctx.fillText(`ゴールド：${player.gold} G`,320,332);

// ===== 復活の呪文 =====
// 64種カタカナ文字セット（6bit/文字 × 20文字 = 120bit）
const SPELL_CHARS='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンガギグゲゴザジズゼゾダヂヅデドバビ';

// ビット列エンコード
function bitsWrite(arr,pos,val,bits){
  for(let i=bits-1;i>=0;i--){arr[pos+bits-1-i]=(val>>i)&1;}
  return pos+bits;
}
function bitsRead(arr,pos,bits){
  let v=0;
  for(let i=0;i<bits;i++) v=(v<<1)|arr[pos+i];
  return[v,pos+bits];
}

// プレイヤー状態 → 呪文文字列（チェックサム込み）
// ビット割当: level(7) hp(10) maxHp(10) mp(7) maxMp(7) atk(7) def(7)
//             exp(14) expNext(14) gold(14) yakusou(7) x(5) y(4) chk(7)  = 120bit
function encodePassword(){
  const bits=new Array(120).fill(0);
  const yaku=(player.items.find(i=>i.name==='やくそう')||{count:0}).count;
  let p=0;
  p=bitsWrite(bits,p,Math.min(player.level,127),7);
  p=bitsWrite(bits,p,Math.min(player.hp,1023),10);
  p=bitsWrite(bits,p,Math.min(player.maxHp,1023),10);
  p=bitsWrite(bits,p,Math.min(player.mp,127),7);
  p=bitsWrite(bits,p,Math.min(player.maxMp,127),7);
  p=bitsWrite(bits,p,Math.min(player.atk,127),7);
  p=bitsWrite(bits,p,Math.min(player.def,127),7);
  p=bitsWrite(bits,p,Math.min(player.exp,16383),14);
  p=bitsWrite(bits,p,Math.min(player.expNext,16383),14);
  p=bitsWrite(bits,p,Math.min(player.gold,16383),14);
  p=bitsWrite(bits,p,Math.min(yaku,127),7);
  p=bitsWrite(bits,p,Math.min(player.x,31),5);
  p=bitsWrite(bits,p,Math.min(player.y,15),4);
  // チェックサム（先頭113bitの合計 mod 128）
  let chk=0; for(let i=0;i<113;i++) chk=(chk+bits[i])%128;
  bitsWrite(bits,p,chk,7);
  // 6bitずつ文字に変換
  let result='';
  for(let i=0;i<20;i++){
    let idx=0;
    for(let b=0;b<6;b++) idx=(idx<<1)|bits[i*6+b];
    result+=SPELL_CHARS[idx];
  }
  return result;
}

// 呪文文字列 → プレイヤー状態（復元）
function decodePassword(str){
  if(str.length!==20) return{ok:false,msg:'呪文は　２０文字　ひつようです'};
  const bits=[];
  for(const ch of str){
    const idx=SPELL_CHARS.indexOf(ch);
    if(idx<0) return{ok:false,msg:`「${ch}」は　ただしくない\n文字です`};
    for(let b=5;b>=0;b--) bits.push((idx>>b)&1);
  }
  let p=0,v;
  [v,p]=bitsRead(bits,p,7);  const level=v;
  [v,p]=bitsRead(bits,p,10); const hp=v;
  [v,p]=bitsRead(bits,p,10); const maxHp=v;
  [v,p]=bitsRead(bits,p,7);  const mp=v;
  [v,p]=bitsRead(bits,p,7);  const maxMp=v;
  [v,p]=bitsRead(bits,p,7);  const atk=v;
  [v,p]=bitsRead(bits,p,7);  const def=v;
  [v,p]=bitsRead(bits,p,14); const exp=v;
  [v,p]=bitsRead(bits,p,14); const expNext=v;
  [v,p]=bitsRead(bits,p,14); const gold=v;
  [v,p]=bitsRead(bits,p,7);  const yaku=v;
  [v,p]=bitsRead(bits,p,5);  const px=v;
  [v,p]=bitsRead(bits,p,4);  const py=v;
  [v,  ]=bitsRead(bits,p,7);  const chkGot=v;
  let chkCalc=0; for(let i=0;i<113;i++) chkCalc=(chkCalc+bits[i])%128;
  if(chkCalc!==chkGot) return{ok:false,msg:'呪文が　まちがっています！\nもういちど　かくにんして\nください'};
  if(level<1||maxHp<1) return{ok:false,msg:'データが　こわれています'};
  return{ok:true,level,hp:Math.min(hp,maxHp),maxHp,mp:Math.min(mp,maxMp),maxMp,atk,def,exp,expNext,gold,yaku,px:Math.min(px,MW-1),py:Math.min(py,MH-1)};
}

function applyPassword(d){
  player.level=d.level; player.hp=d.hp; player.maxHp=d.maxHp;
  player.mp=d.mp; player.maxMp=d.maxMp; player.atk=d.atk; player.def=d.def;
  player.exp=d.exp; player.expNext=d.expNext; player.gold=d.gold;
  player.x=d.px; player.y=d.py;
  const y=player.items.find(i=>i.name==='やくそう');
  if(y) y.count=d.yaku; else if(d.yaku>0) player.items.push({name:'やくそう',count:d.yaku});
}

// ===== 呪文UI =====
// カタカナキーボード 8列×8行 = 64文字
const KB_COLS=8, KB_ROWS=8;
let pwMode='show'; // 'show' or 'input'
let pwInputArr=new Array(20).fill(''); // 入力中の文字
let pwInputPos=0;  // カーソル位置（0-19）
let pwKbRow=0, pwKbCol=0; // キーボードカーソル
let pwMsg='', pwMsgT=0, pwResult=null;
let pwFromState=''; // どこから来たか

function openPassword(from,mode){
  pwFromState=from; pwMode=mode;
  pwMsg=''; pwMsgT=0; pwResult=null;
  pwInputArr=new Array(20).fill('');
  pwInputPos=0; pwKbRow=0; pwKbCol=0;
  gState='password';
}

function drawPasswordScreen(){
  // BG
  const gr=ctx.createLinearGradient(0,0,0,480);
  gr.addColorStop(0,'#000814');gr.addColorStop(1,'#001122');
  ctx.fillStyle=gr; ctx.fillRect(0,0,640,480);

  ctx.textAlign='center';
  ctx.shadowColor='#00aaff'; ctx.shadowBlur=15;
  ctx.fillStyle='#00ccff'; ctx.font='bold 22px "Courier New",monospace';
  ctx.fillText('ふっかつの　じゅもん',320,32);
  ctx.shadowBlur=0;

  if(pwMode==='show'){
    // 現在の状態を呪文化して表示
    const pw=encodePassword();
    win(80,50,480,110);
    ctx.fillStyle='#aaddff'; ctx.font='13px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('このじゅもんを　メモしてください',320,75);
    // 10文字ずつ2行で表示
    ctx.fillStyle='#ffff44'; ctx.font='bold 28px "Courier New",monospace';
    ctx.letterSpacing='6px';
    ctx.fillText(pw.slice(0,10),320,110);
    ctx.fillText(pw.slice(10,20),320,148);
    ctx.letterSpacing='0px';
    // ステータスサマリ
    win(80,175,480,120);
    ctx.fillStyle='#88ccff'; ctx.font='13px "Courier New",monospace';
    ctx.fillText(`Lv.${player.level}　HP:${player.hp}/${player.maxHp}　MP:${player.mp}/${player.maxMp}`,320,200);
    ctx.fillText(`ATK:${player.atk}　DEF:${player.def}　EXP:${player.exp}`,320,222);
    ctx.fillText(`GOLD:${player.gold}G　やくそう:${(player.items.find(i=>i.name==='やくそう')||{count:0}).count}こ`,320,244);
    ctx.fillText(`フィールド座標 (${player.x}, ${player.y})`,320,268);
    ctx.fillStyle='#888888'; ctx.font='13px "Courier New",monospace';
    ctx.fillText('Ｘキーで　もどる',320,450);
  }else{
    // 入力モード
    // 入力スロット（20文字）
    win(30,48,580,70);
    ctx.fillStyle='#aaddff'; ctx.font='13px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('じゅもんを　にゅうりょくして　ください',320,68);
    for(let i=0;i<20;i++){
      const slotX=42+i*29, slotY=82, slotW=26, slotH=30;
      const isCur=(i===pwInputPos);
      ctx.fillStyle=isCur?'#003366':'#001133';
      ctx.fillRect(slotX,slotY,slotW,slotH);
      ctx.strokeStyle=isCur?'#00ffff':'#004488';
      ctx.lineWidth=isCur?2:1; ctx.strokeRect(slotX,slotY,slotW,slotH);
      if(pwInputArr[i]){
        ctx.fillStyle=isCur?'#ffff00':'#ffffff';
        ctx.font=`bold 16px "Courier New",monospace`;
        ctx.fillText(pwInputArr[i],slotX+13,slotY+22);
      }
      if(isCur&&Math.floor(Date.now()/400)%2===0){
        ctx.fillStyle='#00ffff'; ctx.fillRect(slotX+2,slotY+27,22,2);
      }
      if(i===9){ctx.fillStyle='#004488';ctx.fillRect(slotX+slotW+1,slotY+5,2,20);}
    }

    // キーボードグリッド
    const KBX=30, KBY=130, KW=74, KH=34;
    win(28,128,584,KB_ROWS*KH+16);
    for(let r=0;r<KB_ROWS;r++){
      for(let c=0;c<KB_COLS;c++){
        const idx=r*KB_COLS+c;
        if(idx>=64) break;
        const kx=KBX+c*KW+2, ky=KBY+r*KH+8;
        const isCur=(r===pwKbRow&&c===pwKbCol);
        ctx.fillStyle=isCur?'#002255':'#001133';
        ctx.fillRect(kx,ky,KW-4,KH-4);
        ctx.strokeStyle=isCur?'#00ffff':'#003366';
        ctx.lineWidth=1; ctx.strokeRect(kx,ky,KW-4,KH-4);
        ctx.fillStyle=isCur?'#ffff00':'#ccddff';
        ctx.font=`${isCur?'bold ':''}17px "Courier New",monospace`;
        ctx.fillText(SPELL_CHARS[idx],kx+(KW-4)/2,ky+(KH-4)*0.68);
      }
    }

    // 操作説明
    win(30,408,580,40);
    ctx.fillStyle='#7799bb'; ctx.font='12px "Courier New",monospace';
    ctx.fillText('矢印：カーソル　Ｚ：入力　Ｘ：１文字消す　Enter：けってい',320,432);

    // エラーメッセージ
    if(pwMsg){
      win(80,355,480,48);
      ctx.fillStyle=pwResult?'#88ff88':'#ff6666';
      ctx.font='14px "Courier New",monospace';
      wrapText(pwMsg,28).slice(0,2).forEach((l,i)=>ctx.fillText(l,320,376+i*20));
    }
  }
  ctx.textAlign='left';
}

function handlePasswordScreen(){
  if(pwMode==='show'){
    if(keyJust['x']||keyJust['X']||keyJust['z']||keyJust['Z']){
      gState=pwFromState; snd('cancel');
    }
    return;
  }
  // 入力モード
  if(keyJust['ArrowUp']){pwKbRow=(pwKbRow-1+KB_ROWS)%KB_ROWS;snd('cursor');}
  if(keyJust['ArrowDown']){pwKbRow=(pwKbRow+1)%KB_ROWS;snd('cursor');}
  if(keyJust['ArrowLeft']){pwKbCol=(pwKbCol-1+KB_COLS)%KB_COLS;snd('cursor');}
  if(keyJust['ArrowRight']){pwKbCol=(pwKbCol+1)%KB_COLS;snd('cursor');}

  if(keyJust['z']||keyJust['Z']){
    if(pwInputPos<20){
      const idx=pwKbRow*KB_COLS+pwKbCol;
      if(idx<64){ pwInputArr[pwInputPos]=SPELL_CHARS[idx]; pwInputPos++; snd('confirm'); }
    }
  }
  if(keyJust['x']||keyJust['X']){
    if(pwInputPos>0){ pwInputPos--; pwInputArr[pwInputPos]=''; snd('cancel'); }
    else{ gState=pwFromState; snd('cancel'); }
  }
  if(keyJust['Enter']){
    if(pwInputPos===20){
      const result=decodePassword(pwInputArr.join(''));
      if(result.ok){
        applyPassword(result);
        pwMsg='じゅもんを　にゅうりょくした！\nぼうけんを　さいかい！';
        pwResult=true; snd('levelup');
        setTimeout(()=>{ gState='overworld'; },1800);
      }else{
        pwMsg=result.msg; pwResult=false; snd('cancel');
      }
    }else{
      pwMsg=`あと　${20-pwInputPos}文字　たりません`; pwResult=false; snd('cancel');
    }
  }
}

// ===== フィールドメニューに呪文オプション追加 =====
let fieldMenu=false, fieldMenuCursor=0;
const FIELD_OPTS=['ふっかつの　じゅもんを　みる','じゅもんを　にゅうりょくする','とじる'];

function drawFieldMenu(){
  win(380,260,250,130);
  txt('メニュー',396,285,14,'#ffff88');
  FIELD_OPTS.forEach((o,i)=>{
    const col=i===fieldMenuCursor?'#ffff00':'#ffffff';
    txt((i===fieldMenuCursor?'▶':' ')+o,388,310+i*28,12,col);
  });
}

// ===== MAIN LOOP =====
function loop(){
  ctx.clearRect(0,0,640,480);
  switch(gState){
    case'title':
      drawTitle();
      if(keyJust['z']||keyJust['Z']){gState='overworld';snd('confirm');try{AC&&AC.resume();}catch(e){}}
      break;
    case'overworld':
      drawOverworld();
      if(fieldMenu){
        drawFieldMenu();
        if(keyJust['ArrowUp']){fieldMenuCursor=(fieldMenuCursor-1+3)%3;snd('cursor');}
        if(keyJust['ArrowDown']){fieldMenuCursor=(fieldMenuCursor+1)%3;snd('cursor');}
        if(keyJust['z']||keyJust['Z']){
          snd('confirm');
          if(fieldMenuCursor===0){fieldMenu=false;openPassword('overworld','show');}
          else if(fieldMenuCursor===1){fieldMenu=false;openPassword('overworld','input');}
          else{fieldMenu=false;}
        }
        if(keyJust['x']||keyJust['X']){fieldMenu=false;snd('cancel');}
      }else{
        if(keyJust['Enter']){fieldMenu=true;fieldMenuCursor=0;snd('cursor');}
        else handleOverworld();
      }
      break;
    case'town':     drawTown();    handleTown(); break;
    case'battle':   drawBattle();  handleBattle(); break;
    case'password': drawPasswordScreen(); handlePasswordScreen(); break;
    case'ending':   drawEnding();  break;
  }
  for(const k in keyJust) delete keyJust[k];
  requestAnimationFrame(loop);
}
loop();
</script>
