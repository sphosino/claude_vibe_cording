const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── 固定解像度 1280×720 / 画面に合わせてCSSスケール ──
const W = canvas.width  = 1280;
const H = canvas.height = 720;

let _scale = 1;
function fitCanvas() {
  const sw = window.innerWidth  / W;
  const sh = window.innerHeight / H;
  _scale = Math.min(sw, sh);
  canvas.style.transform = `translate(-50%,-50%) scale(${_scale})`;
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// マウス座標をゲーム座標に変換
function toGameXY(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / _scale,
    y: (clientY - rect.top)  / _scale,
  };
}

// 空間グリッド (1280×720 を CELL_SIZE px のセルに分割)
const CELL_SIZE = 80;
const GRID_COLS = Math.ceil(1280 / CELL_SIZE);
const GRID_ROWS = Math.ceil(720  / CELL_SIZE);
let grid = [];

function buildGrid() {
  // 毎フレームリセット
  grid = new Array(GRID_COLS * GRID_ROWS).fill(null).map(()=>[]);
  for (const e of enemies) {
    const cx = Math.floor(e.x / CELL_SIZE);
    const cy = Math.floor(e.y / CELL_SIZE);
    if (cx<0||cx>=GRID_COLS||cy<0||cy>=GRID_ROWS) continue;
    grid[cy * GRID_COLS + cx].push(e);
  }
}

function getNearbyCells(bx, by, radius) {
  // 弾の周囲セルを列挙
  const x0 = Math.max(0, Math.floor((bx - radius) / CELL_SIZE));
  const x1 = Math.min(GRID_COLS-1, Math.floor((bx + radius) / CELL_SIZE));
  const y0 = Math.max(0, Math.floor((by - radius) / CELL_SIZE));
  const y1 = Math.min(GRID_ROWS-1, Math.floor((by + radius) / CELL_SIZE));
  const result = [];
  for (let gy=y0; gy<=y1; gy++)
    for (let gx=x0; gx<=x1; gx++)
      for (const e of grid[gy*GRID_COLS+gx]) result.push(e);
  return result;
}

// ─────────────────────── AUDIO (Web Audio API) ───────────────────────

let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, type, dur, vol, freqEnd) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol, cutoff) {
  if (!audioCtx) return;
  const len = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i] = Math.random()*2-1;
  const src = audioCtx.createBufferSource();
  const flt = audioCtx.createBiquadFilter();
  const g   = audioCtx.createGain();
  flt.type = 'lowpass'; flt.frequency.value = cutoff;
  src.buffer = buf;
  src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.start();
}
let lastFireSound = 0;
function sfxFire()    { const n=performance.now(); if(n-lastFireSound<60) return; lastFireSound=n; playTone(300,'square',0.04,0.04,120); }
function sfxHit()     { playNoise(0.06, 0.12, 800); }
function sfxExplode() { playNoise(0.22, 0.28, 350); }
function sfxItem()    { playTone(880,'sine',0.05,0.1); setTimeout(()=>playTone(1320,'sine',0.08,0.08),50); }
function sfxDamage()  { playTone(180,'sawtooth',0.12,0.15,80); }

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  const gameKeys = ['Space','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown',
                    'KeyA','KeyW','KeyS','KeyD','KeyM','Digit1','Digit2','Digit3','Digit4'];

    if (e.code==='ArrowLeft'||e.code==='KeyA')  titleSel=0;
    if (e.code==='ArrowRight'||e.code==='KeyD') titleSel=1;
    if (e.code==='Space'||e.code==='Enter') { ensureAudio(); difficulty=titleSel===0?'NORMAL':'HARD'; startGame(); }
  }
  if ((e.code==='Space'||e.code==='Enter') && (state==='GAMEOVER'||state==='HUMANWIN')) state='TITLE';
  if (state==='PLAYING') {
    if (e.code==='Digit1') player.mode='RED';
    if (e.code==='Digit2') player.mode='BLUE';
    if (e.code==='Digit3') player.mode='GREEN';
    if (e.code==='Digit4'||e.code==='KeyM') player.mode='MIXED';
    if (e.code==='KeyG') { useGrid=!useGrid; }
    if (e.code==='KeyF') { showDebug=!showDebug; }
    if (e.code==='KeyT') {
      tvOn=!tvOn;
      if (tvOn && tvX<0) { tvX=W/2-TV_W/2; tvY=H/2-TV_H/2-20; }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code]=false; });

// マウス移動目標

canvas.addEventListener('click', e => {
  ensureAudio();
  const {x:cx, y:cy} = toGameXY(e.clientX, e.clientY);

  if (state==='TITLE') {
    // 難易度ボタン判定
    const ny = H/2 + 152;
    if (cy >= ny && cy <= ny+58) {
      if (cx >= W/2-220 && cx <= W/2-10)  { difficulty='NORMAL'; startGame(); return; }
      if (cx >= W/2+10  && cx <= W/2+220) { difficulty='HARD';   startGame(); return; }
    }
    return;
  }
  if (state==='GAMEOVER'||state==='HUMANWIN') { state='TITLE'; titleSel = difficulty==='HARD'?1:0; return; }
  if (state!=='PLAYING') return;

  // TVボタン判定
  const tvBX2=14+84*4, tvBY2=H-46-36;
  if (cx>=tvBX2 && cx<=tvBX2+60 && cy>=tvBY2 && cy<=tvBY2+46) {
    tvOn=!tvOn;
    if (tvOn && tvX<0) { tvX=W/2-TV_W/2; tvY=H/2-TV_H/2-20; }
    return;
  }

  // モードボタン判定 — 左下 (y: H-BH-36 〜 H-36, 幅78, gap84)
  const BW=78, BH=46, BGAP=84, BY=H-BH-36;
  if (cy>=BY && cy<=BY+BH) {
    const modes=['RED','BLUE','GREEN','MIXED'];
    for (let i=0;i<4;i++) {
      if (cx>=14+BGAP*i && cx<=14+BGAP*i+BW) { player.mode=modes[i]; return; }
    }
  }

  // それ以外はクリック地点へ移動
  mouseTgt = {x:cx, y:cy};
});


// TV ドラッグ
canvas.addEventListener('mousedown', e => {
  if (!tvOn || state!=='PLAYING') return;
  const {x:cx, y:cy} = toGameXY(e.clientX, e.clientY);
  // TV全体をつかめる
  if (cx>=tvX && cx<=tvX+TV_W && cy>=tvY && cy<=tvY+TV_H) {
    tvDrag=true; tvDragOX=cx-tvX; tvDragOY=cy-tvY;
    e.preventDefault();
  }
});
canvas.addEventListener('mousemove', e => {
  if (!tvDrag) return;
  const {x:cx, y:cy} = toGameXY(e.clientX, e.clientY);
  tvX = Math.max(0, Math.min(W-TV_W, cx-tvDragOX));
  tvY = Math.max(0, Math.min(H-TV_H, cy-tvDragOY));
});
canvas.addEventListener('mouseup', () => { tvDrag=false; });
canvas.addEventListener('mouseleave', () => { tvDrag=false; });

// ─────────────────────── GAME LOGIC ───────────────────────

function startGame() {
  state='PLAYING'; score=0; elapsed=0; endTimer=0; newsIdx=0;
  tvOn=false;  // ゲーム開始時は必ず閉じる
  bullets=[]; enemies=[]; items=[]; particles=[]; floatMsgs=[];
  spawnTimer=0;
  Object.assign(player, {
    x:W/2, y:H/2, hp:B.PLAYER_HP, maxHp:B.PLAYER_HP, spd:B.PLAYER_SPD,
    mode:'RED', bCount:B.PLAYER_BULLET, fireRate:B.PLAYER_FIRE_RATE, bSpd:1.0, bSz:1.0,
    fireAngle:0, mixIdx:0, lastFire:0, evoStage:0, invincible:0,
  });
}

function currentWave() { return Math.min(Math.floor(elapsed/B.WAVE_INTERVAL), 4); }

function fireBullets(now) {
  if (now - player.lastFire < player.fireRate) return;
  player.lastFire = now;
  player.fireAngle += 0.13;
  const step = (Math.PI*2) / player.bCount;
  sfxFire();
  for (let i=0; i<player.bCount; i++) {
    const type = player.mode==='MIXED'
      ? ['RED','BLUE','GREEN'][(player.mixIdx+i)%3]
      : player.mode;
    const bd  = BULLET[type];
    const ang = step*i + player.fireAngle;
    bullets.push({
      x:player.x, y:player.y,
      vx:Math.cos(ang)*bd.spd*player.bSpd,
      vy:Math.sin(ang)*bd.spd*player.bSpd,
      type, dmg:bd.dmg, sz:bd.sz*player.bSz,
      pierce:bd.pierce, explode:bd.explode,
      hitSet:new Set(), life:B.BULLET_LIFE,
    });
  }
  if (player.mode==='MIXED') player.mixIdx++;
}

function killEnemy(e, idx) {
  // デスダッシュ中は無敵（何があっても消えない）
  if (e.deathDash) return false;
  // RUSHERは死亡時にデスダッシュ
  if (e.type === 'RUSHER' && !e.deathDash) {
    e.deathDash = true;
    e.hp = 1;  // 死なないようにHP残す（デスダッシュ中は弾に当たらない）
    // 現在の向きor最後のダッシュ方向で爆走
    const ang = Math.atan2(player.y - e.y, player.x - e.x);
    const speed = e.spd * B.RUSHER_DEATH_SPD;
    e.dashVx = Math.cos(ang) * speed;
    e.dashVy = Math.sin(ang) * speed;
    e.dashing = true;
    // タイマーなし：画面外に出るまで走り続ける
    playTone(100,'sawtooth',0.18,0.15,40);
    spawnParticles(e.x, e.y, 20, '#ff6600');
    return false; // まだ消さない
  }
  return true; // 普通に消す
}

function spawnEnemy() {
  if (enemies.length >= B.ENEMY_MAX) return;
  const wave = currentWave();
  const pool = Object.entries(ENEMY).filter(([k,v])=>v.minWave<=wave && (k!=='RUSHER'||difficulty==='HARD')).map(([k])=>k);
  const type = pool[Math.floor(Math.random()*pool.length)];
  const ed   = ENEMY[type];
  let x,y;
  const side = Math.floor(Math.random()*4);
  const m = 65;
  if      (side===0){x=Math.random()*W;y=-m;}
  else if (side===1){x=W+m;y=Math.random()*H;}
  else if (side===2){x=Math.random()*W;y=H+m;}
  else              {x=-m;y=Math.random()*H;}
  enemies.push({
    x,y, type, hp:ed.hp*(1+wave*B.ENEMY_HP_SCALE), maxHp:ed.hp*(1+wave*B.ENEMY_HP_SCALE),
    spd:ed.spd*(1+wave*B.ENEMY_SPD_SCALE), sz:ed.sz,
    col:ed.col, score:ed.score, weakTo:ed.weakTo,
    flash:0, id:Math.random(),
  });
}

function doExplosion(x, y, radius, dmg, srcType) {
  sfxExplode();
  for (let i=enemies.length-1;i>=0;i--) {
    const e=enemies[i];
    const _er=radius+e.sz; if ((e.x-x)*(e.x-x)+(e.y-y)*(e.y-y)<_er*_er) {
      if (e.deathDash) continue;  // デスダッシュ中は爆発も無効
      let d=dmg; if(e.weakTo===srcType) d*=B.WEAK_DMG_MULT;
      e.hp-=d; e.flash=8;
      spawnParticles(e.x,e.y,6,e.col);
      if (e.hp<=0) {
        if (killEnemy(e, i)) {
          score+=e.score; spawnParticles(e.x,e.y,14,e.col); tryDropItem(e.x,e.y);
          enemies.splice(i,1);
        } else {
          score+=e.score;
        }
      }
    }
  }
  for (let a=0;a<Math.PI*2;a+=0.28) {
    particles.push({x:x+Math.cos(a)*6,y:y+Math.sin(a)*6,vx:Math.cos(a)*4,vy:Math.sin(a)*4,
      color:'#33ff7766',sz:5,life:28,maxLife:28});
  }
  spawnParticles(x,y,22,'#33ff77');
}

function spawnParticles(x,y,n,color) {
  if (particles.length>800) return;
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*3.5+0.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color,
      sz:Math.random()*3+1,life:Math.floor(Math.random()*25)+15,maxLife:40});
  }
}

function tryDropItem(x,y) {
  if (Math.random()>B.ITEM_DROP_RATE) return;
  const type=ITEM_KEYS[Math.floor(Math.random()*ITEM_KEYS.length)];
  items.push({x,y,type,life:B.ITEM_LIFETIME,phase:Math.random()*Math.PI*2});
}

function collectItem(type) {
  sfxItem();
  switch(type) {
    case 'BULLET+':  player.bCount   = Math.min(player.bCount+B.ITEM_BULLET_UP,  B.MAX_BULLET);    floatMsg('弾数 +1 ↑'); break;
    case 'FIRERATE': player.fireRate = Math.max(player.fireRate-B.ITEM_FIRERATE_UP,B.MAX_FIRE_RATE); floatMsg('連射速度 ↑'); break;
    case 'SPEED':    player.spd      = Math.min(player.spd+B.ITEM_SPEED_UP,       B.MAX_SPD);       floatMsg('移動速度 ↑'); break;
    case 'SIZE':     player.bSz      = Math.min(player.bSz+B.ITEM_SIZE_UP,        B.MAX_BSZ);       floatMsg('弾サイズ ↑'); break;
    case 'HEAL':     player.hp       = Math.min(player.hp+B.ITEM_HEAL_AMT,        player.maxHp);    floatMsg('HP 回復 ♥'); break;
  }
}

function floatMsg(text) {
  floatMsgs.push({text,x:W/2,y:player.y-70,life:85,maxLife:85});
}

// ─────────────────────── EVO EFFECT ───────────────────────

let evoFlash = 0;
const EVO_FLASH_COL = ['','#33ffcc','#ff8833','#ff2200'];
function triggerEvoEffect(stage) {
  evoFlash = 90;
  const labels = ['','変異体に進化！','怪物体に進化！！','完全体 ———— !!'];
  floatMsg(labels[stage]);
  spawnParticles(player.x, player.y, 40, EVO_FLASH_COL[stage]);
  playTone(220,'sawtooth',0.06,0.2,880);
  setTimeout(()=>playTone(440,'square',0.12,0.15,1760),80);
}

// ─────────────────────── UPDATE ───────────────────────

function updatePlaying(now, dt) {
  elapsed += dt/1000;
  // 進化段階 = 強さ連動
  const prevEvo = player.evoStage;
  const allMax = player.bCount>=B.MAX_BULLET && player.fireRate<=B.MAX_FIRE_RATE && player.spd>=B.MAX_SPD && player.bSz>=B.MAX_BSZ;
  if      (allMax)                                                              player.evoStage=3;
  else if (player.bCount>=B.EVO2_BULLET && player.fireRate<=B.EVO2_FIRERATE)  player.evoStage=2;
  else if (player.bCount>=B.EVO1_BULLET || player.fireRate<=B.EVO1_FIRERATE)  player.evoStage=1;
  else                                                                          player.evoStage=0;
  if (player.evoStage>prevEvo) triggerEvoEffect(player.evoStage);
  newsIdx = Math.min(Math.floor(elapsed/B.NEWS_INTERVAL), NEWS.length-1);

  // Spawn
  const wave = currentWave();
  const interval = Math.max(B.SPAWN_BASE-wave*B.SPAWN_WAVE_DEC, B.SPAWN_MIN);
  if (++spawnTimer >= interval) {
    spawnTimer=0;
    const n=B.SPAWN_BASE_COUNT+Math.floor(wave*B.SPAWN_WAVE_MULT);
    for (let i=0;i<n;i++) spawnEnemy();
  }

  // Ending trigger
  if (elapsed>=B.GAME_DURATION) { state=player.evoStage===3?'ENDING':'HUMANWIN'; endTimer=0; return; }

  // Move player
  let mx=0,my=0;
  if (keys['ArrowLeft'] ||keys['KeyA']) mx-=1;
  if (keys['ArrowRight']||keys['KeyD']) mx+=1;
  if (keys['ArrowUp']   ||keys['KeyW']) my-=1;
  if (keys['ArrowDown'] ||keys['KeyS']) my+=1;

  if (mx||my) {
    // キー入力中はマウス目標をキャンセル
    mouseTgt=null;
    if (mx&&my){mx*=0.707;my*=0.707;}
    player.x = Math.max(22,Math.min(W-22,player.x+mx*player.spd));
    player.y = Math.max(22,Math.min(H-22,player.y+my*player.spd));
  } else if (mouseTgt) {
    // マウス目標へスムーズ移動
    const tdx=mouseTgt.x-player.x, tdy=mouseTgt.y-player.y;
    const dist=Math.hypot(tdx,tdy);
    if (dist<3) {
      mouseTgt=null; // 到着
    } else {
      const step=Math.min(player.spd, dist);
      player.x = Math.max(22,Math.min(W-22, player.x+tdx/dist*step));
      player.y = Math.max(22,Math.min(H-22, player.y+tdy/dist*step));
    }
  }
  if (player.invincible>0) player.invincible--;

  fireBullets(now);

  // Update bullets
  let frameChecksNoGrid = 0;
  let frameChecksGrid   = 0;
  if (useGrid) buildGrid();

  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if (b.life<=0||b.x<-65||b.x>W+65||b.y<-65||b.y>H+65) { bullets.splice(i,1); continue; }
    let destroyed=false;

    // グリッドON: 近傍セルの敵のみチェック / OFF: 全敵チェック
    const targets = useGrid ? getNearbyCells(b.x, b.y, b.sz+40) : enemies;

    for (let j=targets.length-1;j>=0;j--) {
      const e=targets[j];
      if (!enemies.includes(e)) continue; // グリッド時は既に倒された敵をスキップ
      if (b.hitSet.has(e.id)) continue;
      if (e.deathDash) continue;  // デスダッシュ中は被弾なし

      // 計測
      if (useGrid) frameChecksGrid++; else frameChecksNoGrid++;

      const _br=b.sz+e.sz; if ((b.x-e.x)*(b.x-e.x)+(b.y-e.y)*(b.y-e.y)<_br*_br) {
        let dmg=b.dmg; if(e.weakTo===b.type) dmg*=B.WEAK_DMG_MULT;
        e.hp-=dmg; e.flash=8;
        // 赤弾：ノックバック＆スタン
        if (b.type==='RED') {
          const _ang = Math.atan2(e.y-player.y, e.x-player.x);
          e.x += Math.cos(_ang) * 10;
          e.y += Math.sin(_ang) * 10;
          e.stun = (e.stun||0) + 20; // 約0.33秒スタン（加算式）
        }
        sfxHit();
        spawnParticles(b.x,b.y,5,BULLET[b.type].color);
        if (e.hp<=0 && !e.deathDash) {
          if (killEnemy(e, enemies.indexOf(e))) {
            score+=e.score*(e.weakTo===b.type?B.WEAK_SCORE_MULT:1);
            spawnParticles(e.x,e.y,15,e.col);
            tryDropItem(e.x,e.y);
            enemies.splice(enemies.indexOf(e),1);
          } else {
            score+=e.score*(e.weakTo===b.type?B.WEAK_SCORE_MULT:1);
          }
        }
        if (b.explode) {
          doExplosion(b.x,b.y,B.EXPLODE_RADIUS,b.dmg*0.7,b.type);
          bullets.splice(i,1); destroyed=true; break;
        }
        if (b.pierce) { b.hitSet.add(e.id); }
        else { bullets.splice(i,1); destroyed=true; break; }
      }
    }
  }

  // 計測値を履歴に記録
  if (useGrid) {
    perf.histGrid[perf.histIdx]   = frameChecksGrid;
    perf.histNoGrid[perf.histIdx] = 0;
  } else {
    perf.histNoGrid[perf.histIdx] = frameChecksNoGrid;
    perf.histGrid[perf.histIdx]   = 0;
  }
  perf.histIdx = (perf.histIdx+1) % 60;

  // Update enemies
  for (let i=enemies.length-1;i>=0;i--) {
    const e=enemies[i];
    if (e.flash>0) e.flash--;
    const dx=player.x-e.x, dy=player.y-e.y, dist=Math.hypot(dx,dy);

    // 突進体の特殊挙動
    if (e.type==='RUSHER') {
      // デスダッシュ中
      if (e.deathDash) {
        e.x += e.dashVx; e.y += e.dashVy;
        // 残像
        if (Math.random()<0.6) spawnParticles(e.x, e.y, 2, '#ff4400');
        // プレイヤーに当たったらダメージ（1回だけ・その後は方向転換して離脱）
        const _dr=e.sz+18;
        if (!e.deathHit && (player.x-e.x)*(player.x-e.x)+(player.y-e.y)*(player.y-e.y)<_dr*_dr) {
          e.deathHit = true;  // 以降ヒットしない
          player.hp -= B.CONTACT_DMG * B.RUSHER_DEATH_DMG;
          player.invincible = B.INVINCIBLE_FRAMES;
          sfxDamage();
          spawnParticles(player.x, player.y, 14, '#ff6600');
          floatMsgs.push({text:'デスアタック！',x:player.x,y:player.y-70,life:85,maxLife:85});
          // 当たった後は画面外へ向かうよう方向転換
          const _da = Math.atan2(e.dashVy, e.dashVx);
          e.dashVx = Math.cos(_da) * Math.hypot(e.dashVx, e.dashVy);
          e.dashVy = Math.sin(_da) * Math.hypot(e.dashVx, e.dashVy);
          if (player.hp<=0) { player.hp=0; state='GAMEOVER'; endTimer=0; return; }
        }
        // 画面外で消滅
        if (e.x<-120||e.x>W+120||e.y<-120||e.y>H+120) {
          spawnParticles(e.x, e.y, 25, '#ff6600');
          enemies.splice(i,1);
        }
        continue;
      }

      e.dashTimer = (e.dashTimer||0) - 1;
      e.chargeTimer = (e.chargeTimer||0) - 1;

      if (e.dashing) {
        // ダッシュ中: 固定方向に猛進
        e.x += e.dashVx; e.y += e.dashVy;
        e.dashDur = (e.dashDur||0) - 1;
        if (e.dashDur <= 0) {
          e.dashing = false;
          e.dashTimer = B.RUSHER_COOLDOWN + Math.floor(Math.random()*B.RUSHER_COOLDOWN_RND);
        }
        // ダッシュ中の残像パーティクル
        if (Math.random()<0.4) spawnParticles(e.x, e.y, 1, '#ff8800');

      } else if (e.chargeTimer > 0) {
        // チャージ中: 止まって向きを固定
        if (dist>0.5) { e.x+=dx/dist*e.spd*0.15; e.y+=dy/dist*e.spd*0.15; }

      } else if (e.dashTimer <= 0) {
        // チャージ開始
        e.chargeTimer = B.RUSHER_CHARGE_F;
        e.dashVx = (dx/dist) * (e.spd * B.RUSHER_DASH_SPD);
        e.dashVy = (dy/dist) * (e.spd * B.RUSHER_DASH_SPD);

      } else if (e.chargeTimer === 0) {
        // ダッシュ発射！
        e.dashing = true;
        e.dashDur = B.RUSHER_DASH_DUR;
        playTone(180,'sawtooth',0.05,0.08,80);

      } else {
        // 通常移動
        if (e.stun>0) { e.stun--; }
        else if (dist>0.5) { e.x+=dx/dist*e.spd; e.y+=dy/dist*e.spd; }
      }

      // ダッシュ中は接触ダメージ2倍
      const hitR = e.sz + 18;
      if ((player.x-e.x)*(player.x-e.x)+(player.y-e.y)*(player.y-e.y) < hitR*hitR && player.invincible<=0) {
        const dmg = e.dashing ? B.CONTACT_DMG*2 : B.CONTACT_DMG;
        player.hp -= dmg; player.invincible = B.INVINCIBLE_FRAMES; sfxDamage();
        spawnParticles(player.x,player.y,10,'#ff6600');
        if (e.dashing) { e.dashing=false; e.dashTimer=120; } // ダッシュ後はよろける
        if (player.hp<=0) { player.hp=0; state='GAMEOVER'; endTimer=0; return; }
      }

    } else {
      // 通常敵
      if (e.stun>0) { e.stun--; } // スタン中は動けない
      else if (dist>0.5) { e.x+=dx/dist*e.spd; e.y+=dy/dist*e.spd; }
      if (dist<e.sz+18&&player.invincible<=0) {
        player.hp-=B.CONTACT_DMG; player.invincible=B.INVINCIBLE_FRAMES; sfxDamage();
        spawnParticles(player.x,player.y,10,'#ff3333');
        if (player.hp<=0) { player.hp=0; state='GAMEOVER'; endTimer=0; return; }
      }
    }
  }

  // Update items
  for (let i=items.length-1;i>=0;i--) {
    const it=items[i]; it.life--; it.phase+=0.055;
    if (it.life<=0){items.splice(i,1);continue;}
    if ((player.x-it.x)*(player.x-it.x)+(player.y-it.y)*(player.y-it.y)<676) {
      collectItem(it.type); spawnParticles(it.x,it.y,8,ITEM_COL[it.type]); items.splice(i,1);
    }
  }

  // Particles
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life--;
    if (p.life<=0) particles.splice(i,1);
  }

  // Float messages
  for (let i=floatMsgs.length-1;i>=0;i--) {
    floatMsgs[i].life--; floatMsgs[i].y-=0.65;
    if (floatMsgs[i].life<=0) floatMsgs.splice(i,1);
  }
}

function updateEnding() {
  endTimer++;
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life--;
    if (p.life<=0) particles.splice(i,1);
  }
}

// ─────────────────────── RENDER ───────────────────────

function render(now) {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#030609'; ctx.fillRect(0,0,W,H);
  drawGrid(now);

  if (state==='TITLE')    { drawTitle(now);    return; }
  if (state==='HUMANWIN') { drawHumanWin(now); return; }
  if (state==='GAMEOVER') { drawGameOver();    return; }
  if (state==='ENDING')   { drawEnding(now);   return; }

  // Particles (behind)
  drawParticles();

  // Items
  for (const it of items) drawItem(it);

  // Enemies
  for (const e of enemies) drawEnemy(e, now);

  // Bullets
  for (const b of bullets) drawBullet(b);

  // Player
  drawPlayer(now);

  // HUD
  drawHUD();
  drawTV(now);

  // Float msgs
  ctx.textAlign='center';
  for (const m of floatMsgs) {
    ctx.globalAlpha = m.life/m.maxLife;
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffffff';
    ctx.font='bold 16px monospace';
    ctx.fillText(m.text, m.x, m.y);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.textAlign='left';
}

function drawGrid(now) {
  const t=now*0.00015;
  ctx.strokeStyle='rgba(30,80,55,0.09)'; ctx.lineWidth=1;
  const gs=60;
  for (let x=(t*12)%gs; x<W; x+=gs){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=(t*8)%gs;  y<H; y+=gs){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBullet(b) {
  const bd=BULLET[b.type];
  ctx.shadowColor=bd.glow; ctx.shadowBlur=15;
  ctx.fillStyle=bd.color;
  ctx.beginPath(); ctx.arc(b.x,b.y,b.sz,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

function drawPlayer(now) {
  const p=player, t=now/1000, st=p.evoStage;
  const pulse=1+Math.sin(t*4)*0.11;
  const bodyR=(14+st*4.5)*pulse;
  const COLS=['#44ff88','#33ffcc','#22ffaa','#11ff55'];
  const col=COLS[st];

  ctx.save(); ctx.translate(p.x,p.y);

  // Aura
  const ag=ctx.createRadialGradient(0,0,0,0,0,bodyR*3);
  ag.addColorStop(0,col+'2a'); ag.addColorStop(1,'transparent');
  ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(0,0,bodyR*3,0,Math.PI*2); ctx.fill();

  ctx.shadowColor=col; ctx.shadowBlur=22;

  if (st===0) {
    // Blob
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(0,0,bodyR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#001a05';
    ctx.beginPath(); ctx.arc(-5,-3,3.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 5,-3,3.2,0,Math.PI*2); ctx.fill();

  } else if (st===1) {
    // Spiked
    ctx.fillStyle=col;
    ctx.beginPath();
    for (let i=0;i<10;i++) {
      const a=(i/10)*Math.PI*2+t*0.65, r=i%2===0?bodyR:bodyR*0.62;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#001a05';
    ctx.beginPath(); ctx.arc(-6,-4.5,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6,-4.5,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff4400';
    ctx.beginPath(); ctx.arc(-6,-4.5,1.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6,-4.5,1.8,0,Math.PI*2); ctx.fill();

  } else if (st===2) {
    // Clawed
    for (let i=0;i<6;i++) {
      const a=(i/6)*Math.PI*2+t*0.5;
      const lx=Math.cos(a)*bodyR*1.6, ly=Math.sin(a)*bodyR*1.6;
      ctx.strokeStyle=col+'99'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(lx,ly); ctx.stroke();
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(lx,ly,5.5,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle=col;
    ctx.beginPath();
    for (let i=0;i<12;i++) {
      const a=(i/12)*Math.PI*2+t*0.4, r=i%3===0?bodyR:bodyR*0.68;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff2200'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(-7,-5.5,4.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 7,-5.5,4.5,0,Math.PI*2); ctx.fill();

  } else {
    // Tentacle monster
    for (let i=0;i<10;i++) {
      const a=(i/10)*Math.PI*2+t*0.38;
      const w2=Math.sin(t*2.2+i*0.9)*0.42;
      const len=bodyR*2.4;
      const tx=Math.cos(a+w2)*len, ty=Math.sin(a+w2)*len;
      const cx2=Math.cos(a+1.3)*len*0.5, cy2=Math.sin(a+1.3)*len*0.5;
      ctx.strokeStyle=col+'88'; ctx.lineWidth=5.5; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(cx2,cy2,tx,ty); ctx.stroke();
    }
    ctx.shadowBlur=25;
    ctx.fillStyle=col;
    ctx.beginPath();
    for (let i=0;i<16;i++) {
      const a=(i/16)*Math.PI*2+t*0.72, r=i%2===0?bodyR:bodyR*0.7;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff0000'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=22;
    ctx.beginPath(); ctx.arc(-8.5,-6,5.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8.5,-6,5.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffff00';
    ctx.beginPath(); ctx.arc(-8.5,-6,2.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8.5,-6,2.8,0,Math.PI*2); ctx.fill();
  }

  ctx.shadowBlur=0; ctx.restore();

  // HP bar
  const bw=58, hpR=player.hp/player.maxHp;
  ctx.fillStyle='#111'; ctx.fillRect(p.x-bw/2, p.y+bodyR+5, bw, 5);
  ctx.fillStyle=hpR>0.5?'#44ff88':hpR>0.25?'#ffaa33':'#ff3333';
  ctx.fillRect(p.x-bw/2, p.y+bodyR+5, bw*hpR, 5);

  // Invincibility flash
  if (player.invincible>0 && Math.floor(player.invincible/5)%2===0) {
    ctx.globalAlpha=0.28; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(p.x,p.y,bodyR+6,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawEnemy(e, now) {
  const t=now/1000, sz=e.sz;
  ctx.save(); ctx.translate(e.x,e.y);
  if (e.flash>0){ ctx.shadowColor='#ffffff'; ctx.shadowBlur=26; }
  const col=e.flash>0?'#ffffff':e.col;

  switch(e.type) {
    case 'INFANTRY':
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(0,-sz*0.55,sz*0.38,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-sz*0.3,-sz*0.25,sz*0.6,sz*0.75);
      ctx.fillRect(-sz*0.28,sz*0.5,sz*0.24,sz*0.38);
      ctx.fillRect( sz*0.04,sz*0.5,sz*0.24,sz*0.38);
      break;
    case 'BIKE':
      ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(0,-sz); ctx.lineTo(sz*0.68,0); ctx.lineTo(0,sz); ctx.lineTo(-sz*0.68,0);
      ctx.closePath(); ctx.fill();
      if (e.flash<=0) {
        const ang=Math.atan2(player.y-e.y,player.x-e.x);
        ctx.strokeStyle=e.col+'55'; ctx.lineWidth=2;
        for (let k=-1;k<=1;k++) {
          const a=ang+k*0.28+Math.PI;
          ctx.beginPath(); ctx.moveTo(Math.cos(a)*sz*1.1,Math.sin(a)*sz*1.1);
          ctx.lineTo(Math.cos(a)*sz*2.2,Math.sin(a)*sz*2.2); ctx.stroke();
        }
      }
      break;
    case 'TANK':
      ctx.fillStyle=e.flash>0?'#fff':'#1f3a1f';
      ctx.fillRect(-sz,-sz*0.72,sz*2,sz*1.44);
      ctx.fillStyle=col;
      ctx.fillRect(-sz*0.72,-sz*0.52,sz*1.44,sz*1.04);
      ctx.beginPath(); ctx.arc(0,0,sz*0.42,0,Math.PI*2); ctx.fill();
      ctx.save();
      ctx.rotate(Math.atan2(player.y-e.y,player.x-e.x));
      ctx.fillStyle=col;
      ctx.fillRect(0,-sz*0.12,sz*0.95,sz*0.24);
      ctx.restore();
      break;
    case 'HELI':
      ctx.save();
      ctx.rotate(Math.atan2(player.y-e.y, player.x-e.x) + Math.PI);
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(0,0,sz*0.58,0,Math.PI*2); ctx.fill();
      ctx.fillRect(sz*0.52,-sz*0.12,sz*0.82,sz*0.24);
      ctx.beginPath(); ctx.arc(sz*1.35,0,sz*0.22,0,Math.PI*2); ctx.fill();
      const ra=t*9;
      ctx.strokeStyle=e.flash>0?'#fff':'#ffdd88'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(Math.cos(ra)*sz,Math.sin(ra)*sz);
      ctx.lineTo(-Math.cos(ra)*sz,-Math.sin(ra)*sz); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(Math.cos(ra+1.57)*sz,Math.sin(ra+1.57)*sz);
      ctx.lineTo(-Math.cos(ra+1.57)*sz,-Math.sin(ra+1.57)*sz); ctx.stroke();
      ctx.restore();
      break;

    case 'RUSHER': {
      const ang = Math.atan2(player.y-e.y, player.x-e.x);
      ctx.save(); ctx.rotate(ang);

      const charging = (e.chargeTimer||0) > 0;
      const dashing  = !!e.dashing;

      // チャージ中は赤く点滅
      const bodyCol = dashing ? '#ffffff' : charging ? (Math.sin(Date.now()*0.04)>0?'#ffff00':'#ff4400') : col;
      ctx.fillStyle = bodyCol;
      ctx.shadowColor = dashing ? '#ffffff' : '#ff6600';
      ctx.shadowBlur  = dashing ? 28 : charging ? 18 : 8;

      // 矢印型ボディ
      ctx.beginPath();
      ctx.moveTo( sz,       0);          // 先端
      ctx.lineTo(-sz*0.55,  sz*0.65);    // 右後
      ctx.lineTo(-sz*0.2,   0);          // 後ろくびれ
      ctx.lineTo(-sz*0.55, -sz*0.65);    // 左後
      ctx.closePath(); ctx.fill();

      // チャージ中: 集束エフェクト（前方に光が集まる）
      if (charging) {
        const prog = 1 - (e.chargeTimer||0)/55;
        ctx.strokeStyle=`rgba(255,150,0,${prog*0.8})`; ctx.lineWidth=2;
        for (let k=0;k<4;k++) {
          const a = (k/4)*Math.PI*2 + Date.now()*0.01;
          const r = sz*(2.2-prog*1.4);
          ctx.beginPath();
          ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
          ctx.lineTo(sz*0.5, 0);
          ctx.stroke();
        }
      }

      // ダッシュ中: スピードライン
      if (dashing) {
        ctx.strokeStyle='rgba(255,200,100,0.5)'; ctx.lineWidth=2;
        for (let k=0;k<3;k++) {
          const oy = (k-1)*sz*0.4;
          ctx.beginPath();
          ctx.moveTo(-sz*0.5, oy);
          ctx.lineTo(-sz*2.2, oy);
          ctx.stroke();
        }
      }
      ctx.shadowBlur=0; ctx.restore();
      break;
    }


  } // switch end

  // HP bar
  if (e.hp<e.maxHp) {
    const bw=sz*2.4;
    ctx.fillStyle='#2a0808'; ctx.fillRect(-bw/2,sz+5,bw,4);
    ctx.fillStyle='#ff4444'; ctx.fillRect(-bw/2,sz+5,bw*Math.max(0,e.hp/e.maxHp),4);
  }

  // Weakness indicator
  if (e.weakTo===player.mode||player.mode==='MIXED') {
    ctx.strokeStyle='#ffffff44'; ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(0,0,sz+8,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.shadowBlur=0; ctx.restore();
}

function drawItem(it) {
  const col=ITEM_COL[it.type], bob=Math.sin(it.phase)*5;
  ctx.globalAlpha=Math.min(1,it.life/40);
  ctx.shadowColor=col; ctx.shadowBlur=18;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(it.x,it.y+bob,11.5,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#000';
  ctx.font='bold 9px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(ITEM_LABEL[it.type],it.x,it.y+bob);
  ctx.textBaseline='alphabetic'; ctx.textAlign='left'; ctx.globalAlpha=1;
}

function drawTV(now) {
  if (!tvOn) return;
  const t = now/1000;
  const ch = Math.min(newsIdx, TV_CHANNELS.length-1);
  const lines = TV_CHANNELS[ch];
  const isSandstorm = ch >= TV_CHANNELS.length-1;

  // TV外枠
  const tw=400, th=270;
  if (tvX<0) { tvX=W/2-TV_W/2; tvY=H/2-TV_H/2-20; }
  const tx=tvX+22, ty=tvY+22;

  // 外側のフレーム（ブラウン管風）
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();
  ctx.roundRect(tx-22, ty-22, tw+44, th+44, 18);
  ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=3;
  ctx.stroke();
  // つかむエリアのヒント（上部グリップ）
  ctx.fillStyle= tvDrag ? '#334' : '#252525';
  ctx.beginPath(); ctx.roundRect(tx-22, ty-22, tw+44, 22, [18,18,0,0]); ctx.fill();
  ctx.fillStyle='#444'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText('⠿ つかんで移動', tx+tw/2, ty-7);
  ctx.textAlign='left';

  // 画面
  ctx.fillStyle= isSandstorm ? '#111' : '#001a00';
  ctx.beginPath();
  ctx.roundRect(tx, ty, tw, th, 6);
  ctx.fill();

  if (isSandstorm) {
    // 砂嵐
    ctx.save();
    ctx.beginPath(); ctx.roundRect(tx,ty,tw,th,6); ctx.clip();
    for (let i=0;i<800;i++) {
      const nx=(Math.sin(i*127.1+t*83)*0.5+0.5)*tw;
      const ny=(Math.sin(i*311.7+t*97)*0.5+0.5)*th;
      ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.4})`;
      ctx.fillRect(tx+nx,ty+ny,2,2);
    }
    ctx.restore();
    ctx.fillStyle='#ffffff22'; ctx.font='bold 28px monospace';
    ctx.textAlign='center';
    ctx.fillText('■ 放送終了 ■',W/2,H/2+14);
  } else {
    // スキャンライン風
    ctx.save();
    ctx.beginPath(); ctx.roundRect(tx,ty,tw,th,6); ctx.clip();
    for (let sy=ty;sy<ty+th;sy+=4) {
      ctx.fillStyle='rgba(0,0,0,0.18)';
      ctx.fillRect(tx,sy,tw,2);
    }
    // ヘッダー
    ctx.fillStyle='#ff2222';
    ctx.fillRect(tx, ty, tw, 36);
    ctx.fillStyle='#ffffff';
    ctx.font='bold 14px monospace';
    ctx.textAlign='center';
    // idx12以降は進化ステージで内容が変わる
    let displayLines = lines;
    if (ch === 12) {
      const wIdx = player.evoStage >= 3 ? 2 : player.evoStage >= 2 ? 1 : 0;
      const wContents = [
        ["米軍発表", "トマホーク巡航ミサイル発射", "精密爆撃により撃滅する", "周辺住民は避難してください"],
        ["国防総省", "バンカーバスター投下を決定", "怪物体には大型爆弾で対応", "これで終わらせる"],
        ["大統領声明", "核使用を承認しました", "完全体には核しかない…", "国民の皆様、ご武運を"],
      ];
      displayLines = wContents[wIdx];
    }
    ctx.fillText('◉ LIVE  ' + displayLines[0], tx+tw/2, ty+23);

    // ── 棒人間アナウンサー ──
    const ax = tx+58, ay = ty+168; // アナウンサーの中心
    const panic = newsIdx >= 9;    // 後半はパニックモード
    const armSwing = Math.sin(t * (panic?12:3)) * (panic?0.8:0.3);
    const headBob  = Math.sin(t * (panic?8:2)) * (panic?3:1);
    ctx.strokeStyle='#88ff99'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.shadowColor='#44ff44'; ctx.shadowBlur=6;
    // 頭
    ctx.beginPath(); ctx.arc(ax, ay-52+headBob, 13, 0, Math.PI*2); ctx.stroke();
    // 体
    ctx.beginPath(); ctx.moveTo(ax, ay-39+headBob); ctx.lineTo(ax, ay-10); ctx.stroke();
    // 左腕（マイク持ち）
    ctx.beginPath();
    ctx.moveTo(ax, ay-32);
    ctx.lineTo(ax-18+Math.cos(armSwing)*8, ay-18+Math.sin(armSwing)*6);
    ctx.stroke();
    // マイク
    ctx.fillStyle='#aaffaa';
    ctx.fillRect(ax-22+Math.cos(armSwing)*8, ay-22+Math.sin(armSwing)*6, 5, 9);
    // 右腕（パニック時は上に上がる）
    ctx.beginPath();
    ctx.moveTo(ax, ay-32);
    ctx.lineTo(ax+18, ay-18 + (panic ? -18+Math.sin(t*11)*10 : Math.sin(armSwing+1)*6));
    ctx.stroke();
    // 左脚
    ctx.beginPath();
    ctx.moveTo(ax, ay-10);
    ctx.lineTo(ax-10, ay+16);
    ctx.stroke();
    // 右脚
    ctx.beginPath();
    ctx.moveTo(ax, ay-10);
    ctx.lineTo(ax+10+Math.sin(t*(panic?9:2))*4, ay+16);
    ctx.stroke();
    // 顔（後半は泣き顔）
    ctx.strokeStyle='#88ff99'; ctx.lineWidth=1.5;
    if (panic) {
      // 泣き顔
      ctx.beginPath(); ctx.arc(ax-5, ay-55+headBob, 2, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(ax+5, ay-55+headBob, 2, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(ax, ay-48+headBob, 6, 0, Math.PI); ctx.stroke(); // 口（逆弧）
      // 涙
      ctx.fillStyle='#aaffff';
      ctx.beginPath(); ctx.ellipse(ax-5, ay-48+headBob, 2, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(ax+5, ay-48+headBob, 2, 4, 0, 0, Math.PI*2); ctx.fill();
    } else {
      // 普通顔
      ctx.beginPath(); ctx.arc(ax-5, ay-55+headBob, 2, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(ax+5, ay-55+headBob, 2, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(ax, ay-50+headBob, 5, 0.2, Math.PI-0.2); ctx.stroke();
    }
    // デスク
    ctx.strokeStyle='#226622'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(tx+8, ay+18); ctx.lineTo(ax+70, ay+18); ctx.stroke();
    ctx.fillStyle='#112211';
    ctx.fillRect(tx+8, ay+18, 60+70, 6);

    ctx.shadowBlur=0;

    // 本文（アナウンサーの右側）
    const textLines = (typeof displayLines!=='undefined'?displayLines:lines).slice(1);
    textLines.forEach((line, i) => {
      const pulse = i===0 ? (Math.sin(t*4)>0?'#ffffff':'#ffff88') : '#88ff99';
      ctx.fillStyle=pulse;
      ctx.font = i===0 ? 'bold 17px monospace' : '13px monospace';
      ctx.textAlign='left';
      ctx.fillText(line, tx+122, ty+72+i*34);
    });

    // スクロールテロップ
    ctx.fillStyle='#ffff00';
    ctx.fillRect(tx, ty+th-28, tw, 28);
    ctx.save();
    ctx.beginPath(); ctx.rect(tx, ty+th-28, tw, 28); ctx.clip(); // テロップ枠でクリップ
    const ticker = '▶ ' + getNewsText() + '        ';
    ctx.font='bold 12px monospace';
    const tickW = ctx.measureText(ticker).width;
    const tickTotal = tw + tickW;
    const tickX = (t * 80) % tickTotal;
    ctx.fillStyle='#000';
    ctx.textAlign='left';
    ctx.fillText(ticker, tx + tw - tickX, ty+th-10);
    ctx.restore();
    ctx.restore();
  }

  // TV下部ボタン類（雰囲気）
  ctx.fillStyle='#222';
  for (let i=0;i<5;i++) {
    ctx.beginPath();
    ctx.arc(tx+60+i*30, ty+th+32, 7, 0, Math.PI*2);
    ctx.fillStyle= i===0 ? '#882222' : '#333';
    ctx.fill();
    ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.stroke();
  }

  // 閉じるヒント
  ctx.fillStyle='#334433'; ctx.font='10px monospace';
  ctx.textAlign='center';
  ctx.fillText('[T] または TVボタンで消す', W/2, ty+th+58);
  ctx.textAlign='left';
}

function drawHUD() {
  // Top bar（HPとスコアのみ）
  ctx.fillStyle='rgba(3,6,9,0.88)'; ctx.fillRect(0,0,W,38);
  ctx.fillStyle='#1a3022'; ctx.fillRect(0,37,W,1);

  // HP bar
  const hpW=155, hpR=player.hp/player.maxHp;
  ctx.fillStyle='#151515'; ctx.fillRect(14,10,hpW,17);
  ctx.fillStyle=hpR>0.5?'#44ff88':hpR>0.25?'#ffaa33':'#ff3333';
  ctx.fillRect(14,10,hpW*hpR,17);
  ctx.strokeStyle='#2a4a32'; ctx.lineWidth=1; ctx.strokeRect(14,10,hpW,17);
  ctx.fillStyle='#fff'; ctx.font='11px monospace';
  ctx.fillText(`HP  ${Math.ceil(player.hp)} / ${player.maxHp}`,18,22);

  // Mode selector — 左下に大きく配置
  const modes=[
    {k:'1',m:'RED',  c:'#ff4444',l:'赤弾'},
    {k:'2',m:'BLUE', c:'#3399ff',l:'青弾'},
    {k:'3',m:'GREEN',c:'#33ff77',l:'緑弾'},
    {k:'M',m:'MIXED',c:'#ffaa33',l:'MIX'},
  ];
  const BW=78, BH=46, BGAP=84, BY=H-BH-36;
  let bx=14;
  for (const mo of modes) {
    const active=player.mode===mo.m;
    // 背景
    ctx.fillStyle=active?mo.c+'35':'#080c08';
    ctx.fillRect(bx,BY,BW,BH);
    // 枠
    ctx.strokeStyle=active?mo.c:'#223322';
    ctx.lineWidth=active?2.5:1;
    ctx.strokeRect(bx,BY,BW,BH);
    // アクティブは左端に縦ライン
    if (active) {
      ctx.fillStyle=mo.c;
      ctx.fillRect(bx,BY,3,BH);
      ctx.shadowColor=mo.c; ctx.shadowBlur=14;
    }
    // キー番号
    ctx.fillStyle=active?mo.c+'aa':'#334433';
    ctx.font='10px monospace';
    ctx.fillText(`[${mo.k}]`,bx+7,BY+14);
    // 弾名
    ctx.fillStyle=active?mo.c:'#445544';
    ctx.font=(active?'bold ':'')+'16px monospace';
    ctx.fillText(mo.l,bx+8,BY+35);
    ctx.shadowBlur=0;
    bx+=BGAP;
  }

  // Score
  ctx.textAlign='center';
  ctx.fillStyle='#ddff88'; ctx.font='bold 19px monospace';
  ctx.fillText(score.toString().padStart(6,'0'),W/2,24);
  ctx.fillStyle='#446644'; ctx.font='10px monospace';
  ctx.fillText('SCORE',W/2,35);
  ctx.textAlign='left';

  // Timer
  const mm=Math.floor(elapsed/60).toString().padStart(2,'0');
  const ss=Math.floor(elapsed%60).toString().padStart(2,'0');
  ctx.fillStyle='#aaffcc'; ctx.font='14px monospace';
  ctx.fillText(`${mm}:${ss}`,W-118,18);
  // 進化ゲージ
  const evoProgress = (
    Math.min(player.bCount, B.MAX_BULLET) / B.MAX_BULLET +
    Math.min(1, (B.PLAYER_FIRE_RATE - player.fireRate) / (B.PLAYER_FIRE_RATE - B.MAX_FIRE_RATE)) +
    Math.min(player.spd, B.MAX_SPD) / B.MAX_SPD +
    Math.min(player.bSz, B.MAX_BSZ) / B.MAX_BSZ
  ) / 4;
  ctx.fillStyle='#334a3a'; ctx.fillRect(W-118,22,88,7);
  const evoCol=['#88ff99','#33ffcc','#ff8833','#ff2200'][player.evoStage];
  ctx.fillStyle=evoCol; ctx.fillRect(W-118,22,88*evoProgress,7);
  ctx.strokeStyle='#2a4a32'; ctx.lineWidth=1; ctx.strokeRect(W-118,22,88,7);
  ctx.fillStyle=evoCol; ctx.font='bold 10px monospace';
  ctx.fillText(`進化: ${EVO_LABEL[player.evoStage]}`,W-118,36);
  ctx.fillStyle='#334a3a'; ctx.font='10px monospace';
  ctx.fillText(`WAVE ${currentWave()+1}`, W-50, 36);

  // [TV] ボタン（右下のモードボタンの右端あたり）
  const tvBX=14+84*4, tvBY=H-54-36, tvBW=72, tvBH=54;
  // グロー効果
  ctx.shadowColor= tvOn ? '#44ff88' : '#aaffcc';
  ctx.shadowBlur = tvOn ? 18 : 8;
  ctx.fillStyle  = tvOn ? '#1a3a1a' : '#0d1f10';
  ctx.fillRect(tvBX, tvBY, tvBW, tvBH);

// True End 用の花火パーティクル
let fireworks=[];
function launchFirework(x,y) {
  const cols=['#ffdd00','#ff4488','#44aaff','#44ff88','#ff8844','#ffffff','#cc44ff'];
  const col=cols[Math.floor(Math.random()*cols.length)];
  for (let i=0;i<38;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*7+2;
    fireworks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:55+Math.random()*35,maxLife:90,sz:Math.random()*3.5+1.2});
  }
  playTone(Math.random()*600+400,'sine',0.06,0.1);
}

function drawHumanWin(now) {
  const t=endTimer;

  // 背景：だんだん青空に
  const skyA=Math.min(1,Math.max(0,(t-100)/120));
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  if (skyA>0) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,`rgba(30,80,200,${skyA})`);
    sky.addColorStop(1,`rgba(10,30,80,${skyA})`);
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  }

  // ミサイル突入フェーズ
  if (t<75) {
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    const prog=t/75;
    const mx2=W/2, my2=-60+prog*(H/2+60);
    // 炎の軌跡
    for (let i=0;i<6;i++) {
      const oy=my2+i*18+Math.random()*8;
      ctx.fillStyle=`rgba(255,${160-i*20},0,${0.7-i*0.1})`;
      ctx.beginPath(); ctx.arc(mx2+Math.sin(t*0.9+i)*3, oy, 5-i*0.5, 0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#cccccc';
    ctx.save(); ctx.translate(mx2,my2);
    ctx.fillRect(-6,0,12,32);
    ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(6,0); ctx.lineTo(0,-20); ctx.closePath(); ctx.fill();
    ctx.restore();
    // サイレン的点滅
    if (Math.floor(t/6)%2===0) {
      ctx.fillStyle='rgba(255,50,0,0.07)'; ctx.fillRect(0,0,W,H);
    }

  // 爆発フラッシュ
  } else if (t<130) {
    const ph=t-75;
    const flashA=Math.max(0,1-ph/55);
    ctx.fillStyle=`rgba(255,240,200,${flashA})`; ctx.fillRect(0,0,W,H);
    if (t===75) {
      playNoise(0.35,0.4,600);
      for (let i=0;i<5;i++) setTimeout(()=>launchFirework(W/2+Math.random()*200-100,H/2+Math.random()*150-75),i*60);
    }
    // 爆発リング
    const ring=(ph/55)*180;
    ctx.strokeStyle=`rgba(255,180,80,${flashA*0.6})`; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(W/2,H/2,ring,0,Math.PI*2); ctx.stroke();

  // TRUE END 本編
  } else {
    const ph=t-130;

    // 花火を定期発射
    if (ph>0 && ph%22===0) {
      launchFirework(Math.random()*W*0.8+W*0.1, Math.random()*H*0.6+H*0.05);
    }

    // 花火描画
    for (let i=fireworks.length-1;i>=0;i--) {
      const fw=fireworks[i];
      fw.x+=fw.vx; fw.y+=fw.vy; fw.vy+=0.12; fw.vx*=0.97; fw.life--;
      ctx.globalAlpha=Math.max(0,fw.life/fw.maxLife);
      ctx.shadowColor=fw.col; ctx.shadowBlur=8;
      ctx.fillStyle=fw.col;
      ctx.beginPath(); ctx.arc(fw.x,fw.y,fw.sz,0,Math.PI*2); ctx.fill();
      if (fw.life<=0) fireworks.splice(i,1);
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    ctx.textAlign='center';

    // TRUE END バナー
    if (ph>20) {
      // 背景プレート
      const bh=110, by=H/2-145;
      const grad=ctx.createLinearGradient(0,by,W,by+bh);
      grad.addColorStop(0,'rgba(255,220,0,0.18)');
      grad.addColorStop(0.5,'rgba(255,255,255,0.22)');
      grad.addColorStop(1,'rgba(255,180,0,0.18)');
      ctx.fillStyle=grad; ctx.fillRect(0,by,W,bh);

      // TRUE END テキスト
      const pulse=1+Math.sin(ph*0.09)*0.04;
      ctx.save(); ctx.translate(W/2,H/2-110); ctx.scale(pulse,pulse);
      ctx.shadowColor='#ffdd00'; ctx.shadowBlur=50;
      ctx.fillStyle='#ffee44';
      ctx.font=`bold ${Math.min(22,W/45)}px monospace`;
      ctx.fillText('★  T R U E   E N D  ★',0,0);
      ctx.shadowBlur=0; ctx.restore();

      ctx.shadowColor='#ffffff'; ctx.shadowBlur=28;
      ctx.fillStyle='#ffffff';
      ctx.font=`bold ${Math.min(52,W/12)}px monospace`;
      ctx.fillText('人類は平和を',W/2, H/2-60);
      ctx.fillText('取り戻した。',W/2, H/2+5);
      ctx.shadowBlur=0;
    }

    if (ph>90) {
      ctx.fillStyle='#aaddff'; ctx.font='17px monospace';
      ctx.fillText('未確認生命体は完全に排除された。', W/2, H/2+62);
    }
    if (ph>155) {
      ctx.fillStyle='#ffdd88'; ctx.font='bold 14px monospace';
      ctx.fillText('おめでとう！　完全体には至らなかった！', W/2, H/2+96);
    }
    if (ph>210) {
      ctx.fillStyle='#aaccff'; ctx.font='bold 16px monospace';
      const mm2=Math.floor(elapsed/60).toString().padStart(2,'0');
      const ss2=Math.floor(elapsed%60).toString().padStart(2,'0');
      ctx.fillText(`到達進化段階: ${EVO_LABEL[player.evoStage]}  /  生存時間: ${mm2}:${ss2}`, W/2, H/2+128);
      ctx.fillText(`FINAL SCORE: ${score}`, W/2, H/2+152);
    }
    if (ph>260) {
      const weaponName = player.evoStage >= 2 ? 'バンカーバスター大型爆弾' : 'トマホーク巡航ミサイル';
      const weaponCol  = player.evoStage >= 2 ? '#ff8844' : '#44ddff';
      ctx.fillStyle='#aabbcc'; ctx.font='bold 15px monospace';
      ctx.fillText('人類が使用した最終兵器：', W/2, H/2+180);
      ctx.shadowColor=weaponCol; ctx.shadowBlur=14;
      ctx.fillStyle=weaponCol; ctx.font='bold 17px monospace';
      ctx.fillText(`🚀 ${weaponName}`, W/2, H/2+204);
      ctx.shadowBlur=0;
    }
    if (ph>290 && Math.sin(ph*0.1)>0) {
      ctx.fillStyle='#aabbcc'; ctx.font='bold 15px monospace';
      ctx.fillText('[ SPACE ] でタイトルへ', W/2, H/2+232);
    }
    ctx.textAlign='left'; ctx.shadowBlur=0;

    if (ph>780) { state='TITLE'; fireworks=[]; }
  }
}

const ELEGY = [
  'それでも、生きようとしていた。',
  '進化の途中で、散った。',
  'お前は最後まで戦った。',
  '人類には、まだ早すぎた。',
  '次の進化は、きっと——',
];
function drawGameOver() {
  const t=endTimer;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // 暗い緑のグリッド、消えていく
  ctx.globalAlpha=Math.max(0,0.06-t*0.0003);
  drawGrid(lastTime);
  ctx.globalAlpha=1;

  // 段階的にテキストが浮かぶ
  ctx.textAlign='center';

  // --- フェーズ1: 倒れていく演出 (0〜60)
  if (t<60) {
    const a=t/60;
    // プレイヤーの残像がゆっくり消える
    const col=['#44ff88','#33ffcc','#22ffaa','#11ff55'][player.evoStage];
    ctx.globalAlpha=(1-a)*0.7;
    ctx.shadowColor=col; ctx.shadowBlur=30*( 1-a);
    ctx.fillStyle=col;
    const sz=(14+player.evoStage*4.5)*(1+a*0.5);
    ctx.beginPath(); ctx.arc(W/2,H/2,sz,0,Math.PI*2); ctx.fill();
    // 崩れるパーティクル
    if (t%3===0) spawnParticles(W/2+Math.random()*60-30,H/2+Math.random()*60-30,2,col);
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  // --- フェーズ2: 弔いテキスト (60〜)
  if (t>60) {
    const ph=t-60;
    const fadeIn=Math.min(1,ph/40);

    // 進化段階のシルエット（暗い）
    ctx.globalAlpha=0.12;
    ctx.fillStyle='#44ff88';
    ctx.beginPath(); ctx.arc(W/2,H/2+20,50+player.evoStage*14,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // メインメッセージ
    if (ph>10) {
      ctx.globalAlpha=Math.min(1,(ph-10)/35);
      ctx.shadowColor='#33ff77'; ctx.shadowBlur=18;
      ctx.fillStyle='#88ccaa';
      ctx.font=`${Math.min(16,W/70)}px monospace`;
      ctx.fillText('— R E Q U I E M —',W/2,H/2-130);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
    if (ph>55) {
      ctx.globalAlpha=Math.min(1,(ph-55)/45);
      ctx.shadowColor='#22ff66'; ctx.shadowBlur=22;
      ctx.fillStyle='#aaffcc';
      ctx.font=`bold ${Math.min(34,W/22)}px monospace`;
      ctx.fillText('進化、途絶える。',W/2,H/2-72);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }

    // 弔いの言葉（ランダム）
    if (ph>110) {
      ctx.globalAlpha=Math.min(1,(ph-110)/50);
      ctx.fillStyle='#88bb99';
      ctx.font=`${Math.min(20,W/50)}px monospace`;
      const msg=ELEGY[Math.floor(score/100+player.evoStage)%ELEGY.length];
      ctx.fillText(msg,W/2,H/2-20);
      ctx.globalAlpha=1;
    }

    // スタッツ
    if (ph>175) {
      ctx.globalAlpha=Math.min(1,(ph-175)/40);
      const mm2=Math.floor(elapsed/60).toString().padStart(2,'0');
      const ss2=Math.floor(elapsed%60).toString().padStart(2,'0');
      ctx.fillStyle='#88bbaa'; ctx.font='bold 15px monospace';
      ctx.fillText(`進化段階: ${EVO_LABEL[player.evoStage]}　生存時間: ${mm2}:${ss2}`,W/2,H/2+55);
      ctx.fillText(`SCORE: ${score}`,W/2,H/2+80);
      ctx.globalAlpha=1;
    }

    // 進化ゲージ（未達成分を表示）
    if (ph>230) {
      ctx.globalAlpha=Math.min(1,(ph-230)/40);
      const gw=200;
      const evoProgress=(
        Math.min(player.bCount, B.MAX_BULLET) / B.MAX_BULLET +
        Math.min(1, (B.PLAYER_FIRE_RATE - player.fireRate) / (B.PLAYER_FIRE_RATE - B.MAX_FIRE_RATE)) +
        Math.min(player.spd, B.MAX_SPD) / B.MAX_SPD +
        Math.min(player.bSz, B.MAX_BSZ) / B.MAX_BSZ
      )/4;
      ctx.fillStyle='#1a2a1a'; ctx.fillRect(W/2-gw/2,H/2+102,gw,8);
      ctx.fillStyle='#33664a'; ctx.fillRect(W/2-gw/2,H/2+102,gw*evoProgress,8);
      ctx.strokeStyle='#2a4a32'; ctx.lineWidth=1; ctx.strokeRect(W/2-gw/2,H/2+102,gw,8);
      ctx.fillStyle='#88bbaa'; ctx.font='13px monospace';
      ctx.fillText(`完全体まで ${Math.round((1-evoProgress)*100)}% 足りなかった`,W/2,H/2+124);
      ctx.globalAlpha=1;
    }

    // タイトルへ
    if (ph>310 && Math.sin(ph*0.09)>0) {
      ctx.fillStyle='#aaccaa'; ctx.font='bold 15px monospace';
      ctx.fillText('[ SPACE ] で再挑戦',W/2,H/2+160);
    }
  }
  ctx.textAlign='left'; ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawEnding(now) {
  const t=endTimer;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawParticles();

  if (t<120) {
    // Nuclear alarm
    if (Math.floor(t/8)%2===0){ ctx.fillStyle='rgba(255,0,0,0.22)'; ctx.fillRect(0,0,W,H); }
    ctx.shadowColor='#ff3333'; ctx.shadowBlur=32;
    ctx.fillStyle='#ff3333';
    ctx.font=`bold ${Math.min(42,W/20)}px monospace`;
    ctx.textAlign='center';
    const sec=Math.ceil((120-t)/60);
    ctx.fillText(`⚠  核攻撃まで ${sec} 秒  ⚠`,W/2,H/2-18);
    ctx.shadowBlur=0; ctx.fillStyle='#ff6666'; ctx.font='16px monospace';
    ctx.fillText('政府は最終手段を選んだ',W/2,H/2+28);
    if (t===1) playNoise(1.5,0.4,200);

  } else if (t<200) {
    // White flash
    const a=Math.min(1,(t-120)/80);
    ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fillRect(0,0,W,H);

  } else if (t<390) {
    const ph=t-200;
    // Black fade-in
    ctx.fillStyle=`rgba(0,0,0,${Math.min(1,ph/30)})`; ctx.fillRect(0,0,W,H);
    ctx.shadowBlur=0; ctx.textAlign='center';
    if (ph>25) { ctx.fillStyle='#777'; ctx.font='18px monospace'; ctx.fillText('人類は最後の手段を選んだ。',W/2,H/2-90); }
    if (ph>80) {
      // Creature shadow
      ctx.fillStyle='#151515';
      ctx.beginPath(); ctx.ellipse(W/2,H/2+68,80,24,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#080808';
      ctx.beginPath(); ctx.arc(W/2,H/2,32,0,Math.PI*2); ctx.fill();
      for (let i=0;i<8;i++) {
        const a=(i/8)*Math.PI*2+ph*0.012;
        ctx.beginPath(); ctx.arc(W/2+Math.cos(a)*50,H/2+Math.sin(a)*50,9,0,Math.PI*2); ctx.fill();
      }
    }
    if (ph>145) {
      // Screen cracks
      ctx.strokeStyle='#ffffff44'; ctx.lineWidth=2;
      const cracks=[
        [[0,-1],[0.22,-0.5],[-0.12,-0.22],[0.28,0.1]],
        [[0.9,0.28],[0.45,0.1],[0.75,-0.18]],
        [[-0.65,0.45],[-0.28,0.18],[-0.48,-0.1]],
        [[0.1,0.95],[-0.12,0.48],[0.18,0.7]],
      ];
      for (const crack of cracks) {
        ctx.beginPath(); ctx.moveTo(W/2,H/2);
        let cx=W/2,cy=H/2;
        for (const [dx2,dy2] of crack) { cx+=dx2*200; cy+=dy2*200; ctx.lineTo(cx,cy); }
        ctx.stroke();
      }
    }
    if (ph>195) {
      ctx.shadowColor='#33ff77'; ctx.shadowBlur=28;
      ctx.fillStyle='#33ff77';
      ctx.font=`bold ${Math.min(30,W/28)}px monospace`;
      ctx.fillText('進化は、止まらない。',W/2,H/2+138);
      ctx.shadowBlur=0;
    }

  } else if (t<830) {
    const ph=t-390;
    ctx.fillStyle=`rgba(0,0,0,${Math.min(1,ph/35)})`; ctx.fillRect(0,0,W,H);
    if (ph>35) {
      ctx.textAlign='center';
      ctx.shadowColor='#33ff77'; ctx.shadowBlur=42;
      ctx.fillStyle='#33ff77';
      ctx.font=`bold ${Math.min(82,W/10)}px monospace`;
      ctx.fillText('BAD END',W/2,H/2-28);
      ctx.shadowBlur=0; ctx.fillStyle='#55aa77'; ctx.font='20px monospace';
      ctx.fillText(`FINAL SCORE: ${score}`,W/2,H/2+44);
      ctx.fillStyle='#88ccaa'; ctx.font='16px monospace';
      const mm=Math.floor(elapsed/60).toString().padStart(2,'0');
      const ss=Math.floor(elapsed%60).toString().padStart(2,'0');
      ctx.fillText(`生存時間: ${mm}:${ss}  最終進化: ${EVO_LABEL[player.evoStage]}`,W/2,H/2+76);
      ctx.fillStyle='#99bbaa'; ctx.font='bold 14px monospace';
      ctx.fillText('[ SPACE ] / [ クリック ] でタイトルへ',W/2,H/2+108);
    }
  } else {
    state='TITLE';
  }
  ctx.textAlign='left'; ctx.shadowBlur=0;
}

// ─────────────────────── MAIN LOOP ───────────────────────


// ─────────────────────── DEBUG OVERLAY ───────────────────────

function drawDebug() {
  // グリッド描画
  if (useGrid) {
    ctx.strokeStyle='rgba(0,255,100,0.12)'; ctx.lineWidth=1;
    for (let gx=0; gx<=GRID_COLS; gx++) {
      ctx.beginPath(); ctx.moveTo(gx*CELL_SIZE,0); ctx.lineTo(gx*CELL_SIZE,H); ctx.stroke();
    }
    for (let gy=0; gy<=GRID_ROWS; gy++) {
      ctx.beginPath(); ctx.moveTo(0,gy*CELL_SIZE); ctx.lineTo(W,gy*CELL_SIZE); ctx.stroke();
    }
    // セルごとの敵数をヒートマップ表示
    for (let gy=0; gy<GRID_ROWS; gy++) {
      for (let gx=0; gx<GRID_COLS; gx++) {
        const count = grid[gy*GRID_COLS+gx]?.length || 0;
        if (count>0) {
          ctx.fillStyle=`rgba(0,255,100,${Math.min(0.35, count*0.07)})`;
          ctx.fillRect(gx*CELL_SIZE+1, gy*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
          ctx.fillStyle='rgba(0,255,100,0.6)';
          ctx.font='10px monospace';
          ctx.fillText(count, gx*CELL_SIZE+4, gy*CELL_SIZE+13);
        }
      }
    }
  }

  // パネル背景
  const px=W-280, py=8, pw=272, ph=useGrid?220:200;
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='#224422'; ctx.lineWidth=1; ctx.strokeRect(px,py,pw,ph);

  ctx.font='bold 12px monospace';
  ctx.textAlign='left';

  // FPS
  const ms  = perf.updateMs;
  const rms = perf.renderMs;
  const total = ms + rms;
  const budget = 1000/60; // 16.7ms

  ctx.fillStyle=perf.fps>=55?'#44ff88':perf.fps>=30?'#ffaa33':'#ff4444';
  ctx.fillText(`FPS: ${perf.fps}`,px+10,py+18);

  // 処理時間・描画時間
  ctx.fillStyle=ms<4?'#44ff88':ms<10?'#ffaa33':'#ff4444';
  ctx.fillText(`更新: ${ms.toFixed(2)} ms  [${useGrid?'グリッド':'全探索'}]`,px+10,py+32);
  ctx.fillStyle=rms<8?'#44aaff':rms<13?'#ffaa33':'#ff4444';
  ctx.fillText(`描画: ${rms.toFixed(2)} ms`,px+10,py+46);

  // 予算バーグラフ (幅252px = 16.7ms)
  const barW = 252, barH = 13, barX = px+10, barY = py+54;
  ctx.fillStyle='#1a2a1a'; ctx.fillRect(barX, barY, barW, barH);
  // 更新（緑）
  const updateW = Math.min(barW, (ms/budget)*barW);
  ctx.fillStyle='#33aa55'; ctx.fillRect(barX, barY, updateW, barH);
  // 描画（青）
  const renderW = Math.min(barW-updateW, (rms/budget)*barW);
  ctx.fillStyle='#3366ff'; ctx.fillRect(barX+updateW, barY, renderW, barH);
  // 余裕（暗い）
  ctx.strokeStyle='#2a4a2a'; ctx.lineWidth=1; ctx.strokeRect(barX, barY, barW, barH);
  // 60fps限界ライン
  ctx.strokeStyle='#ff444466'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(barX+barW, barY); ctx.lineTo(barX+barW, barY+barH); ctx.stroke();
  // ラベル
  ctx.fillStyle='#556655'; ctx.font='9px monospace';
  ctx.fillText(`0ms`,barX,barY+barH+10);
  ctx.textAlign='right';
  ctx.fillText(`16.7ms(60fps限界)`,barX+barW,barY+barH+10);
  ctx.textAlign='left';
  ctx.fillStyle='#33aa55'; ctx.fillText('■更新',barX,barY+barH+22);
  ctx.fillStyle='#3366ff'; ctx.fillText('■描画',barX+45,barY+barH+22);
  ctx.fillStyle='#445544'; ctx.fillText(`合計: ${total.toFixed(2)}ms (予算の${((total/budget)*100).toFixed(1)}%)`,barX+90,barY+barH+22);

  // オブジェクト数
  ctx.fillStyle='#aaffcc';
  ctx.fillText(`弾: ${bullets.length}  敵: ${enemies.length}  粒子: ${particles.length}`,px+10,py+82);

  // 理論上の判定回数（グリッドなし）
  const theoretical = bullets.length * enemies.length;
  ctx.fillStyle='#888';
  ctx.fillText(`理論値 (全探索): ${theoretical.toLocaleString()} 回/f`,px+10,py+100);

  // 直近60fの平均
  const avgNoGrid = Math.round(perf.histNoGrid.reduce((a,b)=>a+b,0)/60);
  const avgGrid   = Math.round(perf.histGrid.reduce((a,b)=>a+b,0)/60);

  ctx.fillStyle='#ff8844';
  const noGridActive = !useGrid;
  if (noGridActive) ctx.fillStyle='#ffdd44';
  ctx.fillText(`[OFF] 全探索 実測: ${avgNoGrid.toLocaleString()} 回/f`,px+10,py+118);
  if (noGridActive) { ctx.fillStyle='#ffdd44'; ctx.fillText('◀ 計測中',px+195,py+118); }

  ctx.fillStyle='#44ffaa';
  const gridActive = useGrid;
  if (gridActive) ctx.fillStyle='#ffdd44';
  ctx.fillText(`[ON]  グリッド実測: ${avgGrid.toLocaleString()} 回/f`,px+10,py+136);
  if (gridActive) { ctx.fillStyle='#ffdd44'; ctx.fillText('◀ 計測中',px+195,py+136); }

  // 削減率
  const base = Math.max(avgNoGrid, avgGrid, 1);
  const reduced = useGrid ? avgNoGrid||theoretical : avgGrid||theoretical;
  if (avgNoGrid>0 && avgGrid>0) {
    const ratio = ((1 - avgGrid/avgNoGrid)*100).toFixed(1);
    ctx.fillStyle= ratio>0 ? '#44ff88':'#ff4444';
    ctx.fillText(`グリッドで ${ratio>0?'-':''}${Math.abs(ratio)}% の削減`,px+10,py+154);
  } else {
    ctx.fillStyle='#556655';
    ctx.fillText('両モードを交互に試すと比較できます',px+10,py+154);
  }

  // 操作説明
  ctx.fillStyle='#334a3a';
  ctx.fillText(`[G] グリッド: ${useGrid?'ON ':'OFF'}  [F] デバッグ表示`,px+10,py+172);
  if (useGrid) {
    ctx.fillStyle='#224a33';
    ctx.fillText(`セルサイズ: ${CELL_SIZE}px  ${GRID_COLS}×${GRID_ROWS}`,px+10,py+190);
  }

  ctx.textAlign='left';
}

function loop(now) {
  const dt=Math.min(now-lastTime,50);
  lastTime=now;

  // FPS計測
  perf.frameCount++;
  perf.fpsTimer += dt;
  if (perf.fpsTimer >= 500) {
    perf.fps = Math.round(perf.frameCount * 1000 / perf.fpsTimer);
    perf.frameCount = 0; perf.fpsTimer = 0;
  }

  const _t0 = performance.now();
  if      (state==='PLAYING')  updatePlaying(now,dt);
  else if (state==='ENDING')   updateEnding();
  else if (state==='HUMANWIN') updateEnding();
  else if (state==='GAMEOVER')  { if(++endTimer>780) state='TITLE'; }
  perf.histTimeMs[perf.histIdx] = performance.now() - _t0;
  // updateMsはヒストリ記録後にhistIdxが進む前に集計
  if (perf.fpsTimer === 0) {  // FPS更新タイミングで平均計算
    perf.updateMs = perf.histTimeMs.reduce((a,b)=>a+b,0) / 60;
  }
  const _r0 = performance.now();
  render(now);
  perf.histRenderMs[perf.histIdx] = performance.now() - _r0;
  if (perf.fpsTimer === 0) {
    perf.renderMs = perf.histRenderMs.reduce((a,b)=>a+b,0) / 60;
  }
  if (showDebug && state==='PLAYING') drawDebug();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
