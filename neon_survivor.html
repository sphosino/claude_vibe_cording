<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON SURVIVOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    width: 800px;
    height: 600px;
  }
  canvas {
    display: block;
    border: 1px solid #0ff;
    box-shadow: 0 0 30px #0ff4, 0 0 60px #0ff2, inset 0 0 30px #0002;
  }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 16px;
    pointer-events: none;
    font-family: 'Orbitron', sans-serif;
  }
  .stat-block { display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 9px; color: #0ff8; letter-spacing: 2px; text-transform: uppercase; }
  .stat-value { font-size: 20px; font-weight: 700; color: #0ff; text-shadow: 0 0 10px #0ff; }
  #healthBar {
    width: 160px; height: 8px;
    background: #0ff2;
    border: 1px solid #0ff5;
    border-radius: 2px;
    overflow: hidden;
  }
  #healthFill {
    height: 100%;
    background: linear-gradient(90deg, #f00, #f80, #0f0);
    background-size: 300% 100%;
    transition: width 0.1s;
    box-shadow: 0 0 8px #0f0;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #000b;
    z-index: 10;
  }
  #overlay h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 60px #0ff8;
    letter-spacing: 8px;
    margin-bottom: 8px;
  }
  #overlay .sub {
    font-size: 13px;
    color: #0ff8;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }
  #overlay p {
    color: #aff;
    font-size: 13px;
    margin: 6px 0;
    letter-spacing: 1px;
    opacity: 0.8;
  }
  #startBtn {
    margin-top: 32px;
    padding: 14px 44px;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #000;
    background: #0ff;
    border: none;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.15s;
    box-shadow: 0 0 20px #0ff;
  }
  #startBtn:hover {
    background: #fff;
    box-shadow: 0 0 40px #0ff;
    transform: scale(1.05);
  }
  #waveAnnounce {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    z-index: 5;
  }
  #waveText {
    font-family: 'Orbitron', sans-serif;
    font-size: 44px;
    font-weight: 900;
    color: #ff0;
    text-shadow: 0 0 30px #ff0, 0 0 60px #ff08;
    letter-spacing: 6px;
    opacity: 0;
    transform: scale(1.5);
    transition: opacity 0.3s, transform 0.3s;
  }
  #waveText.show {
    opacity: 1;
    transform: scale(1);
  }
  #expBar {
    width: 160px; height: 6px;
    background: #ff08;
    border: 1px solid #ff05;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  #expFill {
    height: 100%;
    background: linear-gradient(90deg, #f80, #ff0);
    box-shadow: 0 0 8px #ff0;
    transition: width 0.2s;
  }
  #levelUpMsg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #ff0;
    text-shadow: 0 0 20px #ff0;
    pointer-events: none;
    opacity: 0;
    z-index: 6;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="ui">
    <div class="stat-block">
      <span class="stat-label">HEALTH</span>
      <div id="healthBar"><div id="healthFill" style="width:100%;background-position:100% 0"></div></div>
      <span class="stat-value" id="hpText">100</span>
    </div>
    <div class="stat-block" style="align-items:center">
      <span class="stat-label">WAVE</span>
      <span class="stat-value" id="waveText2">1 / 10</span>
    </div>
    <div class="stat-block" style="align-items:flex-end">
      <span class="stat-label">SCORE</span>
      <span class="stat-value" id="scoreText">0</span>
      <div id="expBar"><div id="expFill" style="width:0%"></div></div>
      <span class="stat-label" style="margin-top:2px">LV <span id="lvText">1</span></span>
    </div>
  </div>
  <div id="waveAnnounce"><div id="waveText"></div></div>
  <div id="levelUpMsg">LEVEL UP!</div>
  <div id="overlay">
    <h1>NEON SURVIVOR</h1>
    <div class="sub">∴ WAVE DEFENSE ∴</div>
    <p>🎮 WASD / 矢印キー — 移動</p>
    <p>🖱️ マウス照準 / クリック — 射撃</p>
    <p>⚡ 10ウェーブを生き延びろ！</p>
    <p style="margin-top:12px;color:#f80;font-size:11px">最終ウェーブにボスが登場</p>
    <button id="startBtn" onclick="startGame()">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let state = 'menu';
let player, bullets, enemies, particles, score, wave, waveTimer, betweenWave;
let mouseX = W/2, mouseY = H/2;
let keys = {};
let animId;
let lastTime = 0;
let playerLevel = 1, playerExp = 0;
let shootCooldown = 0;
let autoShoot = false;
let mouseDown = false;
let bossAlive = false;
let gameWon = false;

const MAX_WAVE = 10;
const EXP_PER_LEVEL = [0,100,220,380,580,820,1120,1480,1900,9999];

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup', () => mouseDown = false);
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  player = { x: W/2, y: H/2, r: 14, hp: 100, maxHp: 100, speed: 220, piercing: false, spreadShot: false, rapidFire: false };
  bullets = []; enemies = []; particles = [];
  score = 0; wave = 0; waveTimer = 0; betweenWave = true;
  playerLevel = 1; playerExp = 0; shootCooldown = 0;
  bossAlive = false; gameWon = false;
  state = 'playing';
  updateUI();
  nextWave();
  lastTime = performance.now();
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function nextWave() {
  wave++;
  betweenWave = false;
  if (wave > MAX_WAVE) { winGame(); return; }
  document.getElementById('waveText2').textContent = `${wave} / ${MAX_WAVE}`;
  announceWave(wave === MAX_WAVE ? '⚠ BOSS WAVE!' : `WAVE ${wave}`);
  spawnWave();
}

function announceWave(text) {
  const el = document.getElementById('waveText');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function spawnWave() {
  const isBoss = wave === MAX_WAVE;
  if (isBoss) {
    spawnBoss();
    return;
  }
  const count = 5 + wave * 3;
  const types = wave <= 2 ? ['basic'] : wave <= 5 ? ['basic','fast'] : wave <= 8 ? ['basic','fast','heavy'] : ['fast','heavy','shooter'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (state !== 'playing') return;
      const type = types[Math.floor(Math.random() * types.length)];
      spawnEnemy(type);
    }, i * 180);
  }
}

function spawnEnemy(type) {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * W; y = -30; }
  else if (side === 1) { x = W + 30; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + 30; }
  else { x = -30; y = Math.random() * H; }

  const configs = {
    basic:   { r: 16, hp: 30 + wave*8,  speed: 80 + wave*5,  color: '#f44', score: 10, shootInterval: 0 },
    fast:    { r: 11, hp: 18 + wave*5,  speed: 160 + wave*8, color: '#f80', score: 15, shootInterval: 0 },
    heavy:   { r: 22, hp: 80 + wave*20, speed: 55 + wave*3,  color: '#a4f', score: 30, shootInterval: 0 },
    shooter: { r: 14, hp: 40 + wave*10, speed: 70 + wave*4,  color: '#ff4', score: 25, shootInterval: 2.5 },
  };
  const cfg = configs[type];
  enemies.push({ x, y, type, ...cfg, shootTimer: Math.random() * cfg.shootInterval, maxHp: cfg.hp, wobble: Math.random() * Math.PI * 2 });
}

function spawnBoss() {
  bossAlive = true;
  enemies.push({
    x: W/2, y: -60, type: 'boss',
    r: 50, hp: 2500, maxHp: 2500, speed: 80, color: '#f0f',
    score: 500, shootInterval: 0.8, shootTimer: 0,
    phase: 1, dashTimer: 0, dashTarget: null, wobble: 0
  });
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (state === 'playing') {
    update(dt);
    draw();
  }
  animId = requestAnimationFrame(loop);
}

function update(dt) {
  // Player movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    dy -= 1;
  if (keys['s'] || keys['arrowdown'])  dy += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  const len = Math.hypot(dx, dy);
  if (len > 0) { dx /= len; dy /= len; }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x + dx * player.speed * dt));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y + dy * player.speed * dt));

  // Shooting
  shootCooldown -= dt;
  const fireRate = player.rapidFire ? 0.08 : 0.18;
  if ((mouseDown) && shootCooldown <= 0) {
    shootCooldown = fireRate;
    const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
    fireBullet(angle);
    if (player.spreadShot) {
      fireBullet(angle - 0.25);
      fireBullet(angle + 0.25);
    }
    spawnMuzzleFlash(player.x, player.y);
  }

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    return b.life > 0 && b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20;
  });

  // Enemies
  waveTimer += dt;
  let allDead = enemies.length === 0 && !betweenWave;
  enemies.forEach(e => {
    e.wobble += dt * 1.5;
    if (e.type === 'boss') updateBoss(e, dt);
    else {
      const tx = player.x - e.x, ty = player.y - e.y;
      const d = Math.hypot(tx, ty);
      if (d > 1) { e.x += (tx/d) * e.speed * dt; e.y += (ty/d) * e.speed * dt; }
      if (e.shootInterval > 0) {
        e.shootTimer -= dt;
        if (e.shootTimer <= 0) {
          e.shootTimer = e.shootInterval + Math.random() * 0.5;
          const a = Math.atan2(player.y - e.y, player.x - e.x);
          spawnEnemyBullet(e.x, e.y, a, e.type === 'shooter' ? 220 : 160);
          if (e.type === 'boss') {
            spawnEnemyBullet(e.x, e.y, a + 0.4, 200);
            spawnEnemyBullet(e.x, e.y, a - 0.4, 200);
          }
        }
      }
    }

    // Collision with player bullets
    bullets.forEach(b => {
      if (!b.isEnemy) {
        const dist = Math.hypot(b.x - e.x, b.y - e.y);
        if (dist < b.r + e.r) {
          e.hp -= b.dmg;
          if (!b.piercing) b.life = 0;
          spawnHitParticles(b.x, b.y, e.color);
        }
      }
    });

    // Enemy touches player
    const pd = Math.hypot(player.x - e.x, player.y - e.y);
    if (pd < player.r + e.r - 4) {
      player.hp -= (e.type === 'boss' ? 18 : 8) * dt * 60 * dt;
      spawnHitParticles(player.x, player.y, '#f00');
    }
  });

  // Enemy bullets hitting player
  bullets.forEach(b => {
    if (b.isEnemy) {
      const d = Math.hypot(b.x - player.x, b.y - player.y);
      if (d < b.r + player.r) {
        player.hp -= b.dmg;
        b.life = 0;
        spawnHitParticles(player.x, player.y, '#f44');
      }
    }
  });

  // Remove dead enemies
  enemies = enemies.filter(e => {
    if (e.hp <= 0) {
      score += e.score * playerLevel;
      gainExp(e.score);
      for (let i = 0; i < 18; i++) spawnDeathParticle(e.x, e.y, e.color);
      if (e.type === 'boss') bossAlive = false;
      return false;
    }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 40 * dt;
    p.life -= dt;
    p.alpha = p.life / p.maxLife;
    return p.life > 0;
  });

  // Player death
  if (player.hp <= 0) { player.hp = 0; gameOver(); }

  // Wave clear
  if (enemies.length === 0 && !betweenWave && state === 'playing') {
    betweenWave = true;
    if (wave >= MAX_WAVE) { winGame(); return; }
    // Heal a bit between waves
    player.hp = Math.min(player.maxHp, player.hp + 20);
    setTimeout(() => { if (state === 'playing') nextWave(); }, 2500);
  }

  updateUI();
}

function updateBoss(b, dt) {
  if (b.hp < b.maxHp * 0.5 && b.phase === 1) { b.phase = 2; b.speed = 130; b.shootInterval = 0.5; }
  b.dashTimer -= dt;
  if (b.dashTimer <= 0) {
    b.dashTimer = 1.8 + Math.random();
    b.dashTarget = { x: player.x + (Math.random()-0.5)*80, y: player.y + (Math.random()-0.5)*80 };
  }
  if (b.dashTarget) {
    const tx = b.dashTarget.x - b.x, ty = b.dashTarget.y - b.y;
    const d = Math.hypot(tx, ty);
    const spd = b.speed * (b.phase === 2 ? 1.8 : 1);
    if (d > 5) { b.x += (tx/d)*spd*dt; b.y += (ty/d)*spd*dt; }
  }
  b.x = Math.max(b.r, Math.min(W-b.r, b.x));
  b.y = Math.max(b.r, Math.min(H-b.r, b.y));

  b.shootTimer -= dt;
  if (b.shootTimer <= 0) {
    b.shootTimer = b.shootInterval;
    const a = Math.atan2(player.y - b.y, player.x - b.x);
    spawnEnemyBullet(b.x, b.y, a, 240, 12, 18);
    if (b.phase >= 2) {
      for (let i = 0; i < 8; i++) spawnEnemyBullet(b.x, b.y, (Math.PI*2/8)*i, 180, 10, 15);
    } else {
      for (let i = 0; i < 5; i++) spawnEnemyBullet(b.x, b.y, a + (i-2)*0.3, 200, 10, 14);
    }
  }
}

function fireBullet(angle) {
  const spd = 600;
  const dmg = 10 + (playerLevel - 1) * 3;
  bullets.push({
    x: player.x, y: player.y,
    vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
    r: 5, dmg, life: 1.2, maxLife: 1.2, isEnemy: false,
    piercing: player.piercing, color: '#0ff'
  });
}

function spawnEnemyBullet(x, y, angle, spd, dmg = 8, r = 7) {
  bullets.push({
    x, y,
    vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
    r, dmg, life: 3, isEnemy: true, color: '#f44'
  });
}

function spawnHitParticles(x, y, color) {
  for (let i = 0; i < 4; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, r: 2+Math.random()*3, color, life: 0.3+Math.random()*0.3, maxLife: 0.6, alpha: 1 });
  }
}

function spawnDeathParticle(x, y, color) {
  const a = Math.random() * Math.PI * 2;
  const spd = 60 + Math.random() * 200;
  particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, r: 3+Math.random()*5, color, life: 0.6+Math.random()*0.6, maxLife: 1.2, alpha: 1 });
}

function spawnMuzzleFlash(x, y) {
  particles.push({ x, y, vx: 0, vy: 0, r: 14, color: '#0ff', life: 0.07, maxLife: 0.07, alpha: 1 });
}

function gainExp(amount) {
  if (playerLevel >= 9) return;
  playerExp += amount;
  const needed = EXP_PER_LEVEL[playerLevel];
  if (playerExp >= needed) {
    playerExp -= needed;
    playerLevel++;
    levelUpEffect();
    applyLevelBonus();
  }
}

function applyLevelBonus() {
  player.maxHp += 15;
  player.hp = Math.min(player.maxHp, player.hp + 20);
  if (playerLevel === 3) { player.spreadShot = true; announceWave('SPREAD SHOT!'); }
  if (playerLevel === 5) { player.speed = 270; announceWave('SPEED UP!'); }
  if (playerLevel === 7) { player.rapidFire = true; announceWave('RAPID FIRE!'); }
  if (playerLevel === 9) { player.piercing = true; announceWave('PIERCING!'); }
}

function levelUpEffect() {
  const el = document.getElementById('levelUpMsg');
  el.style.opacity = '1';
  el.style.transition = 'none';
  setTimeout(() => { el.style.transition = 'opacity 1s'; el.style.opacity = '0'; }, 1000);
}

function updateUI() {
  const pct = Math.max(0, player.hp / player.maxHp * 100);
  document.getElementById('healthFill').style.width = pct + '%';
  document.getElementById('healthFill').style.backgroundPosition = (100 - pct) + '% 0';
  document.getElementById('hpText').textContent = Math.ceil(player.hp);
  document.getElementById('scoreText').textContent = score;
  document.getElementById('lvText').textContent = playerLevel;
  const expNeeded = EXP_PER_LEVEL[Math.min(playerLevel, 9)];
  document.getElementById('expFill').style.width = (playerExp / expNeeded * 100) + '%';
}

function draw() {
  // Background grid
  ctx.fillStyle = '#050a0f';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#0ff08';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Enemy bullets
  bullets.filter(b => b.isEnemy).forEach(b => {
    ctx.save();
    ctx.fillStyle = b.color;
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e => {
    ctx.save();
    if (e.type === 'boss') {
      drawBoss(e);
    } else {
      ctx.shadowColor = e.color;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 2.5;
      ctx.fillStyle = e.color + '30';
      if (e.type === 'heavy') {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i/6)*Math.PI*2 + e.wobble*0.3;
          ctx[i===0?'moveTo':'lineTo'](e.x + Math.cos(a)*e.r, e.y + Math.sin(a)*e.r);
        }
        ctx.closePath();
      } else if (e.type === 'shooter') {
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const a = (i/4)*Math.PI*2 + e.wobble*0.5;
          ctx[i===0?'moveTo':'lineTo'](e.x + Math.cos(a)*e.r, e.y + Math.sin(a)*e.r);
        }
        ctx.closePath();
      } else {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
      }
      ctx.fill();
      ctx.stroke();
      // HP bar
      if (e.hp < e.maxHp) {
        const bw = e.r * 2 + 8;
        ctx.fillStyle = '#f005';
        ctx.fillRect(e.x - bw/2, e.y - e.r - 8, bw, 4);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(e.x - bw/2, e.y - e.r - 8, bw * (e.hp/e.maxHp), 4);
      }
    }
    ctx.restore();
  });

  // Player bullets
  bullets.filter(b => !b.isEnemy).forEach(b => {
    ctx.save();
    ctx.fillStyle = player.piercing ? '#ff0' : '#0ff';
    ctx.shadowColor = player.piercing ? '#ff0' : '#0ff';
    ctx.shadowBlur = 16;
    const progress = 1 - b.life / b.maxLife;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(b.x - b.vx*0.008, b.y - b.vy*0.008, b.r*1.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Player
  ctx.save();
  const pa = Math.atan2(mouseY - player.y, mouseX - player.x);
  ctx.translate(player.x, player.y);
  ctx.rotate(pa);
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 25;
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.fillStyle = '#0ff2';
  // Ship shape
  ctx.beginPath();
  ctx.moveTo(player.r + 4, 0);
  ctx.lineTo(-player.r, -player.r * 0.7);
  ctx.lineTo(-player.r * 0.5, 0);
  ctx.lineTo(-player.r, player.r * 0.7);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Engine glow
  ctx.shadowColor = '#f80';
  ctx.fillStyle = '#f804';
  ctx.beginPath();
  ctx.arc(-player.r*0.5, 0, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Crosshair
  ctx.save();
  ctx.strokeStyle = '#fff8';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 12, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(mouseX-18, mouseY); ctx.lineTo(mouseX-8, mouseY);
  ctx.moveTo(mouseX+8, mouseY);  ctx.lineTo(mouseX+18, mouseY);
  ctx.moveTo(mouseX, mouseY-18); ctx.lineTo(mouseX, mouseY-8);
  ctx.moveTo(mouseX, mouseY+8);  ctx.lineTo(mouseX, mouseY+18);
  ctx.stroke();
  ctx.restore();

  // Between wave hint
  if (betweenWave && wave > 0 && wave < MAX_WAVE) {
    ctx.save();
    ctx.fillStyle = '#0ff6';
    ctx.font = '14px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText('次のウェーブ準備中...', W/2, H - 24);
    ctx.restore();
  }
}

function drawBoss(b) {
  const t = performance.now() / 1000;
  ctx.translate(b.x, b.y);
  // Outer ring
  ctx.shadowColor = '#f0f';
  ctx.shadowBlur = 40;
  ctx.strokeStyle = '#f0f';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 0, b.r + 12 + Math.sin(t*3)*4, 0, Math.PI*2);
  ctx.stroke();
  // Body
  ctx.fillStyle = '#2008';
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2 + t*0.5;
    const r2 = i%2===0 ? b.r : b.r*0.65;
    ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*r2, Math.sin(a)*r2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#f0f';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // Inner core
  const grad = ctx.createRadialGradient(0,0,0,0,0,b.r*0.5);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.4, '#f0f');
  grad.addColorStop(1, '#f0f0');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, b.r*0.5 + Math.sin(t*5)*3, 0, Math.PI*2);
  ctx.fill();
  // Phase 2 extra rings
  if (b.phase === 2) {
    ctx.strokeStyle = '#f806';
    ctx.lineWidth = 2;
    for (let i = 1; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(0, 0, b.r + 24*i + Math.sin(t*2+i)*6, 0, Math.PI*2);
      ctx.stroke();
    }
  }
  // HP bar
  ctx.resetTransform ? ctx.resetTransform() : ctx.setTransform(1,0,0,1,0,0);
  const bw = 120;
  ctx.fillStyle = '#f005';
  ctx.fillRect(b.x - bw/2, b.y - b.r - 16, bw, 8);
  ctx.fillStyle = b.phase===2 ? '#f80' : '#f0f';
  ctx.fillRect(b.x - bw/2, b.y - b.r - 16, bw * (b.hp/b.maxHp), 8);
  ctx.strokeStyle = '#fff4';
  ctx.lineWidth = 1;
  ctx.strokeRect(b.x - bw/2, b.y - b.r - 16, bw, 8);
  // BOSS label
  ctx.font = 'bold 12px Orbitron, monospace';
  ctx.fillStyle = '#f0f';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', b.x, b.y - b.r - 22);
}

function gameOver() {
  state = 'over';
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1 style="font-size:40px;color:#f44;text-shadow:0 0 20px #f44">GAME OVER</h1>
    <div class="sub" style="color:#f448">— MISSION FAILED —</div>
    <p style="margin:16px 0 4px;color:#fff;font-size:18px">SCORE: <span style="color:#ff0;font-size:24px">${score}</span></p>
    <p>到達ウェーブ: ${wave} / ${MAX_WAVE}</p>
    <button id="startBtn" style="margin-top:28px;background:#f44;box-shadow:0 0 20px #f44" onclick="startGame()">RETRY</button>
  `;
  ov.style.display = 'flex';
}

function winGame() {
  state = 'win';
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1 style="font-size:40px;color:#ff0;text-shadow:0 0 20px #ff0">CLEAR!</h1>
    <div class="sub" style="color:#ff08">— ALL WAVES DEFEATED —</div>
    <p style="margin:16px 0 4px;color:#fff;font-size:18px">FINAL SCORE: <span style="color:#ff0;font-size:28px">${score}</span></p>
    <p>最終レベル: LV ${playerLevel}</p>
    <p style="color:#0f8;margin-top:8px">🎉 NEON SURVIVORをクリアした！</p>
    <button id="startBtn" style="margin-top:28px;background:#ff0;color:#000;box-shadow:0 0 20px #ff0" onclick="startGame()">PLAY AGAIN</button>
  `;
  ov.style.display = 'flex';
}
</script>
