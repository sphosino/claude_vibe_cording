<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON SURVIVOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }
  #gameContainer { position: relative; width: 800px; height: 600px; }
  canvas {
    display: block;
    border: 1px solid #fa0;
    box-shadow: 0 0 30px #fa04, 0 0 60px #fa02;
  }
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 16px; pointer-events: none;
    font-family: 'Orbitron', sans-serif;
  }
  .stat-block { display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 9px; color: #fa08; letter-spacing: 2px; text-transform: uppercase; }
  .stat-value { font-size: 20px; font-weight: 700; color: #fa0; text-shadow: 0 0 10px #fa0; }
  #healthBar { width: 160px; height: 8px; background: #fa02; border: 1px solid #fa05; border-radius: 2px; overflow: hidden; }
  #healthFill { height: 100%; background: linear-gradient(90deg, #f00, #f80, #fa0); background-size: 300% 100%; transition: width 0.1s; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: #000b; z-index: 10;
  }
  #overlay h1 {
    font-family: 'Orbitron', sans-serif; font-size: 52px; font-weight: 900;
    color: #fa0; text-shadow: 0 0 20px #fa0, 0 0 60px #fa08;
    letter-spacing: 8px; margin-bottom: 8px;
  }
  #overlay .sub { font-size: 13px; color: #fa08; letter-spacing: 4px; margin-bottom: 32px; }
  #overlay p { color: #fca; font-size: 13px; margin: 5px 0; letter-spacing: 1px; opacity: 0.8; }
  #startBtn {
    margin-top: 28px; padding: 14px 44px;
    font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 4px; color: #000; background: #fa0; border: none; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.15s; box-shadow: 0 0 20px #fa0;
  }
  #startBtn:hover { background: #fff; box-shadow: 0 0 40px #fa0; transform: scale(1.05); }
  #waveAnnounce {
    position: absolute; inset: 0;
    display: flex; justify-content: center; align-items: center;
    pointer-events: none; z-index: 5;
  }
  #waveText {
    font-family: 'Orbitron', sans-serif; font-size: 44px; font-weight: 900;
    color: #fa0; text-shadow: 0 0 30px #fa0, 0 0 60px #fa08;
    letter-spacing: 6px; opacity: 0; transform: scale(1.5);
    transition: opacity 0.3s, transform 0.3s;
  }
  #waveText.show { opacity: 1; transform: scale(1); }
  #expBar { width: 160px; height: 6px; background: #fa08; border: 1px solid #fa05; border-radius: 2px; overflow: hidden; margin-top: 4px; }
  #expFill { height: 100%; background: linear-gradient(90deg, #f80, #fa0); box-shadow: 0 0 8px #fa0; transition: width 0.2s; }
  /* Upgrade overlay */
  #upgradeOverlay {
    position: absolute; inset: 0; background: #000d;
    display: none; flex-direction: column; justify-content: center; align-items: center;
    z-index: 20;
  }
  #upgradeOverlay h2 {
    font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 900;
    color: #fa0; text-shadow: 0 0 20px #fa0; letter-spacing: 8px; margin-bottom: 6px;
  }
  #upgradeOverlay .sub2 { font-size: 11px; color: #fa05; letter-spacing: 3px; margin-bottom: 28px; }
  #upgradeCards { display: flex; gap: 16px; }
  .upgrade-card {
    width: 185px; padding: 22px 16px;
    border: 1px solid #fa04; background: #0b0800;
    cursor: pointer; transition: all 0.15s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    text-align: center;
  }
  .upgrade-card:hover {
    border-color: #fa0; background: #1a1200;
    box-shadow: 0 0 24px #fa05; transform: translateY(-5px);
  }
  .upgrade-card .icon { font-size: 34px; margin-bottom: 10px; }
  .upgrade-card .name { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #fa0; letter-spacing: 2px; margin-bottom: 8px; }
  .upgrade-card .desc { font-size: 11px; color: #fa07; line-height: 1.6; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="ui">
    <div class="stat-block">
      <span class="stat-label">HEALTH</span>
      <div id="healthBar"><div id="healthFill" style="width:100%;background-position:100% 0"></div></div>
      <span class="stat-value" id="hpText">100</span>
    </div>
    <div class="stat-block" style="align-items:center">
      <span class="stat-label">WAVE</span>
      <span class="stat-value" id="waveText2">1 / 10</span>
    </div>
    <div class="stat-block" style="align-items:flex-end">
      <span class="stat-label">SCORE</span>
      <span class="stat-value" id="scoreText">0</span>
      <div id="expBar"><div id="expFill" style="width:0%"></div></div>
      <span class="stat-label" style="margin-top:2px">LV <span id="lvText">1</span></span>
    </div>
  </div>
  <div id="waveAnnounce"><div id="waveText"></div></div>
  <div id="upgradeOverlay">
    <h2>LEVEL UP</h2>
    <div class="sub2">∴ CHOOSE AN UPGRADE ∴</div>
    <div id="upgradeCards"></div>
  </div>
  <div id="overlay">
    <h1>NEON SURVIVOR</h1>
    <div class="sub">∴ WAVE DEFENSE ∴</div>
    <p>🎮 WASD / 矢印キー — 移動</p>
    <p>🖱️ マウス照準 / クリック — 射撃</p>
    <p>⎵ スペース — ダッシュ（無敵あり）</p>
    <p>⚡ 10ウェーブを生き延びろ！</p>
    <p style="margin-top:12px;color:#f80;font-size:11px">最終ウェーブにボスが登場</p>
    <button id="startBtn" onclick="startGame()">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let state = 'menu';
let player, bullets, enemies, particles, floatingTexts, stars, score, wave, waveTimer, betweenWave;
let mouseX = W/2, mouseY = H/2;
let keys = {};
let animId, lastTime = 0;
let playerLevel = 1, playerExp = 0;
let shootCooldown = 0;
let mouseDown = false;
let bossAlive = false;
let screenShake = { x:0, y:0, intensity:0 };
let dashCooldown = 0, dashActive = 0, dashTrail = [];

const MAX_WAVE = 10;
const EXP_PER_LEVEL = [0, 100, 220, 380, 580, 820, 1120, 1480, 1900, 9999];
const DASH_CD_BASE = 2.0;
const DASH_DURATION = 0.17;
const DASH_SPEED = 950;

const ALL_UPGRADES = [
  { icon:'💥', name:'OVERCHARGE',      desc:'弾ダメージ +25%',            apply: p => { p.dmgMult *= 1.25; } },
  { icon:'⚡', name:'HYPERDRIVE',       desc:'移動速度 +20%',               apply: p => { p.speed *= 1.20; } },
  { icon:'🛡', name:'ARMOR PLATING',   desc:'最大HP +40、HP +30回復',      apply: p => { p.maxHp += 40; p.hp = Math.min(p.maxHp, p.hp+30); } },
  { icon:'🔥', name:'RAPID CAPACITOR', desc:'連射速度 +30%',               apply: p => { p.fireRateMult *= 0.70; } },
  { icon:'↔', name:'SPREAD ARRAY',     desc:'拡散弾を +2発追加',           apply: p => { p.spreadCount += 2; } },
  { icon:'➤', name:'PIERCING CORE',   desc:'弾が敵を貫通する',            apply: p => { p.piercing = true; } },
  { icon:'♥', name:'VAMPIRIC ROUNDS',  desc:'撃破ごとに HP +5回復',       apply: p => { p.vampiric += 5; } },
  { icon:'💨', name:'BLINK DRIVE',     desc:'ダッシュ CT -0.5秒',         apply: p => { p.dashCdBonus += 0.5; } },
  { icon:'✚', name:'NANOBOTS',          desc:'毎秒 HP +2 自動回復',        apply: p => { p.regen += 2; } },
  { icon:'◉', name:'HEAVY ROUNDS',     desc:'弾サイズ +60%、ダメージ +10%', apply: p => { p.bulletSize *= 1.6; p.dmgMult *= 1.10; } },
];

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
});
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup',   () => mouseDown = false);
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') { e.preventDefault(); if (state==='playing') tryDash(); }
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function initStars() {
  stars = [];
  for (let i=0;i<140;i++) stars.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.4+0.2, phase:Math.random()*Math.PI*2 });
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('upgradeOverlay').style.display = 'none';
  player = { x:W/2, y:H/2, r:14, hp:100, maxHp:100, speed:220,
    piercing:false, spreadCount:1, dmgMult:1, fireRateMult:1,
    bulletSize:1, vampiric:0, regen:0, dashCdBonus:0 };
  bullets=[]; enemies=[]; particles=[]; floatingTexts=[]; dashTrail=[];
  score=0; wave=0; waveTimer=0; betweenWave=true;
  playerLevel=1; playerExp=0; shootCooldown=0;
  bossAlive=false; dashCooldown=0; dashActive=0;
  screenShake={x:0,y:0,intensity:0};
  initStars();
  state='playing'; updateUI(); nextWave();
  lastTime=performance.now();
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function nextWave() {
  wave++; betweenWave=false;
  if (wave>MAX_WAVE) { winGame(); return; }
  document.getElementById('waveText2').textContent=`${wave} / ${MAX_WAVE}`;
  announceWave(wave===MAX_WAVE ? '⚠ BOSS WAVE!' : `WAVE ${wave}`);
  spawnWave();
}

function announceWave(text) {
  const el=document.getElementById('waveText');
  el.textContent=text; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function spawnWave() {
  if (wave===MAX_WAVE) { spawnBoss(); return; }
  const count=5+wave*3;
  const types = wave<=2 ? ['basic'] : wave<=5 ? ['basic','fast'] : wave<=7 ? ['basic','fast','heavy','splitter'] : ['fast','heavy','shooter','splitter'];
  for (let i=0;i<count;i++) setTimeout(()=>{ if(state!=='playing'&&state!=='upgrade') return; spawnEnemy(types[Math.floor(Math.random()*types.length)]); }, i*180);
}

function edgePos() {
  const side=Math.floor(Math.random()*4);
  if(side===0) return {x:Math.random()*W, y:-30};
  if(side===1) return {x:W+30, y:Math.random()*H};
  if(side===2) return {x:Math.random()*W, y:H+30};
  return {x:-30, y:Math.random()*H};
}

function spawnEnemy(type, x, y) {
  if (x===undefined) { const p=edgePos(); x=p.x; y=p.y; }
  const cfg = {
    basic:    {r:16, hp:30+wave*8,  speed:80+wave*5,  color:'#f55', score:10, shootInterval:0},
    fast:     {r:11, hp:18+wave*5,  speed:160+wave*8, color:'#f90', score:15, shootInterval:0},
    heavy:    {r:22, hp:80+wave*20, speed:55+wave*3,  color:'#a4f', score:30, shootInterval:0},
    shooter:  {r:14, hp:40+wave*10, speed:70+wave*4,  color:'#ff4', score:25, shootInterval:2.5},
    splitter: {r:19, hp:55+wave*12, speed:65+wave*4,  color:'#4ef', score:22, shootInterval:0, splits:true},
  }[type];
  enemies.push({x,y,type,...cfg,shootTimer:cfg.shootInterval?Math.random()*cfg.shootInterval:0, maxHp:cfg.hp, wobble:Math.random()*Math.PI*2});
}

function spawnBoss() {
  bossAlive=true;
  enemies.push({x:W/2,y:-60,type:'boss',r:50,hp:2500,maxHp:2500,speed:80,color:'#f0f',
    score:500,shootInterval:0.8,shootTimer:0,phase:1,dashTimer:0,dashTarget:null,wobble:0});
}

function tryDash() {
  if (dashCooldown>0||dashActive>0) return;
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])    dy-=1;
  if(keys['s']||keys['arrowdown'])  dy+=1;
  if(keys['a']||keys['arrowleft'])  dx-=1;
  if(keys['d']||keys['arrowright']) dx+=1;
  if(dx===0&&dy===0){const a=Math.atan2(mouseY-player.y,mouseX-player.x);dx=Math.cos(a);dy=Math.sin(a);}
  const len=Math.hypot(dx,dy);
  player._dvx=(dx/len)*DASH_SPEED; player._dvy=(dy/len)*DASH_SPEED;
  dashActive=DASH_DURATION;
  dashCooldown=Math.max(0.5, DASH_CD_BASE - player.dashCdBonus);
  for(let i=0;i<8;i++) dashTrail.push({x:player.x,y:player.y,r:player.r,life:0.25+i*0.02,maxLife:0.35});
}

function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  if(state==='playing'||state==='upgrade'){update(dt);draw();}
  animId=requestAnimationFrame(loop);
}

function update(dt) {
  // Always update cosmetics
  particles=particles.filter(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=40*dt; p.life-=dt; p.alpha=p.life/p.maxLife; return p.life>0;
  });
  floatingTexts=floatingTexts.filter(t=>{ t.y-=45*dt; t.life-=dt; t.alpha=t.life/t.maxLife; return t.life>0; });
  dashTrail=dashTrail.filter(t=>{ t.life-=dt; return t.life>0; });

  if(state==='upgrade') return;

  screenShake.intensity*=Math.pow(0.04,dt);
  screenShake.x=(Math.random()-0.5)*screenShake.intensity;
  screenShake.y=(Math.random()-0.5)*screenShake.intensity;

  // Dash movement
  if(dashActive>0){
    dashActive-=dt;
    player.x=Math.max(player.r,Math.min(W-player.r,player.x+player._dvx*dt));
    player.y=Math.max(player.r,Math.min(H-player.r,player.y+player._dvy*dt));
  } else {
    let dx=0,dy=0;
    if(keys['w']||keys['arrowup'])    dy-=1;
    if(keys['s']||keys['arrowdown'])  dy+=1;
    if(keys['a']||keys['arrowleft'])  dx-=1;
    if(keys['d']||keys['arrowright']) dx+=1;
    const len=Math.hypot(dx,dy);
    if(len>0){dx/=len;dy/=len;}
    player.x=Math.max(player.r,Math.min(W-player.r,player.x+dx*player.speed*dt));
    player.y=Math.max(player.r,Math.min(H-player.r,player.y+dy*player.speed*dt));
  }
  dashCooldown=Math.max(0,dashCooldown-dt);

  if(player.regen) player.hp=Math.min(player.maxHp,player.hp+player.regen*dt);

  // Shooting
  shootCooldown-=dt;
  const fireRate=0.18*(player.fireRateMult||1);
  if(mouseDown&&shootCooldown<=0){
    shootCooldown=fireRate;
    const base=Math.atan2(mouseY-player.y,mouseX-player.x);
    const n=player.spreadCount||1;
    for(let i=0;i<n;i++){
      const offset=n===1?0:(i/(n-1)-0.5)*0.45;
      fireBullet(base+offset);
    }
    spawnMuzzle(player.x,player.y);
  }

  // Bullets move
  bullets=bullets.filter(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    return b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20;
  });

  // Enemies
  waveTimer+=dt;
  const toSplit=[];
  enemies.forEach(e=>{
    e.wobble+=dt*1.5;
    if(e.type==='boss') updateBoss(e,dt);
    else {
      const tx=player.x-e.x, ty=player.y-e.y, d=Math.hypot(tx,ty);
      if(d>1){e.x+=(tx/d)*e.speed*dt;e.y+=(ty/d)*e.speed*dt;}
      if(e.shootInterval>0){
        e.shootTimer-=dt;
        if(e.shootTimer<=0){
          e.shootTimer=e.shootInterval+Math.random()*0.5;
          spawnEnemyBullet(e.x,e.y,Math.atan2(player.y-e.y,player.x-e.x));
        }
      }
    }
    // Bullet hit
    bullets.forEach(b=>{
      if(!b.isEnemy){
        if(Math.hypot(b.x-e.x,b.y-e.y)<b.r+e.r){
          e.hp-=b.dmg;
          if(!b.piercing)b.life=0;
          spawnHits(b.x,b.y,e.color);
          spawnFloat(e.x,e.y-e.r-6,Math.floor(b.dmg));
        }
      }
    });
    // Contact damage
    if(dashActive<=0){
      const pd=Math.hypot(player.x-e.x,player.y-e.y);
      if(pd<player.r+e.r-4){
        player.hp-=(e.type==='boss'?18:8)*dt*60*dt;
        spawnHits(player.x,player.y,'#f44');
      }
    }
  });
  // Enemy bullets hit player
  if(dashActive<=0){
    bullets.forEach(b=>{
      if(b.isEnemy&&Math.hypot(b.x-player.x,b.y-player.y)<b.r+player.r){
        player.hp-=b.dmg; b.life=0;
        spawnHits(player.x,player.y,'#f55'); addShake(10);
      }
    });
  }
  // Kill enemies
  enemies=enemies.filter(e=>{
    if(e.hp<=0){
      score+=e.score*playerLevel; gainExp(e.score);
      if(player.vampiric)player.hp=Math.min(player.maxHp,player.hp+player.vampiric);
      for(let i=0;i<20;i++) spawnDeath(e.x,e.y,e.color);
      addShake(e.type==='boss'?35:6);
      if(e.splits&&e.r>10) toSplit.push({x:e.x,y:e.y});
      if(e.type==='boss') bossAlive=false;
      return false;
    }
    return true;
  });
  toSplit.forEach(s=>{
    for(let i=0;i<2;i++){
      const a=Math.random()*Math.PI*2;
      enemies.push({x:s.x+Math.cos(a)*22,y:s.y+Math.sin(a)*22,
        type:'splitter_mini',r:9,hp:15+wave*4,maxHp:15+wave*4,
        speed:130+wave*6,color:'#4ef',score:8,shootInterval:0,shootTimer:0,wobble:Math.random()*Math.PI*2,splits:false});
    }
  });

  if(player.hp<=0){player.hp=0;gameOver();return;}
  if(enemies.length===0&&!betweenWave&&state==='playing'){
    betweenWave=true;
    if(wave>=MAX_WAVE){winGame();return;}
    player.hp=Math.min(player.maxHp,player.hp+20);
    setTimeout(()=>{if(state==='playing')nextWave();},2500);
  }
  updateUI();
}

function updateBoss(b,dt){
  if(b.hp<b.maxHp*0.5&&b.phase===1){b.phase=2;b.speed=130;b.shootInterval=0.5;}
  b.dashTimer-=dt;
  if(b.dashTimer<=0){b.dashTimer=1.8+Math.random();b.dashTarget={x:player.x+(Math.random()-0.5)*80,y:player.y+(Math.random()-0.5)*80};}
  if(b.dashTarget){
    const tx=b.dashTarget.x-b.x,ty=b.dashTarget.y-b.y,d=Math.hypot(tx,ty);
    const spd=b.speed*(b.phase===2?1.8:1);
    if(d>5){b.x+=(tx/d)*spd*dt;b.y+=(ty/d)*spd*dt;}
  }
  b.x=Math.max(b.r,Math.min(W-b.r,b.x)); b.y=Math.max(b.r,Math.min(H-b.r,b.y));
  b.shootTimer-=dt;
  if(b.shootTimer<=0){
    b.shootTimer=b.shootInterval;
    const a=Math.atan2(player.y-b.y,player.x-b.x);
    spawnEnemyBullet(b.x,b.y,a,240,12,18);
    if(b.phase>=2){for(let i=0;i<8;i++) spawnEnemyBullet(b.x,b.y,(Math.PI*2/8)*i,180,10,15);}
    else{for(let i=0;i<5;i++) spawnEnemyBullet(b.x,b.y,a+(i-2)*0.3,200,10,14);}
  }
}

function fireBullet(angle){
  const dmg=(10+(playerLevel-1)*3)*(player.dmgMult||1);
  const r=5*(player.bulletSize||1);
  bullets.push({x:player.x,y:player.y,vx:Math.cos(angle)*600,vy:Math.sin(angle)*600,r,dmg,life:1.2,maxLife:1.2,isEnemy:false,piercing:player.piercing});
}
function spawnEnemyBullet(x,y,angle,spd=220,dmg=8,r=7){
  bullets.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r,dmg,life:3,isEnemy:true});
}
function spawnHits(x,y,color){
  for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2,s=80+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,color,life:0.3+Math.random()*0.3,maxLife:0.6,alpha:1});}
}
function spawnDeath(x,y,color){
  const a=Math.random()*Math.PI*2,s=60+Math.random()*200;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*5,color,life:0.6+Math.random()*0.6,maxLife:1.2,alpha:1});
}
function spawnMuzzle(x,y){
  particles.push({x,y,vx:0,vy:0,r:13,color:'#fa0',life:0.07,maxLife:0.07,alpha:1});
}
function spawnFloat(x,y,dmg){
  floatingTexts.push({x,y,text:String(dmg),color:dmg>40?'#fa0':dmg>20?'#fff':'#aaa',life:0.75,maxLife:0.75,alpha:1});
}
function addShake(n){ screenShake.intensity=Math.max(screenShake.intensity,n); }

function gainExp(amount){
  if(playerLevel>=9)return;
  playerExp+=amount;
  if(playerExp>=EXP_PER_LEVEL[playerLevel]){
    playerExp-=EXP_PER_LEVEL[playerLevel];
    playerLevel++;
    showUpgrade();
  }
}

function showUpgrade(){
  state='upgrade';
  const pool=[...ALL_UPGRADES];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const choices=pool.slice(0,3);
  const el=document.getElementById('upgradeCards');
  el.innerHTML='';
  choices.forEach(u=>{
    const c=document.createElement('div'); c.className='upgrade-card';
    c.innerHTML=`<div class="icon">${u.icon}</div><div class="name">${u.name}</div><div class="desc">${u.desc}</div>`;
    c.onclick=()=>{
      u.apply(player);
      document.getElementById('upgradeOverlay').style.display='none';
      state='playing'; announceWave(u.name+'!'); updateUI();
    };
    el.appendChild(c);
  });
  document.getElementById('upgradeOverlay').style.display='flex';
}

function updateUI(){
  const pct=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('healthFill').style.width=pct+'%';
  document.getElementById('healthFill').style.backgroundPosition=(100-pct)+'% 0';
  document.getElementById('hpText').textContent=Math.ceil(player.hp);
  document.getElementById('scoreText').textContent=score;
  document.getElementById('lvText').textContent=playerLevel;
  const need=EXP_PER_LEVEL[Math.min(playerLevel,9)];
  document.getElementById('expFill').style.width=(playerExp/need*100)+'%';
}

function draw(){
  ctx.save();
  ctx.translate(screenShake.x,screenShake.y);

  // Deep space bg
  ctx.fillStyle='#05050e';
  ctx.fillRect(-10,-10,W+20,H+20);

  // Stars
  const now=performance.now()*0.001;
  stars.forEach(s=>{
    const tw=0.3+0.7*Math.abs(Math.sin(now*0.7+s.phase));
    ctx.globalAlpha=tw*0.8; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Subtle scan line effect
  ctx.fillStyle='rgba(0,0,0,0.03)';
  for(let y=0;y<H;y+=4){ctx.fillRect(0,y,W,2);}

  // Dash trail
  dashTrail.forEach(t=>{
    ctx.save(); ctx.globalAlpha=(t.life/t.maxLife)*0.35;
    ctx.strokeStyle='#fa0'; ctx.shadowColor='#fa0'; ctx.shadowBlur=12; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Enemy bullets
  bullets.filter(b=>b.isEnemy).forEach(b=>{
    ctx.save();
    ctx.fillStyle='#f55'; ctx.shadowColor='#f80'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e=>{
    ctx.save();
    if(e.type==='boss'){ drawBoss(e); ctx.restore(); return; }
    ctx.shadowColor=e.color; ctx.shadowBlur=22;
    ctx.strokeStyle=e.color; ctx.lineWidth=2.5; ctx.fillStyle=e.color+'28';
    ctx.beginPath();
    if(e.type==='heavy'){
      for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2+e.wobble*0.3; ctx[i?'lineTo':'moveTo'](e.x+Math.cos(a)*e.r,e.y+Math.sin(a)*e.r);}
    } else if(e.type==='shooter'){
      for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+e.wobble*0.5; ctx[i?'lineTo':'moveTo'](e.x+Math.cos(a)*e.r,e.y+Math.sin(a)*e.r);}
    } else if(e.type==='splitter'||e.type==='splitter_mini'){
      for(let i=0;i<3;i++){const a=(i/3)*Math.PI*2+e.wobble*0.9; ctx[i?'lineTo':'moveTo'](e.x+Math.cos(a)*e.r,e.y+Math.sin(a)*e.r);}
    } else {
      ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    if(e.hp<e.maxHp){
      const bw=e.r*2+8;
      ctx.fillStyle='#f003'; ctx.fillRect(e.x-bw/2,e.y-e.r-8,bw,4);
      ctx.fillStyle='#0f0'; ctx.fillRect(e.x-bw/2,e.y-e.r-8,bw*(e.hp/e.maxHp),4);
    }
    ctx.restore();
  });

  // Player bullets
  bullets.filter(b=>!b.isEnemy).forEach(b=>{
    ctx.save();
    const col=player.piercing?'#fff':'#fa0';
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.25;
    ctx.beginPath(); ctx.arc(b.x-b.vx*0.008,b.y-b.vy*0.008,b.r*1.6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Player
  ctx.save();
  const pa=Math.atan2(mouseY-player.y,mouseX-player.x);
  ctx.translate(player.x,player.y);
  if(dashActive>0) ctx.globalAlpha=0.5+0.5*Math.abs(Math.sin(now*25));
  ctx.rotate(pa);
  ctx.shadowColor='#fa0'; ctx.shadowBlur=28;
  ctx.strokeStyle='#fa0'; ctx.lineWidth=2; ctx.fillStyle='#fa024';
  ctx.beginPath();
  ctx.moveTo(player.r+5,0);
  ctx.lineTo(-player.r,-player.r*0.7);
  ctx.lineTo(-player.r*0.5,0);
  ctx.lineTo(-player.r,player.r*0.7);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Engine
  ctx.shadowColor='#f44'; ctx.fillStyle='#f445';
  ctx.beginPath(); ctx.arc(-player.r*0.5,0,5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Dash cooldown arc
  if(dashCooldown>0){
    const maxCd=Math.max(0.5,DASH_CD_BASE-player.dashCdBonus);
    const frac=1-dashCooldown/maxCd;
    ctx.save();
    ctx.strokeStyle='#fa05'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(player.x,player.y,player.r+9,-Math.PI/2,-Math.PI/2+frac*Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Crosshair
  ctx.save();
  ctx.strokeStyle='#fff5'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(mouseX,mouseY,12,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(mouseX-18,mouseY); ctx.lineTo(mouseX-8,mouseY);
  ctx.moveTo(mouseX+8,mouseY);  ctx.lineTo(mouseX+18,mouseY);
  ctx.moveTo(mouseX,mouseY-18); ctx.lineTo(mouseX,mouseY-8);
  ctx.moveTo(mouseX,mouseY+8);  ctx.lineTo(mouseX,mouseY+18);
  ctx.stroke(); ctx.restore();

  // Floating damage numbers
  floatingTexts.forEach(t=>{
    ctx.save(); ctx.globalAlpha=t.alpha;
    ctx.font='bold 13px Share Tech Mono,monospace';
    ctx.fillStyle=t.color; ctx.shadowColor=t.color; ctx.shadowBlur=6;
    ctx.textAlign='center'; ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  });

  if(betweenWave&&wave>0&&wave<MAX_WAVE){
    ctx.save(); ctx.fillStyle='#fa05'; ctx.font='13px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText('次のウェーブ準備中...',W/2,H-22); ctx.restore();
  }

  ctx.restore(); // screen shake
}

function drawBoss(b){
  const t=performance.now()/1000;
  ctx.save(); ctx.translate(b.x,b.y);
  ctx.shadowColor='#f0f'; ctx.shadowBlur=40;
  ctx.strokeStyle='#f0f'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,0,b.r+12+Math.sin(t*3)*4,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#2008'; ctx.beginPath();
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2+t*0.5,r2=i%2===0?b.r:b.r*0.65;ctx[i?'lineTo':'moveTo'](Math.cos(a)*r2,Math.sin(a)*r2);}
  ctx.closePath(); ctx.fill(); ctx.strokeStyle='#f0f'; ctx.lineWidth=2.5; ctx.stroke();
  const g=ctx.createRadialGradient(0,0,0,0,0,b.r*0.5);
  g.addColorStop(0,'#fff'); g.addColorStop(0.4,'#f0f'); g.addColorStop(1,'#f0f0');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,b.r*0.5+Math.sin(t*5)*3,0,Math.PI*2); ctx.fill();
  if(b.phase===2){
    ctx.strokeStyle='#f806'; ctx.lineWidth=2;
    for(let i=1;i<=2;i++){ctx.beginPath();ctx.arc(0,0,b.r+24*i+Math.sin(t*2+i)*6,0,Math.PI*2);ctx.stroke();}
  }
  ctx.restore();
  // HP bar (screen coords)
  const bw=120;
  ctx.fillStyle='#f004'; ctx.fillRect(b.x-bw/2,b.y-b.r-16,bw,8);
  ctx.fillStyle=b.phase===2?'#f80':'#f0f'; ctx.fillRect(b.x-bw/2,b.y-b.r-16,bw*(b.hp/b.maxHp),8);
  ctx.strokeStyle='#fff3'; ctx.lineWidth=1; ctx.strokeRect(b.x-bw/2,b.y-b.r-16,bw,8);
  ctx.font='bold 12px Orbitron,monospace'; ctx.fillStyle='#f0f'; ctx.textAlign='center';
  ctx.fillText('BOSS',b.x,b.y-b.r-22);
}

function gameOver(){
  state='over';
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 style="font-size:40px;color:#f44;text-shadow:0 0 20px #f44">GAME OVER</h1><div class="sub" style="color:#f448">— MISSION FAILED —</div><p style="margin:16px 0 4px;color:#fff;font-size:18px">SCORE: <span style="color:#fa0;font-size:24px">${score}</span></p><p>到達ウェーブ: ${wave} / ${MAX_WAVE}</p><button id="startBtn" style="margin-top:28px;background:#f44;box-shadow:0 0 20px #f44" onclick="startGame()">RETRY</button>`;
  ov.style.display='flex';
}
function winGame(){
  state='win';
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 style="font-size:40px;color:#fa0;text-shadow:0 0 20px #fa0">CLEAR!</h1><div class="sub">— ALL WAVES DEFEATED —</div><p style="margin:16px 0 4px;color:#fff;font-size:18px">FINAL SCORE: <span style="color:#fa0;font-size:28px">${score}</span></p><p>最終レベル: LV ${playerLevel}</p><p style="color:#0f8;margin-top:8px">🎉 NEON SURVIVORをクリアした！</p><button id="startBtn" style="margin-top:28px;background:#fa0;color:#000;box-shadow:0 0 20px #fa0" onclick="startGame()">PLAY AGAIN</button>`;
  ov.style.display='flex';
}
</script>
